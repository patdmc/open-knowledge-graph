id: REF-HPRC2023
type: reference
name: "Human Pangenome Reference Consortium 2023 — Draft Human Pangenome"
citation: |
  Human Pangenome Reference Consortium. (2023). A draft human pangenome reference.
  Nature, 617, 312-324.

statement: |
  The Human Pangenome Reference Consortium released the first draft of a
  graph-based human pangenome reference encoding 47 diploid assemblies (94
  haplotypes). The pangenome is represented as a variation graph: a directed
  acyclic graph where every human haplotype is a path, shared sequence is shared
  nodes, and variation is branching structure.

  The key finding: no single linear reference genome can represent the full scope
  of human genetic variation without systematic bias. The graph is the correct
  representational form. Linear sequences are paths through the graph — traversals,
  not the structure itself.

