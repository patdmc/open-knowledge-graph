id: REF-England2013
type: reference
fidelity: low
name: "England (2013) — Statistical Physics of Self-Replication"
statement: |
  Derives thermodynamic conditions under which self-replicating structures are favored.
  Key propositions:

  EN1 (dissipation as self-replication driver): Systems that dissipate energy efficiently
       are thermodynamically favored to self-replicate. Self-replication is not biologically
       special — it emerges from statistical mechanics.
  EN2 (survival as energy dissipation): Biological survival is a special case of
       dissipative self-organization. The survival threshold U_lethal maps to the
       thermodynamic threshold below which self-replication cannot proceed.
  EN3 (physical grounding of selection): Darwinian selection is the macroscopic expression
       of thermodynamic favorability for dissipative structures.

