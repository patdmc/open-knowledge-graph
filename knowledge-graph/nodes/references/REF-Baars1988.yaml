    description: |
      GWT2 provides an empirical grounding for C_n: the bounded context window is not
      a computational convenience but reflects the actual capacity of the global workspace.
      GWT3 and the L0-L3 hierarchy are structurally parallel — both describe specialized
      processing below a bounded integration threshold, with escalation to higher levels.
      GWT4 (K as global broadcast content) grounds the claim that K is the shared structure
      enabling all of F — the globally broadcast knowledge.
