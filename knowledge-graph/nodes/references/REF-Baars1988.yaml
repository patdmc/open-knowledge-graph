type: reference
fidelity: low
name: "Baars (1988) — A Cognitive Theory of Consciousness"
statement: |
  Global Workspace Theory (GWT): consciousness arises from a global broadcast mechanism
  that makes information available across specialized cognitive modules. Key propositions:

  GWT1 (global workspace): Conscious access = entry into a global broadcast that reaches
       all specialized processors. Unconscious = local processing not broadcast globally.
  GWT2 (limited capacity): The global workspace has strictly limited capacity — only a
       small amount of information is globally available at once. Corresponds directly to
       C_n: the bounded context window is the global workspace capacity.
  GWT3 (modularity): Specialized processors operate below the workspace threshold.
       Corresponds to L0-L3 hierarchy: lower levels handle specialized processing;
       higher levels escalate to the workspace.
  GWT4 (broadcast as integration): The workspace integrates information from disparate
       sources — corresponds to K as the shared knowledge structure that informs all of F.

provenance:
