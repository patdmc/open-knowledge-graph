  evidence:
    type: cited
    description: |
      PR1 provides the thermodynamic framing for survival as dissipative structure maintenance.
      PR2 maps to the bifurcation at C_n (Theorem 2b Part 3): two options, one leads to
      information preservation (factoring = graph construction), one to information loss.
      PR3 grounds encoding permanence: the irreversibility of thermodynamic processes
      corresponds to the irreversibility of information gain in K.
