id: REF-Prigogine1984
type: reference
fidelity: low
name: "Prigogine and Stengers (1984) — Order Out of Chaos"
statement: |
  Dissipative structures: far-from-equilibrium systems that maintain order by dissipating
  energy, spontaneously self-organizing into complex structures. Key propositions:

  PR1 (dissipative structures): Systems far from thermodynamic equilibrium spontaneously
       organize into ordered structures sustained by energy flow. Life is a dissipative
       structure — it maintains order through metabolism.
  PR2 (bifurcation): At critical points (bifurcations), dissipative systems can branch
       into qualitatively different stable states. Corresponds to the threshold dynamics
       at C_n: at the boundary, factoring creates a bifurcation between information
       preservation and information loss.
  PR3 (irreversibility): Far-from-equilibrium processes are irreversible — time has a
       direction. Corresponds to the encoding permanence theorem: once a proposition is
       grounded, the information it represents is permanently accessible (irreversible gain).

provenance:
  attribution:
    author: "Ilya Prigogine and Isabelle Stengers"
    source: "Bantam Books"
    date: "1984"
