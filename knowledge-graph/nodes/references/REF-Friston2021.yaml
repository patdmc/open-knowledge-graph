id: REF-Friston2021
type: reference
fidelity: low
name: "Friston et al. (2021) — Sophisticated Inference"
statement: |
  Sophisticated inference extends active inference to agents that can reason about the
  consequences of their own belief-updating — agents that model their own inference
  process. Key propositions:

  SI1 (self-modeling): A sophisticated agent models not just the world but its own
       future inference states — it considers what it will believe after taking an action.
  SI2 (epistemic depth): Epistemic value deepens: the agent values information that
       will inform future inference, not just current uncertainty reduction.
  SI3 (counterfactual reasoning): The agent evaluates counterfactual policies by
       simulating what it would believe under each.
  SI4 (meta-cognitive awareness): Sophisticated inference is structurally analogous to
       what this framework calls higher-order sentience — awareness of the inference
       process itself, not just its outputs.

