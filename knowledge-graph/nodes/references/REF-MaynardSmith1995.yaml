    description: |
      MS2 grounds the collective knowledge claim (Corollary 8a): the intersection of
      independent K_i projections is a major transition — the same structure that drove
      evolution from individual replicators to cooperating units. The K_collective
      framework formalizes what Maynard Smith identified qualitatively.
      MS4 grounds the claim that K_collective is the relevant unit for long-run analysis.
