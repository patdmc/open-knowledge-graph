type: reference
fidelity: low
name: "Maynard Smith and Szathmáry (1995) — The Major Transitions in Evolution"
statement: |
  Analyzes the major transitions in evolution as changes in the way information is stored,
  transmitted, and expressed. Key propositions:

  MS1 (information transitions): Each major transition involves a change in how hereditary
       information is encoded — from RNA to DNA, from genes to chromosomes, from unicell
       to multicell. K grows through transitions, not just incremental accumulation.
  MS2 (cooperation as transition): The transition from selfish replicators to cooperating
       units (cells, multicellular organisms, eusocial colonies) is an information integration
       event. Corresponds to Corollary 8a: the intersection of K_i entities into K_collective
       is a major transition — individual K's become a shared, collective knowledge structure.
  MS3 (division of cognitive labor): Multicellular organisms divide information-processing
       across specialized cells. Corresponds to the encoding hierarchy: lower levels (L0)
       handle specialized certain processing; the organism-level integrates.
  MS4 (unit of selection shifts): At each transition, the unit of selection shifts from
       the lower level to the higher level. Corresponds to the M -> N acceleration argument:
       at the collective level, K_collective is the entity under selection pressure, not K_i.

