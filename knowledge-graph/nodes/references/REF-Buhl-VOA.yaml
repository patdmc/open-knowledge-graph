id: REF-Buhl-VOA
type: reference
name: "Buhl and Karaali (2008) — Spanning Sets for Möbius Vertex Algebras Satisfying Arbitrary Difference Conditions"
citation: "Buhl, G. and Karaali, G. (2008). Spanning sets for Möbius vertex algebras satisfying arbitrary difference conditions. Journal of Algebra, 320(8), 3345–3364."
doi: "10.1016/j.jalgebra.2008.06.038"
arxiv: "0803.3819"
citation_status: VERIFIED
fidelity: high

context: |
  Geoff Buhl and Gizem Karaali prove spanning set results for Möbius vertex algebras.
  The main result (Theorem 5.1) shows that for a suitably chosen generating set — specifically,
  homogeneous representatives of a spanning set for the quotient V/C_{N+1}(V) — any N-graded
  Möbius vertex algebra is spanned by monomials of vertex operators satisfying a difference-N
  ordering condition: the mode indices n_i satisfy n_i - n_{i+1} >= N in any monomial. This
  extends prior difference-zero (Karel-Li) and difference-one (Gaberdiel-Neitzke) results to
  arbitrary positive integer N. The proof proceeds by constructing a family of filtrations
  (Section 3), deriving straightening identities (Section 4), and using induction on filtration
  level and monomial length (Section 5). The paper cites Buhl's own earlier work: [Bu1]
  (spanning sets for VOA modules, J. Algebra 2002) and [Bu2] (ordered spanning sets for
  quasimodules for Möbius VAs, arXiv 2007), as well as Gaberdiel-Neitzke [GN] and Karel-Li [KL]
  as the results being generalized.

  Scope note: this node covers only the Buhl-Karaali (2008) paper. Buhl has at least two
  additional prior papers ([Bu1], [Bu2]) that could be added as separate REF nodes.

propositions:
  GB0:
    statement: "Theorem 5.1 (Difference-N spanning theorem): For an N-graded Möbius vertex algebra V and N ∈ Z+, let X be a set of homogeneous representatives of a spanning set for V/C_{N+1}(V). Then V is spanned by monomials x^1_{n_1} x^2_{n_2} · · · x^k_{n_k} 1 where x_i ∈ X, n_i ∈ Z-, n_1 < n_2 < ... < n_k < 0, and n_i - n_{i+1} >= N for each i. The proof uses a family of difference-N filtrations and straightening identities derived from the VOA associativity identity."
    maps_to: [NV04-intersection-acceleration, EC08-compression-factoring, NV01-graph-necessity]
    attribution: "Buhl and Karaali (2008) — this is the paper's specific contribution"
    note: |
      The difference-N condition is an ordering constraint on how vertex operators
      can be composed. The spanning set using representatives of V/C_{N+1}(V) is a
      structured basis for the VOA — EC08 compression applied to the infinite-dimensional
      algebra. The result proves existence: any N-graded Möbius VOA has such a spanning
      set, for any N. This is the algebraic analog of NV01's existence clause: a
      graph-structured representation always exists.

      Precision note: the generating set X is not "minimal" in the sense of being smallest
      possible — it grows with N (larger N requires more generators from V/C_{N+1}(V)).
      The minimality is within the difference-N constraint: given the ordering condition,
      these are the necessary generators.
    potential_em: |
      GB0 + NV01 + EC08: the difference-N spanning theorem proves that an ordered,
      structured representation exists for any Möbius VOA. The difference condition
      is the algebraic analog of provenance ordering — vertex operators must be
      applied in a structured sequence. This is graph necessity (NV01) stated for VOAs:
      the ordered monomial basis IS the graph structure of the algebra, provably
      constructible under the N-grading constraint. (EM16 in the current graph.)

  GB1:
    statement: "Definition 2.1 (Möbius vertex algebra): A Möbius vertex algebra is a Z-graded vector space equipped with vertex operator map Y and a representation ρ of sl(2) (as a Lie subalgebra of the Virasoro algebra), satisfying the Jacobi identity, lower truncation, vacuum property, and creation property. It is a generalization of a conformal vertex algebra: the latter admits Virasoro (infinite-dimensional) symmetry; the former admits only sl(2) (three-dimensional) symmetry."
    maps_to: [EC01-context-bound, EC09-encoding-levels]
    attribution: "Huang, Lepowsky, and Zhang — paper explicitly states 'Möbius vertex algebras appear in the work of Huang, Lepowsky, and Zhang [H]'. Buhl-Karaali use the definition but did not introduce it."
    note: |
      The Möbius group (SL(2,C)) is the symmetry group of the Riemann sphere.
      A Möbius VA is intermediate: more constrained than a bare vertex algebra
      (no symmetry group), less constrained than a full VOA (Virasoro symmetry).
      This positions Möbius VAs between bare VAs and full CFTs. The EC09 encoding
      level analogy (Möbius level as intermediate encoding) is a structural
      observation, not a claim made in the paper.

  GB2:
    statement: "Definition 2.2 (N-graded Möbius vertex algebra): A Möbius vertex algebra V = ⊕_{n∈Z} V_n is N-graded if V_n = 0 for n < 0. This lower-truncation condition means the state space has no components below grade zero."
    maps_to: [EC09-encoding-levels, EC08-compression-factoring]
    attribution: "Standard VOA framework; used throughout the paper as a standing assumption."
    note: |
      N-grading means the grading is truncated from below (V_n = 0 for n < 0).
      This is the condition under which Theorem 5.1 is proved. The grade index n
      corresponds to the energy level (weight) of a state. Low-n states are lower
      weight (more primitive); high-n states are higher weight (built from compositions
      of lower-weight operators). The graded spanning set respects this structure.

