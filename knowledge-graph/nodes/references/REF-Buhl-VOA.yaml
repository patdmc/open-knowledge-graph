id: REF-Buhl-VOA
type: reference
name: "Buhl and Karaali (2008) — Spanning Sets for Möbius Vertex Algebras Satisfying Arbitrary Difference Conditions"
citation: "Buhl, G. and Karaali, G. (2008). Spanning sets for Möbius vertex algebras satisfying arbitrary difference conditions. Journal of Algebra, 320(8), 3345–3364."
doi: "10.1016/j.jalgebra.2008.06.038"
citation_status: VERIFIED
fidelity: low

context: |
  Geoff Buhl and Gizem Karaali work in the mathematical space of vertex operator algebras.
  This paper proves spanning set results for Möbius vertex algebras: for a suitably chosen
  generating set, any N-graded Möbius vertex algebra is spanned by monomials satisfying
  a difference-N ordering condition. This extends earlier difference-zero and difference-one
  results to arbitrary N. The difference conditions control the order in which vertex
  operators can be composed — the fundamental combinatorial structure of VOA computations.

propositions:
  GB0:
    statement: "Difference-N spanning theorem: for a suitably chosen generating set, any N-graded Möbius vertex algebra is spanned by monomials of vertex operators satisfying a difference-N ordering condition — meaning the mode indices in any monomial differ by at least N."
    maps_to: [NV04-intersection-acceleration, EC08-compression-factoring, NV01-graph-necessity]
    note: |
      The difference-N condition is a ordering constraint on how vertex operators
      (knowledge operators) can be composed. A spanning set satisfying difference-N
      is a minimal factored basis for the VOA — EC08 compression applied to the
      infinite-dimensional algebra. The result says you can always find such a basis:
      any VOA has a compressed (difference-N) spanning set, regardless of N. This is
      a generalization of NV01's two-option argument: at the context boundary, a
      compressed spanning representation always exists.
    potential_em: |
      GB0 + NV01 + EC08: the difference-N spanning theorem proves that a factored
      (ordered, compressed) representation exists for any Möbius VOA. The 'difference
      condition' is the algebraic analog of provenance ordering — vertex operators must
      be applied in a structured sequence, not arbitrarily. This is graph necessity
      (NV01) stated for VOAs: the ordered monomial basis IS the graph structure of the
      algebra, and it is provably constructible under the N-grading constraint.

  GB1:
    statement: "Möbius vertex algebra: a vertex algebra equipped with a Möbius symmetry — an action of the Möbius group SL(2,C) on the state space. Weaker than a full VOA (which has Virasoro symmetry); stronger than a bare vertex algebra."
    maps_to: [EC01-context-bound, EC09-encoding-levels]
    note: |
      The Möbius group = the symmetry group of the Riemann sphere (the simplest bounded
      context). A Möbius VA is a vertex algebra whose context has Möbius (fractional
      linear) symmetry — a weaker constraint than full conformal (Virasoro) symmetry.
      This positions Möbius VAs as intermediate: more constrained than bare VAs,
      less constrained than full CFTs. EC09 encoding levels have an analog: the Möbius
      level is the intermediate encoding between raw vertex algebra (L0) and full CFT (L3).

  GB2:
    statement: "N-grading: the state space V = ⊕_{n≥0} V_n decomposes into graded pieces. The grading is preserved under the VOA operations. Spanning sets can be chosen to respect the grading — graded spanning sets are more computationally tractable."
    maps_to: [EC09-encoding-levels, EC08-compression-factoring]
    note: |
      N-grading of the VOA = encoding level structure. V_n for low n = the low-level
      (crystallized, frequently used) states; V_n for high n = the high-level (contextual,
      rare) states. The graded spanning set respects this structure — it is the factored
      representation that preserves encoding-level information.

  GB3:
    statement: "Fusion rules for VOA modules: given modules M_1 and M_2 for a VOA V, the fusion product M_1 ⊗_V M_2 is determined by the intertwining operators between them. Fusion rules encode which module combinations are permitted by the algebraic structure."
    maps_to: [NV04-intersection-acceleration, BO1-locality-axiom]
    note: |
      Fusion rules = the formal rule for K_i and K_j intersection. The intertwining
      operator from M_1 ⊗ M_2 to M_3 is the provenance-verified edge in UB language.
      NV04 (intersection accelerates M) is the physical consequence of valid fusion.

  GB2:
    statement: "Characterization of VOAs: a VOA V is characterized by its central charge c, its weight-graded structure (the spectrum of L_0 eigenvalues), and its fusion category. Two VOAs with the same characterization data are isomorphic."
    maps_to: [EC01-context-bound, EC08-compression-factoring]
    note: |
      Characterization = the minimal sufficient description. The central charge c + weight
      spectrum + fusion category is the minimal factored representation (EC08) of the
      VOA — everything recoverable from these three data. This is graph structure applied
      to algebraic objects: the VOA is fully encoded by its structural invariants.

  GB3:
    statement: "Module categories for rational VOAs form modular tensor categories: the fusion category has a well-defined notion of braiding and duality, and the S-matrix (encoding the mutual statistics of modules) transforms under the modular group."
    maps_to: [EC07-collective-knowledge, EM09-collective-intelligence-thermodynamically-favored]
    note: |
      Modular tensor category = the full structure of K_collective interaction rules.
      The S-matrix encodes how any two modules (K_i and K_j) braid around each other
      — their mutual information in algebraic terms. The modular group symmetry says
      this interaction structure is invariant under context changes (modular
      transformations), which is the algebraic form of provenance persistence.

