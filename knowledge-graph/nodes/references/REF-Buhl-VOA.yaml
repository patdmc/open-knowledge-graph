validation_notes: |
  Paper text read in full (arXiv:0803.3819, 26 pages). Validation findings:

  GB0: ACCURATE — Theorem 5.1 states exactly what the node claims. The "difference-N
  ordering condition with mode indices differing by at least N" matches the paper's
  statement precisely (n_i - n_{i+1} >= N).

  GB1: ACCURATE description, CORRECTED attribution — paper explicitly credits
  Huang-Lepowsky-Zhang for the Möbius VA concept. Buhl-Karaali use the definition,
  they did not introduce it.

  GB2: ACCURATE — Definition 2.2 in the paper.

  REMOVED (were in prior version as duplicate GB2 and GB3 entries):
  - Characterization by central charge + weight spectrum + fusion category: NOT IN PAPER
  - Fusion rules for VOA modules: NOT IN PAPER
  - Modular tensor categories / S-matrix: NOT IN PAPER
  These are standard VOA theory concepts that do not appear in this spanning-set paper.
  They should be attributed to FLM (1988), Huang, and the broader VOA literature if
  they are to be included in the graph — in a separate REF-VOA-Theory.yaml node.

  STATUS: Updated from PENDING_CITATION_VERIFICATION to VERIFIED.

gap_analysis:
  present_here_not_in_ub:
    - "Difference-N filtration family — formal mechanism for the spanning set construction"
    - "Straightening identities — explicit algebraic identities for rewriting monomials"
    - "Poincaré-Birkhoff-Witt-like basis structure for infinite-dimensional algebras"
  present_in_ub_not_here:
    - "Survival threshold — VOA theory has no selection pressure"
    - "A parameterization — all states participate by construction"
    - "K/F grounding relation — the paper proves spanning sets exist, not which ones are action-relevant"
    - "Graph necessity proof — the paper proves existence of a structured basis; UB proves necessity"

