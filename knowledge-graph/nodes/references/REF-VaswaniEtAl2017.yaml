validation_notes: |
  Paper text read in full (arXiv:1706.03762v7, 15 pages). Validation findings:

  TR1 ACCURATE: Self-attention formula Attention(Q,K,V) = softmax(QK^T/sqrt(dk))V is exactly
  as stated. The description "each position attends to all other positions, weighted sum of values,
  weights from query-key dot product" matches the paper's Section 3.2.1 precisely.

  TR2 ACCURATE: Paper explicitly states all positions are processed simultaneously (no recurrence);
  positional encoding supplies sequential information (Section 3.5). The parallel processing claim
  is the paper's central motivation (Section 1: "more parallelizable").

  TR3 ACCURATE: Direct quote from paper: "Multi-head attention allows the model to jointly attend
  to information from different representation subspaces at different positions." h=8 heads,
  dk=dv=64, dmodel=512 confirmed from Section 3.2.2.

  TR4 ACCURATE AS STRUCTURAL CLAIM, PRECISION NOTE ADDED: The context window concept is real for
  Transformers; the paper discusses O(n^2) attention over full sequences with possible restriction
  to neighborhood size r. The specific "512" in "512–128k" refers to d_model in the paper, not a
  context window; the 128k range refers to later implementations. Precision note added to node.

  STATUS: TR1, TR2, TR3 VERIFIED from paper text. TR4 ACCURATE in substance with precision note.

