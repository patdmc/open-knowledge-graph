validation_notes: |
  Verification conducted 2025. JA1-JA3 are accurately stated as core results of the 1957 Physical
  Review paper 'Information Theory and Statistical Mechanics': MaxEnt as the prior-selection rule
  (JA1), statistical mechanics as Bayesian inference under MaxEnt (JA2), and insufficient reason
  as the uniform-prior special case (JA3). These are the paper's main contributions.

  JA4 ATTRIBUTION CORRECTION: Bayesian updating derivable from Cox's axioms is NOT from Jaynes
  (1957). Cox's probability-as-logic framework is from Cox (1946); the systematic derivation
  of Bayesian inference from Cox's axioms is developed in Jaynes' 'Probability Theory: The Logic
  of Science' (2003). The 1957 paper does not discuss Cox's axioms. JA4 has been flagged with an
  attribution_note; a future REF-Cox1946 or REF-Jaynes2003 node would be the correct home.

  Status: JA1, JA2, JA3 ACCURATE for Jaynes (1957). JA4 MISATTRIBUTED to 1957 paper.

