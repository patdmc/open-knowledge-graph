id: REF-Thrun1998
type: reference
fidelity: low
name: "Thrun and Pratt (1998) — Learning to Learn"
statement: |
  Introduces meta-learning: agents that improve their learning algorithm over time, not just
  their performance. Key propositions:

  TH1 (meta-learning): An agent can learn to learn — improve the learning mechanism M,
       not just the outputs of M. This is the empirical grounding for eta_M (the efficiency
       of M itself as an improvable quantity).
  TH2 (inductive bias transfer): Learned structure from past tasks improves learning on
       new tasks. The learned bias IS the K/F structure — retained compressed knowledge
       that accelerates new grounding.
  TH3 (task distribution): Meta-learning works when tasks are drawn from a distribution
       that shares structure. Grounding for the K/F intersection — shared structure is
       exactly what the intersection detects.

provenance:
  attribution:
    author: "Sebastian Thrun and Lorien Pratt"
