context: |
  Calvin Lin's research spans three domains all directly relevant to UB:
  (1) Cache replacement — the decision of which knowledge to evict when C_n is full.
      Belady's OPT algorithm is the theoretical optimum, but it requires knowing the
      future (uncomputable in practice). Lin's work approximates this optimum.
  (2) Pointer analysis — flow-sensitive program analysis produces a data-flow graph
      (the SSA/def-use graph) that is formally the K/F graph in compiler language.
  (3) Parallel programming — multi-processor systems instantiate NV04 at the
      hardware level; synchronization cost = provenance verification cost.

propositions:
  CL1:
    statement: "Belady's OPT (MIN) algorithm: the theoretically optimal cache replacement policy — always evict the item whose next use is furthest in the future. OPT minimizes cache misses but requires knowing future access patterns, making it uncomputable in practice."
    maps_to: [EC01-context-bound, EC09-encoding-levels, KC4-uncomputability]
    source: "Back to the Future (ISCA 2016); Effective Mimicry of Belady's MIN Policy (HPCA 2022)"
    note: |
      Belady's OPT is the limit at C_n: the theoretically optimal eviction policy
      requires knowing the future (full access to W's temporal dimension) — it is
      the oracle that achieves M → N for cache contents. Lin's core contribution is
      approximating this uncomputable optimum with computable heuristics. This is
      the engineering instantiation of KC4: the optimal compression decision is
      uncomputable, so we gradient-descend toward it with learned approximations.
    potential_em: |
      CL1 + KC4 + EC08: Belady's OPT is the K management oracle that cannot be
      computed exactly. Lin's work shows that Hawkeye/PC-OPT can approximate it
      closely using program counter history — a finite, computable representation
      (the K of the memory system) that approximates the uncomputable ideal.
      This is the engineering proof of the KC4 + EC05 emergent: the gradient
      toward optimal K descends toward an uncomputable target, and approximate
      computable representations converge toward it from below.

  CL2:
    statement: "Cache coherence in parallel systems: when multiple processors share memory, maintaining a consistent view across caches requires a coherence protocol. Coherence overhead scales with the number of processors and the sharing pattern."
    maps_to: [NV04-intersection-acceleration, EC07-collective-knowledge]
    note: |
      Cache coherence = K_collective provenance maintenance. Each processor (K_i entity)
      maintains a local cache (K_i) that must stay consistent with shared memory
      (K_collective). The coherence protocol is the provenance verification mechanism:
      every write to shared memory must be tracked and propagated. Coherence overhead
      = the cost of maintaining K_collective edges — exactly the tradeoff EM10 flags.
    potential_em: |
      CL2 + EM10 + NV04: cache coherence protocols are the engineering solution to the
      K_collective maintenance problem EM10 identifies. The MESI protocol (Modified,
      Exclusive, Shared, Invalid) is a 4-state provenance tracking system for shared
      knowledge. Coherence failure (stale cache) = K_collective losing provenance
      verification = the failure mode EM10 describes. Cache coherence theory provides
      the engineering implementation of K_collective maintenance.

  CL3:
    statement: "Parallelism: independent computations can execute simultaneously, reducing wall-clock time. Amdahl's law bounds speedup: if fraction f of computation is parallelizable, max speedup = 1/(1-f). Serial bottlenecks dominate at scale."
    maps_to: [NV04-intersection-acceleration, EC02-improvement-rate]
    note: |
      Amdahl's law bounds the acceleration from parallelism — exactly what NV04
      (intersection acceleration) requires for an upper bound. NV04 says K_collective
      intersection provides |K_j \\ K_i| new dimensions per operation. Amdahl says
      this parallelism is bounded by the serial fraction. The serial fraction in
      K_collective = the provenance verification step (must be sequential for correctness).

  CL4:
    statement: "Flow-sensitive pointer analysis: the def-use and points-to graph represents, for each program point, which pointers may point to which locations. Flow-sensitive analysis maintains a separate state at each program point — it is indexed by control flow (the action space)."
    maps_to: [EC08-compression-factoring, NV01-graph-necessity, EC06-belief-as-action]
    source: "Semi-Sparse Flow-Sensitive Pointer Analysis (POPL 2009); Flow-Sensitive Pointer Analysis for Millions of Lines of Code (CGO 2011)"
    note: |
      Flow-sensitive pointer analysis IS the K/F graph in compiler theory. The
      points-to graph (K) is indexed by program point (F — the set of reachable
      program states). Flow-insensitive analysis = K without F coupling (loses
      precision). Flow-sensitive = K indexed by F (maximum precision). NV01 states
      that K must be indexed by F for information preservation — this is exactly
      what flow-sensitivity achieves. The CGO 2011 Best Paper and 2023 Test of Time
      Award confirm this is the right representation at scale.

  CL5:
    statement: "Hierarchical neural prefetching: a neural sequence model (LSTM) learns temporal access patterns from PC-address history and predicts future cache misses. The hierarchy matches the memory hierarchy — different models for L1, L2, and off-chip prefetch."
    maps_to: [EC02-improvement-rate, EC01-context-bound, NV03-agency-as-gate]
    source: "A Hierarchical Neural Model of Data Prefetching (ASPLOS 2020)"
    note: |
      Neural prefetching = A > 0 applied to memory. The prefetcher is an entity
      with A = probability of pre-fetching a line before it is needed. The LSTM
      learns eta_M for memory access patterns: it improves its world model of future
      accesses. The hierarchy (separate models per cache level) is the encoding-level
      structure: each level has its own K with its own C_n constraint.
      The temporal access sequence is W's temporal dimension; the PC-address history
      is the K the prefetcher maintains. This is the most precise engineering
      instantiation of the full UB framework (A, eta_M, C_n, K/F coupling) in hardware.

