    bibtex_key: "Friston2017"
  evidence:
    type: cited
    description: |
      The FEP companion document is referenced in the main paper. FEP1 overlaps with the
      bounded-context structure (OV01); FEP6 is in tension with the M < N bound (EM02);
      FEP7 (assumed graph structure) is grounded by Theorem 2b Part 3 (EM03); FEP8
      (no A parameterization) is the same gap as Schmidhuber S4 — addressed by NV03.
    references: [T02-graph-structure-necessity, NV02-mn-bound, NV03-agency-as-gate]
  derivation:
