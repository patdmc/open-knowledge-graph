id: REF-Friston2017
type: reference
fidelity: low
name: "Friston et al. (2017) — Active Inference: A Process Theory"
statement: |
  Active inference extends the free-energy principle to a process theory of action and
  perception: agents minimize variational free energy under a hierarchical generative model
  by simultaneously updating beliefs (perception) and acting to fulfill predictions (action).
  Key propositions:

  FEP1 (free energy minimization): Agents minimize F = E_q[log q(s) - log p(o,s)], where
       q is the approximate posterior over hidden states s, p is the generative model, and
       o are observations. F is an upper bound on surprise (negative log evidence).
  FEP2 (active inference): Action minimizes expected free energy — the expected surprise of
       future observations given a policy. This unifies epistemic (exploratory) and
       instrumental (goal-directed) behavior.
  FEP3 (hierarchical generative models): The generative model is hierarchically structured;
       each level predicts the level below and passes prediction errors upward.
  FEP4 (precision weighting): Attention is formally precision — the confidence in
       prediction errors at each level. High precision = more influence on updating.
  FEP5 (Markov blanket): The agent is defined by its Markov blanket — the set of states
       that separate internal states from external states. Agency = Markov blanket dynamics.
  FEP6 (long-run equilibrium): In the long run, free energy minimization approaches an
       equilibrium where the generative model closely approximates the generative process.
       This implies surprise approaches its minimum — an equilibrium state.
  FEP7 (assumed graph structure): The generative model is hierarchically (graph) structured
       by assumption. The necessity of this structure is not derived within FEP.
  FEP8 (no A parameterization): Engagement with the environment is defined by the Markov
       blanket — there is no separate parameter for engagement probability. The agent always
       minimizes free energy by definition.

