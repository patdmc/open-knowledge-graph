    method: "External citation — not derived from this framework"

edges:
  - to: OV01-bounded-world-model
    relation: grounds
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Novelty Analysis — Knowledge Graph"
        date: "2025"
      evidence:
        type: cross-framework-analysis
        description: |
          FEP1 grounds OV01: both frameworks independently ground that agents operate under
          a bounded internal representation of W. FEP grounds this via the Markov blanket
          + approximate posterior; UB grounds it via C_n (bounded context window).
      derivation:
        method: "Intersection of FEP1 and D01-world-state-space / D02-knowledge-graph"

  - to: OV03-nontermination
    relation: grounds
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Novelty Analysis — Knowledge Graph"
        date: "2025"
      evidence:
        type: cross-framework-analysis
        description: |
          FEP6 (equilibrium approached but never fully reached in open environments) overlaps
          with Theorem 3 Part II (M < N always). Both ground non-termination of learning.
          The FEP grounding is informal (equilibrium requires stationary environment);
          the UB grounding is formal (M < N derived from C_n and execution dynamics).
      derivation:
        method: "Intersection of FEP6 and T03-agency-produces-gradient-descent Part II"

  - to: EM02-fep-mn-qualification
    relation: grounded_in
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Novelty Analysis — Knowledge Graph"
        date: "2025"
      evidence:
        type: emergent
        description: |
          FEP6 (equilibrium approached) is in tension with NV02 (M < N, never fully sensed).
          This tension is only visible when both frameworks are held simultaneously.
      derivation:
        method: "Intersection of FEP6 and NV02-mn-bound"

  - to: EM03-graph-necessity-grounds-fep
    relation: grounded_in
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Novelty Analysis — Knowledge Graph"
        date: "2025"
      evidence:
