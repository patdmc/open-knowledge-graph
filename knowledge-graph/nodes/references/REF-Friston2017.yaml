        description: |
          FEP7 (hierarchical graph structure assumed) is grounded by NV01 (graph structure
          necessary by information-preservation proof). UB provides the derivation FEP needs.
      derivation:
        method: "Intersection of FEP7 and NV01-graph-necessity"
