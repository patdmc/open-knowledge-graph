id: EC01-bounded-context
type: equivalency-class
name: "Bounded Internal Representation: C_n = Approximate Posterior = Global Workspace Capacity"
underlying_proposition: |
  Any physically instantiated cognitive agent has a strictly bounded capacity for internal
  representation at any moment. The internal state cannot be W itself — it is always a
  finite, compressed projection. This bound is a hard constraint, not an approximation
  error that shrinks over time.

members:
  - id: UB-Cn
    framework: "Uncertainty Bounding"
    formulation: |
      C_n: the bounded context window at each inference step. Only M propositions can
      be held in context simultaneously. Formally defined in Definition 8.
    epistemic_status: formal-definition
    derivation: "Defined as the inference capacity; used to derive M < N in Theorem 3 Part II"

  - id: FEP-approx-posterior
    framework: "Friston (2010, 2017)"
    formulation: |
      The agent's approximate posterior q(s) is bounded by the complexity of its
      generative model. q(s) != p(s) because the model has finite parameters.
      Variational free energy is positive precisely because q != p.
    epistemic_status: theoretical-assumption
    derivation: "Foundational to FEP — the approximate posterior is definitionally not the true posterior"

  - id: GWT-workspace-capacity
    framework: "Baars (1988), Dehaene (2011)"
    formulation: |
      The global workspace has strictly limited capacity — only a small amount of
      information is globally broadcast at once. Below the workspace threshold,
      processing is local and bounded.
    epistemic_status: empirical
    derivation: "Empirically observed: working memory capacity ~7±2 items (Miller 1956); neural workspace ignition is capacity-limited"

  - id: KH-finite-attention
    framework: "Kahneman (2011)"
    formulation: |
      System 2 (deliberate attention) is a finite resource that depletes.
      Cognitive load limits the amount of information processed deliberately.
    epistemic_status: empirical
    derivation: "Extensive experimental evidence: dual-task interference, ego depletion, attention as resource"

  - id: CO2-holographic-bound
    framework: "Polchinski (1998) / Bekenstein (1973) — Holographic Bound"
    formulation: |
      The Bekenstein-Hawking entropy bound establishes that the maximum information
      content of a physical region is proportional to its boundary area, not its
      volume: S_max = A / (4 * G_N) in Planck units. This is the absolute physical
      upper bound on C_n for any agent embedded in spacetime. No physically realizable
      cognitive system can hold more information in context than its boundary area allows.
      EM18 shows that C_n = A / 4G_N: the holographic bound IS the physical derivation
      of bounded context. The bounded context axiom (C_n) is not a simplification
      assumption — it is a consequence of quantum gravity. Any agent with a finite
      physical boundary has a finite C_n bounded by that boundary's area.
    epistemic_status: formal-theoretical
    derivation: "EM18: C_n = holographic bound; from REF-Polchinski1998, REF-Bekenstein1973"

  - id: MI3-chunking-extends-context
    framework: "Miller (1956) — Chunking and the Magical Number Seven"
    formulation: |
      Miller's central finding: working memory holds 7±2 chunks, not 7±2 primitive
      items. Chunking is the mechanism that extends effective context: by grouping
      items into higher-order units, the agent encodes more information within the
      same C_n limit. A chess master's 7 chunks represent more board structure than
      a novice's 7 individual piece positions. Chunking is the cognitive implementation
      of the K/F graph's factoring operation (EC08): shared structure extracted from
      individual items into a chunk = a graph node that compresses the items.
      This means C_n is not fixed in raw information content — it is fixed in chunk
      count, and the information per chunk grows with domain expertise (deeper K-graph).
      The effective context window is C_n * (average information per chunk), and this
      product scales with K-graph density.
    epistemic_status: empirical
    derivation: "MI3: chunking as context extension mechanism; from REF-Miller1956; connects to EC08 factoring"

equivalence_analysis: |
  These six formulations express the same constraint at different levels of analysis:
  - Physical level: finite neural/computational substrate = finite representation capacity
  - Information-theoretic level (UB): C_n defines the bound precisely as context window
  - Statistical level (FEP): approximate posterior is bounded by model complexity
  - Cognitive level (GWT): global workspace has empirically measured capacity
  - Psychological level (Kahneman): attention is a finite resource

  The formal translation: C_n (UB) = dim(q(s)) (FEP) = workspace capacity (GWT)
  = A/4G_N (holographic bound) = chunk-capacity (Miller).
  All five describe the same constraint at different levels. UB provides the most
  formal cognitive definition; GWT provides the empirical grounding; FEP provides
  the statistical mechanics; the holographic bound provides the physical derivation;
  chunking provides the mechanism for working within the bound.

  The holographic derivation (CO2) is the strongest grounding: it shows the bounded
  context is not a cognitive or computational simplification but a physical law.
  The chunking mechanism (MI3) is the most practically relevant: it explains why
  expert knowledge (dense K-graphs) enables effective use of a fixed C_n.

  Strength of equivalence: HIGH. All five independently converge on the same
  structural constraint.

confidence_C1p:
  estimate: 0.94
  basis: "Six independent frameworks: empirical evidence from cognitive science (Miller, GWT, Kahneman), formal grounding in information theory (FEP), physical derivation from quantum gravity (holographic bound), formal definition (UB). Updated from 0.92 with holographic and chunking additions."
  weakest_link: "The exact quantitative equivalence C_n = dim(q(s)) = workspace capacity is not formally proven"

contradictions: []

implications_for_ub: |
  C_n is one of UB's most secure premises. Four independent frameworks converge on it.
  This means theorems that rest on C_n (Theorem 2b Part 3, Theorem 3 Part II) inherit
  this high C_1(p) for their premise.

