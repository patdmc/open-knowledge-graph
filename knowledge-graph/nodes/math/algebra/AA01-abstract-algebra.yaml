id: AA01-abstract-algebra
type: knowledge
domain: algebra
name: "Abstract Algebra"

concepts:
  # === Groups ===
  - id: group
    name: "Group"
    latex: "(G, \\cdot)"
    meaning: "set with associative binary operation, identity element, and inverses"
    axioms:
      - "closure: a, b in G => a*b in G"
      - "associativity: (a*b)*c = a*(b*c)"
      - "identity: exists e s.t. e*a = a*e = a"
      - "inverse: for all a, exists a^{-1} s.t. a*a^{-1} = e"

  - id: abelian_group
    name: "Abelian Group"
    latex: "(G, +)"
    meaning: "group where operation is commutative: a*b = b*a"
    examples: ["(Z, +)", "(R*, *)", "(Z/nZ, +)"]

  - id: group_order
    name: "Group Order"
    latex: "|G|"
    meaning: "number of elements in the group"
    action:
      sympy: "G.order()"

  - id: element_order
    name: "Element Order"
    latex: "\\text{ord}(g) = \\min\\{n > 0 : g^n = e\\}"
    meaning: "smallest positive power returning identity"

  - id: subgroup
    name: "Subgroup"
    latex: "H \\leq G"
    meaning: "subset of G that is itself a group under the same operation"
    test: "H nonempty, closed under operation and inverses"

  - id: cyclic_group
    name: "Cyclic Group"
    latex: "\\langle g \\rangle = \\{g^n : n \\in \\mathbb{Z}\\}"
    meaning: "group generated by a single element"
    action:
      sympy: "CyclicGroup(n)"
    curried: "lambda n: sympy.combinatorics.named_groups.CyclicGroup(n)"

  - id: symmetric_group
    name: "Symmetric Group"
    latex: "S_n"
    meaning: "group of all permutations of n elements; |S_n| = n!"
    action:
      sympy: "SymmetricGroup(n)"
    curried: "lambda n: sympy.combinatorics.named_groups.SymmetricGroup(n)"

  - id: permutation
    name: "Permutation"
    latex: "\\sigma \\in S_n"
    action:
      sympy: "Permutation([...])"
    curried: "lambda cycles: sympy.combinatorics.Permutation(cycles)"

  - id: coset
    name: "Coset"
    latex: "gH = \\{gh : h \\in H\\}"
    meaning: "left coset of H by g; partitions G into equal-size blocks"

  - id: normal_subgroup
    name: "Normal Subgroup"
    latex: "N \\trianglelefteq G"
    meaning: "gNg^{-1} = N for all g in G; kernel of any homomorphism is normal"
    test: "gN = Ng for all g"

  - id: quotient_group
    name: "Quotient Group"
    latex: "G / N"
    meaning: "group of cosets of normal subgroup N"

  - id: homomorphism
    name: "Group Homomorphism"
    latex: "\\phi: G \\to H, \\quad \\phi(ab) = \\phi(a)\\phi(b)"
    meaning: "structure-preserving map between groups"

  - id: isomorphism
    name: "Group Isomorphism"
    latex: "G \\cong H"
    meaning: "bijective homomorphism — groups are structurally identical"

  - id: kernel
    name: "Kernel"
    latex: "\\ker(\\phi) = \\{g \\in G : \\phi(g) = e_H\\}"
    meaning: "elements mapping to identity; always a normal subgroup"

  - id: image
    name: "Image"
    latex: "\\text{im}(\\phi) = \\{\\phi(g) : g \\in G\\}"
    meaning: "range of homomorphism; always a subgroup of H"

  - id: direct_product
    name: "Direct Product"
    latex: "G \\times H"
    meaning: "cartesian product with componentwise operation"
    action:
      sympy: "DirectProduct(G, H)"

  # === Rings ===
  - id: ring
    name: "Ring"
    latex: "(R, +, \\cdot)"
    meaning: "abelian group under +, monoid under *, with distributivity"
    axioms:
      - "abelian group under +"
      - "associative multiplication"
      - "distributive: a(b+c) = ab + ac"

  - id: commutative_ring
    name: "Commutative Ring"
    meaning: "ring where multiplication commutes: ab = ba"
    examples: ["Z", "Z[x]", "R[x]"]

  - id: integral_domain
    name: "Integral Domain"
    meaning: "commutative ring with unity and no zero divisors"
    property: "ab = 0 => a = 0 or b = 0"

  - id: ideal
    name: "Ideal"
    latex: "I \\trianglelefteq R"
    meaning: "subgroup under + that absorbs multiplication: rI ⊆ I and Ir ⊆ I"

  - id: principal_ideal
    name: "Principal Ideal"
    latex: "(a) = \\{ra : r \\in R\\}"
    meaning: "ideal generated by a single element"

  - id: quotient_ring
    name: "Quotient Ring"
    latex: "R / I"
    meaning: "ring of cosets of ideal I"

  - id: ring_homomorphism
    name: "Ring Homomorphism"
    latex: "\\phi(a+b) = \\phi(a)+\\phi(b), \\quad \\phi(ab) = \\phi(a)\\phi(b)"

  - id: polynomial_ring
    name: "Polynomial Ring"
    latex: "R[x]"
    meaning: "ring of polynomials with coefficients in R"
    action:
      sympy: "Poly(expr, x, domain='ZZ')"

  # === Fields ===
  - id: field
    name: "Field"
    latex: "(F, +, \\cdot)"
    meaning: "commutative ring where every nonzero element has a multiplicative inverse"
    examples: ["Q", "R", "C", "F_p (p prime)", "Q(sqrt(2))"]

  - id: finite_field
    name: "Finite Field"
    latex: "\\mathbb{F}_q \\text{ where } q = p^n"
    meaning: "field with finitely many elements; exists iff order is prime power"
    action:
      sympy: "GF(p)"
    curried: "lambda p: sympy.GF(p)"

  - id: field_extension
    name: "Field Extension"
    latex: "K / F"
    meaning: "field K containing F as subfield"

  - id: vector_space
    name: "Vector Space"
    latex: "V \\text{ over } F"
    meaning: "abelian group with scalar multiplication by field F satisfying linearity"
    links: [A02-linear-algebra]

  # === Key Theorems ===

theorems:
  - name: "Lagrange's Theorem"
    latex: "H \\leq G \\implies |H| \\mid |G|"
    meaning: "order of subgroup divides order of group"

  - name: "First Isomorphism Theorem"
    latex: "G / \\ker(\\phi) \\cong \\text{im}(\\phi)"

  - name: "Cayley's Theorem"
    statement: "every group is isomorphic to a subgroup of some symmetric group"

  - name: "Sylow Theorems"
    statement: "for |G| = p^a * m with gcd(p,m)=1: subgroups of order p^a exist, are conjugate, and n_p ≡ 1 (mod p)"

  - name: "Fundamental Theorem of Finite Abelian Groups"
    statement: "every finite abelian group is a direct product of cyclic groups of prime-power order"

  - name: "Classification of Finite Simple Groups"
    statement: "every finite simple group is cyclic of prime order, alternating (n>=5), a group of Lie type, or one of 26 sporadic groups"

edges:
  - to: A01-algebra-fundamentals
    relation: REQUIRES
  - to: A02-linear-algebra
    relation: REQUIRES
    note: "vector spaces, linear maps as group/ring homomorphisms"
  - to: NT01-number-theory
    relation: REQUIRES
    note: "Z/nZ, Euler's theorem, finite fields"
  - to: N03-set-logic-notation
    relation: REQUIRES
