id: D07-informed-action
type: definition
number: 3
name: "Informed Action Space"
statement: |
  Let F subset (K x W_obs -> Delta_A) be a set of functions, where W_obs is an entity's
  observable projection of W and Delta_A is a distribution over possible actions. Each
  element f in F has type f : K x W_obs -> Delta_A. F is the complete set of informed
  actions available to an entity.

  An informed action f in F is an action grounded in K, validated against W, and attributed
  to its origins: one that knows why it works. An uninformed action (grounded in no K) is
  not an element of F. Knowledge with no action potential is not an element of F either;
  it is data. An informed action is specifically the coupling: knowledge that enables action,
  action that is justified by knowledge.

  F carries graph structure. The elements of F are nodes; typed relations between them are
  edges. This structure is forced by the same three constraints (retrieval O(|F^[f]|),
  bounded C_n, deduplication) that force K to be a directed graph (Theorem 2b Part 3).

  Edge types on F:
  - depends_on: hard dependencies between actions (feasibility constraints)
  - recommends_before/after: probabilistic ordering evidence (soft gradient directions)
  - enhanced_by: combined actions that outperform either alone

  F is discrete as a graph — a set of nodes connected by typed edges. Each individual f in F
  maps into Delta_A, a probability simplex, which is continuous and metrizable. Gradient
  descent in F is traversal on this discrete graph, directed by the continuous-valued G(f',K)
  at each adjacent node: discrete steps, continuously-valued objective.

