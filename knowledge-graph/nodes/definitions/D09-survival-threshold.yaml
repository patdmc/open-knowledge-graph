  - to: T03-agency-produces-gradient-descent
    relation: grounds
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Uncertainty Bounding as the Basis of Intelligence: A Formal Theory"
        date: "2025"
      evidence:
        type: formal-derivation
        description: "The survival threshold is the mechanism by which W compels gradient descent: entities that do not update face U > U_lethal^d and are removed"
      derivation:
        method: "Theorem 3 Part I uses U_lethal^d to establish that gradient descent is non-elective"

  - to: T04-rigor-threshold
    relation: grounds
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Uncertainty Bounding as the Basis of Intelligence: A Formal Theory"
        date: "2025"
      evidence:
        type: formal-derivation
        description: "The cost C_i in Theorem 4 is the cost of failure at encoding level L_i, grounded by U_lethal^d"
      derivation:
        method: "Theorem 4 derives theta_i = 1 - epsilon/C_i where C_i is failure cost, which for L_0 is lineage survival"
