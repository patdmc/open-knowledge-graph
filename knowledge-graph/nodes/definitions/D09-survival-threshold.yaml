        description: "U_lethal^d is imposed by W — the survival threshold is a property of W acting on the entity, not a preference of the entity"
      derivation:
        method: "Definition 9 explicitly states 'imposed by W'"

  - to: D03-uncertainty
    relation: derives_from
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Uncertainty Bounding as the Basis of Intelligence: A Formal Theory"
        date: "2025"
      evidence:
