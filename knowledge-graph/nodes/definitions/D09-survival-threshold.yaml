id: D09-survival-threshold
type: definition
number: 9
name: "Survival Threshold"
statement: |
  For entity E in domain d subset W, there exists a threshold U_lethal^d such that:

    U(w, K) > U_lethal^d => E does not survive in d

  Above this threshold, uncertainty is so high that the entity cannot act effectively enough
  to persist. U_lethal^d is not a choice or a preference; it is imposed by W.

  The lethality threshold is domain-specific: U_lethal^d applies to domain d subset W.
  An entity may survive in some domains while failing in others, depending on its K relative
  to each domain's threshold.

  In the engineering context (Section 1), U_lethal^d is concrete: exceeding token budget,
  latency threshold, or error rate across the repository fleet. Selection pressure was cost,
  not death. The gradient was real. The convergence was measured.

provenance:
  attribution:
    author: "Patrick McCarthy"
    source: "Uncertainty Bounding as the Basis of Intelligence: A Formal Theory"
    date: "2025"
    doi: "10.5281/zenodo.18923066"
  evidence:
    type: axiomatic
    description: "Foundational assumption: W imposes a survival threshold. This is not derived but asserted as a property of any world in which entities can fail. It is necessary for selection pressure to operate and for gradient descent to be non-elective (Theorem 3 Part I)."
    references: []
  derivation:
    from: [D01-world-state-space, D03-uncertainty]
    method: "U_lethal^d is the threshold above which the entity's uncertainty in domain d is incompatible with continued existence. Its existence follows from the assumption that W can destroy entities."

edges:
