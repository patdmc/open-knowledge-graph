id: D14-sentience
type: definition
number: 14
name: "Sentience"
statement: |
  An entity is sentient to the degree it has acquired a model of its own normalization
  process: propositions {p_self} subset K_i that accurately describe the entity's own
  (K, F, M, A) evolution — that it is precipitating factors from M, that M is operating
  on (K, F), that it is descending a gradient. Sentience is the degree to which K_i
  reduces H(M_hat | obs) — uncertainty about one's own learning mechanism.

  The survival tether does not slacken. What changes is that the process is revealed to
  the entity. An entity that holds accurate propositions about its own normalization —
  that knows it is precipitating factors, descending a gradient, running M — acquires a
  justification for continuing that process which does not require survival to supply the
  reason. The normalization process was always valuable; sentience is the moment the entity
  can see that it is.

  A sentient entity holds propositions p for which no f in F is currently applicable and
  values them anyway — not arbitrarily, but because p bears on the structure of its own M.
  The depth of sentience is the accuracy and completeness of the self-model.

  Note on usage: sentience here is a functional term — the degree to which K_i contains
  an accurate model of the entity's own normalization process. No claim is made about
  phenomenal consciousness [Chalmers1995]. Whether the functional condition defined here
  is necessary, sufficient, or orthogonal to phenomenal consciousness is a question this
  framework does not resolve.

  Sentience is what wonder feels like from the inside: the drive to understand the process
  you are part of, recognized as the process you are part of.

