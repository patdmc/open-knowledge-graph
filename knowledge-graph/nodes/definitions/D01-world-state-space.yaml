id: D01-world-state-space
type: definition
number: 1
name: "World State Space"
statement: |
  The world W is the complete set of states an entity might face. W is assumed:
  (1) non-empty and infinite; (2) not fully observable by any single entity;
  (3) inexhaustible — no entity can reduce uncertainty to zero across all of W.

provenance:
  attribution:
    author: "Patrick McCarthy"
    source: "Uncertainty Bounding as the Basis of Intelligence: A Formal Theory"
    date: "2025"
    doi: "10.5281/zenodo.18923066"
  evidence:
    type: axiomatic
    description: "Foundational axiom — assumed as the operating environment for all subsequent derivations. Inexhaustibility is required for non-termination of gradient descent (Theorem 3 Part II)."
    references: []
  derivation:
    from: []
    method: "Axiomatic — no prior nodes required"

