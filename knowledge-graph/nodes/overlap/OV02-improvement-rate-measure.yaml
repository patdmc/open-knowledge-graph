        description: |
          OV02 shows overlap on eta_M; NV03 shows where UB diverges from Schmidhuber
          on A. The combination of OV02 and NV03 characterizes the relationship precisely:
          same on improvement rate, different on engagement probability.
      derivation:
        method: "Overlap (OV02) + novel (NV03) together characterize the Schmidhuber relationship"
