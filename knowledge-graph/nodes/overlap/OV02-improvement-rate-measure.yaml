        description: "eta_M (Definition 11a) is the UB instantiation of OV02."
      derivation:
        method: "eta_M = rate of improvement of M; OV02 is the overlap claim"

  - to: NV03-agency-as-gate
    relation: contrasts_with
    provenance:
      attribution:
        author: "Patrick McCarthy"
        source: "Novelty Analysis — Knowledge Graph"
        date: "2025"
