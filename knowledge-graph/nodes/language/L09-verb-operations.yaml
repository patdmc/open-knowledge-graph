id: L09-verb-operations
type: knowledge
domain: language
name: "Verb-to-operation mappings — how verbs resolve to math"
description: >
  Maps verb synsets to mathematical operations. This is the bridge
  between the language graph and the math graph. Each entry says:
  "this meaning cluster denotes this math operation."

  All inflections (gives, gave, giving, given) resolve through
  WordNet lemmatization to the same synset. Only the synset needs
  to be mapped — the inflections come for free from the graph.

  When WordNet is unavailable, the explicit verb list serves as
  a fallback. But the synset is the canonical mapping.

provenance:
  attribution:
    source: "Semantic analysis of math word problem verbs"
    date: "2026-04-01"
  evidence:
    type: empirical
    description: "Verb-operation associations validated against GSM8K corpus"

operations:
  add:
    name: Addition
    identity: 0
    commutative: true
    inverse: subtract
    synsets:
      - get.v.01         # come into possession of
      - receive.v.01     # get something
      - gain.v.01        # obtain
      - earn.v.01        # earn (receive as return)
      - collect.v.01     # accumulate
      - buy.v.01         # acquire by paying
      - find.v.01        # discover
      - add.v.01         # make an addition
      - increase.v.01    # make greater in size/amount
      - join.v.01        # become part of
    verbs:
      - add
      - adds
      - added
      - plus
      - more
      - gain
