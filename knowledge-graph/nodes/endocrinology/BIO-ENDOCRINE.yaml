id: BIO-ENDOCRINE
type: knowledge
domain: biology
name: Endocrine System

description: The system of glands that release their secretions (hormones) directly into the circulatory system. In addition to the ENDOCRINE GLANDS, included are the CHROMAFFIN SYSTEM and the NEUROSECRETORY SYSTEMS.

