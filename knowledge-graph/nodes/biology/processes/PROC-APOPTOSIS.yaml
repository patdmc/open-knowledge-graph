id: PROC-APOPTOSIS
type: knowledge
domain: biology
name: apoptotic process
go_id: GO:0006915

definition: A programmed cell death process which begins when a cell receives an internal (e.g. DNA damage) or external signal (e.g. an extracellular death ligand), and proceeds through a series of biochemical events (signaling pathway phase) which trigger an execution phase.

