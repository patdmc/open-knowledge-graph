id: PROC-SIGNALTRANSDUCTION
type: knowledge
domain: biology
name: signal transduction
go_id: GO:0007165

definition: "The cellular process in which a signal is conveyed to trigger a change in the activity or state of a cell. Signal transduction begins with reception of a signal (e.g. a ligand binding to a receptor or receptor activation by a stimulus such as light), or for signal transduction in the absence of ligand, signal-withdrawal or the activity of a constitutively active receptor."

