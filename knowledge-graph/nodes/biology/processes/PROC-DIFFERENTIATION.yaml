id: PROC-DIFFERENTIATION
type: knowledge
domain: biology
name: cell differentiation
go_id: GO:0030154

definition: The cellular developmental process in which a relatively unspecialized cell, e.g. embryonic or regenerative cell, acquires specialized structural and/or functional features that characterize a specific cell. Differentiation includes the processes involved in commitment of a cell to a specific fate and its subsequent development to the mature state.

