id: PROC-EGFR
type: knowledge
domain: biology
name: epidermal growth factor receptor signaling pathway
go_id: GO:0007173

definition: The series of molecular signals initiated by binding of a ligand to the tyrosine kinase receptor EGFR (ERBB1) on the surface of a cell. The pathway ends with regulation of a downstream cellular process, e.g. transcription.

