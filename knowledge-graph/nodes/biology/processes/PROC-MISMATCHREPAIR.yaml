id: PROC-MISMATCHREPAIR
type: knowledge
domain: biology
name: mismatch repair
go_id: GO:0006298

definition: "A system for the correction of errors in which an incorrect base, which cannot form hydrogen bonds with the corresponding base in the parent strand, is incorporated into the daughter strand. The mismatch repair system promotes genomic fidelity by repairing base-base mismatches, insertion-deletion loops and heterologies generated during DNA replication and recombination."

