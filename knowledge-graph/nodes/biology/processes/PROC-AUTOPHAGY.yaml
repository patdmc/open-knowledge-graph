id: PROC-AUTOPHAGY
type: knowledge
domain: biology
name: autophagy
go_id: GO:0006914

definition: "The cellular catabolic process in which cells digest cellular materials, such as organelles and other macromolecular constituents, or non-self materials such as intracellular pathogens. Autophagy serves to provide essential nutrients under conditions of cellular stress; or can remodel intracellular structures during cell differentiation."

