id: PROC-DNAREPAIR
type: knowledge
domain: biology
name: DNA repair
go_id: GO:0006281

definition: The process of restoring DNA after damage. Genomes are subject to damage by chemical and physical agents in the environment (e.g. UV and ionizing radiations, chemical mutagens, fungal and bacterial toxins, etc.) and by free radicals or alkylating agents endogenously generated in metabolism.

