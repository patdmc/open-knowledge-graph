id: BIO-TUMORSUPPRESSORS
type: knowledge
domain: cancer_biology
name: Genes, Tumor Suppressor

description: Genes that inhibit expression of the tumorigenic phenotype. They are normally involved in holding cellular growth in check. When tumor suppressor genes are inactivated or lost, a barrier to normal proliferation is removed and unregulated growth is possible.

