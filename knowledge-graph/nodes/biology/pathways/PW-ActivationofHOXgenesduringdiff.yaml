description: "Hox genes encode proteins that contain the DNA-binding homeobox motif and control early patterning of segments in the embryo as well as later events in development (reviewed in Rezsohazy et al. 2015). Mammals have 39 Hox genes arrayed in 4 linear clusters, with each cluster containing 9 to 11 genes."

