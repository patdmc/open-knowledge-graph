id: PW-Circadianclock
type: knowledge
domain: biology
name: Circadian clock
reactome_id: R-HSA-9909396

description: "At the center of the mammalian circadian clock is a negative transcription-translation feedback loop (TTFL) (reviewed in Albrecht 2012, Gustafson and Partch 2015, Cox and Takahashi 2019). In the morning, the BMAL1:CLOCK/NPAS2 heterodimer activates transcription of CRY1, CRY2, PER1, PER2, PER3 and many other circadian-regulated genes. Levels of PER and CRY proteins rise during the day and inhibit their own expression and the expression of other BMAL1:CLOCK/NPAS2-activated genes in the afternoon and evening (inferred from mouse homologs in Cao et al."

