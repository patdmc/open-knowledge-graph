name: Intracellular signaling by second messengers
reactome_id: R-HSA-9006925

description: Second messengers are generated within the cell as a downstream step in signal transduction cascades initiated by the interaction of an external stimulus with a  cell surface receptor.  Common second messengers include DAG,  cAMP, cGMP, IP3, Ca2+ and phosphatidylinositols (reviewed in Kang et al, 2015; Raker et al, 2016; Li and Marshall, 2015; Pinto et al, 2015; Ahmad et al, 2015).

