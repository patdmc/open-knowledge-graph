description: Because of their hydrophobicity, lipids are found in the extracellular spaces of the human body primarily in the form of lipoprotein complexes. Chylomicrons form in the small intestine and transport dietary lipids to other tissues in the body. Very low density lipoproteins (VLDL) form in the liver and transport triacylglycerol synthesized there to other tissues of the body.

