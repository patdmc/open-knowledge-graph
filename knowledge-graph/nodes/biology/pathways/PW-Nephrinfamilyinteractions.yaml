name: Nephrin family interactions
reactome_id: R-HSA-373753

description: "Nephrin (NPHS1) is a member of the Super-IgG-Molecule family and is most prominently expressed in kidney podocytes. It is a major if not the most important structural component of the slit diaphragm, a modified adherens junction in between these cells. NPHS1 has an extracellular domain that contains eight distal IgG like domains and one proximal fibronectin type III domain, a transmembrane domain and a short intracellular domain."

