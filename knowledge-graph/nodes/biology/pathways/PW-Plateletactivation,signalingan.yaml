id: PW-Plateletactivation,signalingan
type: knowledge
domain: biology
name: Platelet activation, signaling and aggregation
reactome_id: R-HSA-76002

description: Platelet activation begins with the initial binding of adhesive ligands and of the excitatory platelet agonists (released or generated at the sites of vascular trauma) to cognate receptors on the platelet membrane (Ruggeri 2002). Intracellular signaling reactions then enhance the adhesive and procoagulant properties of tethered platelets or of platelets circulating in the proximity. Once platelets have adhered they degranulate, releasing stored secondary agents such as ADP, ATP, and synthesize thromboxane A2.

