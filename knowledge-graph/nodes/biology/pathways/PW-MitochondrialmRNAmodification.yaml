id: PW-MitochondrialmRNAmodification
type: knowledge
domain: biology
name: Mitochondrial mRNA modification
reactome_id: R-HSA-9937008

description: "Mitochondrial mRNAs contain polyadenylation, pseudouridylation, and N1-adenosine methylation, posttranscriptional modifications that are catalyzed by proteins encoded in the nucleus (reviewed in Chrzanowska-Lightowlers and Lightowlers 2024). Polyadenylation at the 3' ends of mitochondrial mRNAs is produced by MTPAP (also called PAPD1), a dimeric polyadenylate polymerase located in both the cytosol and the mitochondrial matrix (Nagaike et al. 2005, Slomovic and Schuster 2008, Bai et al."

