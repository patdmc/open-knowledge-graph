description: "Porphyrins are heterocyclic macrocycles, consisting of four pyrrole subunits (tetrapyrrole) linked by four methine (=CH-) bridges. The extensive conjugated porphyrin macrocycle is chromatic and the name itself, porphyrin, is derived from the Greek word for purple. The aromatic character of porphyrins can be seen by NMR spectroscopy.Porphyrins readily combine with metals by coordinating them in the central cavity."

