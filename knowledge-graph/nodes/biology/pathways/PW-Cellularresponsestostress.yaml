id: PW-Cellularresponsestostress
type: knowledge
domain: biology
name: Cellular responses to stress
reactome_id: R-HSA-2262752

description: Cells are subject to external molecular and physical stresses such as foreign molecules that perturb metabolic or signaling processes, and changes in temperature or pH. Cells are also subject to internal molecular stresses such as production of reactive metabolic byproducts. The ability of cells and tissues to modulate molecular processes in response to such stresses is essential to the maintenance of tissue homeostasis (Kultz 2005).

