description: "In this module, the biology of various types of regulatory non-coding RNAs are described. Biogenesis and functions of small interfering RNAs (siRNAs) and microRNAs (miRNAs) are annotated. Biogenesis of PIWI-interacting small RNAs (piRNAs) and tRNA-derived small RNAs (tsRNAs) are also annotated."

