id: PW-Signalregulatoryproteinfamilyi
type: knowledge
domain: biology
name: Signal regulatory protein family interactions
reactome_id: R-HSA-391160

description: "Signal regulatory protein alpha (SIRPA, SHPS1, CD172a) is a transmembrane protein expressed mostly on myeloid cells. CD47, a widely expressed transmembrane protein, is a ligand for SIRP alpha, with the two proteins constituting a cell-cell communication system. The interaction of SIRPA with CD47 is important for the regulation of migration and phagocytosis."

