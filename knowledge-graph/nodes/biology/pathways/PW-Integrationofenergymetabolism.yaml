id: PW-Integrationofenergymetabolism
type: knowledge
domain: biology
name: Integration of energy metabolism
reactome_id: R-HSA-163685

description: Many hormones that affect individual physiological processes including the regulation of appetite, absorption, transport, and oxidation of foodstuffs influence energy metabolism pathways. While insulin mediates the storage of excess nutrients, glucagon is involved in the mobilization of energy resources in response to low blood glucose levels, principally by stimulating hepatic glucose output. Small doses of glucagon are sufficient to induce significant glucose elevations.

