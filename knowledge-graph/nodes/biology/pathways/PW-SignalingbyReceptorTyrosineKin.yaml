name: Signaling by Receptor Tyrosine Kinases
reactome_id: R-HSA-9006934

description: "Receptor tyrosine kinases (RTKs) are a major class of cell surface proteins involved in Signal Transduction.  Human cells contain ~60 RTKs, grouped into 20 subfamilies based on their domain architecture. All RTK subfamilies are characterized by an extracellular ligand-binding domain, a single transmembrane region and an intracellular region consisting of the tyrosine kinase domain and additional regulatory and protein interaction domains."

