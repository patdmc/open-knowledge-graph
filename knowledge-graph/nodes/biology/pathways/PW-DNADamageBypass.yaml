name: DNA Damage Bypass
reactome_id: R-HSA-73893

description: In addition to various processes for removing lesions from the DNA, cells have developed specific mechanisms for tolerating unrepaired damage during the replication of the genome. These mechanisms are collectively called DNA damage bypass pathways. The Y family of DNA polymerases plays a key role in DNA damage bypass.

