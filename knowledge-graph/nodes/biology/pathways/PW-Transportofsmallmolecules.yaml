id: PW-Transportofsmallmolecules
type: knowledge
domain: biology
name: Transport of small molecules
reactome_id: R-HSA-382551

description: By definition cells have a critical separation between inner (cytoplasmic) and outer (extracellular) compartments. This separation provides for protection, gradient assembly, and environmental control but at the same time isolates the interior compartments of the cell from energy resources, oxygen, and raw materials. Cells have evolved a myriad of mechanisms to regulate, and enable transportation of small molecules ascross plasma membranes and between cellular organelle compartments within cells.

