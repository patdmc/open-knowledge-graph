name: "Phosphorylation and nuclear translocation of the CRY:PER:kinase complex"
reactome_id: R-HSA-9931530

description: Cryptochrome proteins (CRY1, CRY2) and Period proteins (PER1, PER2, PER3) are translated in the cytosol. CDK5 phosphoryates PER2 in the cytosol and phosphorylated PER2 interacts with CRY1 (inferred from mouse homologs in Brenna et al. 2019).

