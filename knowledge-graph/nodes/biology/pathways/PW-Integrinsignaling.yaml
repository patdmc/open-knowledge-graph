id: PW-Integrinsignaling
type: knowledge
domain: biology
name: Integrin signaling
reactome_id: R-HSA-354192

description: "Integrins are a major family of cell surface receptors that modulate cell adhesion, migration, proliferation and survival through interaction with the extracellular matrix (ECM) and the actin cytoskeleton.  Integrins are type 1 transmembrane proteins that exist at the cell surface as heterodimers of alpha and beta subunits, of which there are 18 and 8 different isoforms, respectively, in human cells. In addition to their mechanical role in mediating contact between the ECM and the cytoskeleton, integrins also modulate intracellular signaling pathways governing cytoskeletal rearrangements and pro-survival and mitogenic signaling (reviewed in Hehlgans et al, 2007; Harburger and Calderwood, 2009; Ata and Antonescu, 2017)."

