name: Organelle biogenesis and maintenance
reactome_id: R-HSA-1852241

description: "This module describes the biogenesis of organelles. Organelles are subcellular structures of distinctive morphology and function. The organelles of human cells include: mitochondria, endoplasmic reticulum, Golgi apparatus, vacuoles, nucleus, (auto)phagosome, centriole, lysosome, melanosome, myofibril, nucleolus, peroxisome, cilia (in some cell types), proteasome, ribsome, and transport vesicles."

