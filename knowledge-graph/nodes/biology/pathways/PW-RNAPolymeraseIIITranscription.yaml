name: RNA Polymerase III Transcription
reactome_id: R-HSA-74158

description: "RNA polymerase III is one of three types of nuclear RNA polymerases present in eucaryotic cells.  About 10% of the total transcription in dividing cells can be attributed to its activity.  It synthesizes an eclectic collection of catalytic or structural RNA molecules, some of which are involved in protein synthesis, pre-mRNA splicing, tRNA processing, and the control of RNA polymerase II elongation, whereas some others have still unknown functions."

