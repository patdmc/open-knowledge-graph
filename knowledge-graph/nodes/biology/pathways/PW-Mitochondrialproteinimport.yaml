id: PW-Mitochondrialproteinimport
type: knowledge
domain: biology
name: Mitochondrial protein import
reactome_id: R-HSA-1268020

description: "A human mitochondrion contains about 1500 proteins, more than 99% of which are encoded in the nucleus, synthesized in the cytosol and imported into the mitochondrion. Proteins are targeted to four locations (outer membrane, intermembrane space, inner membrane, and matrix) and must be sorted accordingly (reviewed in Kutik et al. 2007, Milenkovic et al."

