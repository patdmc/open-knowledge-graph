description: "Abacavir is a nucleoside analogue reverse transcriptase inhibitor with antiretroviral activity, widely used in combination with other drugs to treat HIV-1 infection (Yuen et al. 2008). Its uptake across the plasma membrane is mediated by organic cation transporters SLC22A1, 2, and 3; the transport proteins ABCB1 and ABCG2 mediate its efflux."

