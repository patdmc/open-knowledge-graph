id: PW-Elasticfibreformation
type: knowledge
domain: biology
name: Elastic fibre formation
reactome_id: R-HSA-1566948

description: "Elastic fibres (EF) are a major structural constituent of dynamic connective tissues such as large arteries and lung parenchyma, where they provide essential properties of elastic recoil and resilience. EF are composed of a central cross-linked core of elastin, surrounded by a mesh of microfibrils, which are composed largely of fibrillin. In addition to elastin and fibrillin-1, over 30 ancillary proteins are involved in mediating important roles in elastic fibre assembly as well as interactions with the surrounding environment."

