id: PW-ExpressionofBMALARNTL,CLOCK,an
type: knowledge
domain: biology
name: Expression of BMAL (ARNTL), CLOCK, and NPAS2
reactome_id: R-HSA-9931509

description: "BMAL1 (ARNTL), CLOCK, and NPAS2, which acts redundantly with CLOCK, are key activators of diurnal circadian gene expression (reviewed in Cox and Takahashi 2019). Their expression is positively regulated by the Retinoid-related orphan receptors RORA, RORB, and RORC and negatively regulated by the nuclear receptor NR1D1 (REV-ERBA), all of which complete for the same ROR responsive elements (RRE, RORE) (inferred from mouse homologs in Ueda et al. 2002, Guilaumond et al."

