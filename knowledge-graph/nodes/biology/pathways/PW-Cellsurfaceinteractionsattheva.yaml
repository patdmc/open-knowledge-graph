id: PW-Cellsurfaceinteractionsattheva
type: knowledge
domain: biology
name: Cell surface interactions at the vascular wall
reactome_id: R-HSA-202733

description: Leukocyte extravasation is a rigorously controlled process that guides white cell movement from the vascular lumen to sites of tissue inflammation. The powerful adhesive interactions that are required for leukocytes to withstand local flow at the vessel wall is a multistep process mediated by different adhesion molecules. Platelets adhered to injured vessel walls form strong adhesive substrates for leukocytes.

