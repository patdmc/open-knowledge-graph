description: "Atorvastatin (ATV, brand name Lipitor), is a lipid-lowering drug of the statin class of medications. It inhibits the endogenous production of cholesterol in the liver, thereby lowering abnormally high cholesterol and lipid levels, and ultimately reducing the risk of cardiovascular disease. Statins inhibit the enzyme hydroxymethylglutaryl-coenzyme A reductase (HMGCR) , which catalyzes the critical step in cholesterol biosynthesis of HMG-CoA conversion to mevalonic acid."

