id: PW-Epigeneticregulationofgeneexpr
type: knowledge
domain: biology
name: Epigenetic regulation of gene expression
reactome_id: R-HSA-212165

description: Epigenetic processes regulate gene expression by modulating the frequency, rate, or extent of gene expression in a mitotically or meiotically heritable way that does not entail a change in the DNA sequence. Originally the definition applied only to heritability across generations but later also encompassed the heritable changes that occur during cellular differentiation within one organism. Molecular analysis shows epigenetic changes comprise covalent modifications, such as methylation and acetylation, to DNA and histones.

