id: PW-Posttranslationalproteinmodifi
type: knowledge
domain: biology
name: "Post-translational protein modification"
reactome_id: R-HSA-597592

description: "After translation, many newly formed proteins undergo further covalent modifications that alter their functional properties. Modifications associated with protein localization include the attachment of oligosaccharide moieties to membrane-bound and secreted proteins (N-linked and O-linked glycosylation), the attachment of lipid (RAB geranylgeranylation) or glycolipid moieties (GPI-anchored proteins) that anchor proteins to cellular membranes, and the vitamin K-dependent attachment of carboxyl groups to glutamate residues. Modifications associated with functions of specific proteins include gamma carboxylation of clotting factors, hypusine formation on eukaryotic translation initiation factor 5A, conversion of a cysteine residue to formylglycine (arylsulfatase activation), methylation of lysine and arginine residues on non-histone proteins (protein methylation), protein phosphorylation by secretory pathway kinases, and carboxyterminal modifications of tubulin involving the addition of polyglutamate chains.Protein ubiquitination and deubiquitination play a major role in regulating protein stability and, together with SUMOylation and neddylation, can modulate protein function as well."

