description: "Cilia are membrane-covered organelles that extend from the surface of eukaryotic cells. Cilia may be motile, such as respiratory cilia) or non-motile (such as the primary cilium) and are distinguished by the structure of their microtubule-based axonemes. The axoneme consists of nine peripheral doublet microtubules, and in the case of many motile cilia, may also contain a pair of central single microtubules."

