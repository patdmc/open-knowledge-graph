description: "Diseases of mitotic cell cycle are caused by mutations in cell cycle regulators (Collins and Garrett 2005, Diaz-Moralli et al. 2013), such as retinoblastoma protein RB1 (Classon and Harlow 2002), as well as proteins involved in telomere maintenance, such as ATRX and DAXX (Sarek et al. 2015)."

