name: Formation of Fibrin Clot (Clotting Cascade)
reactome_id: R-HSA-140877

description: The formation of a fibrin clot at the site of an injury to the wall of a normal blood vessel is an essential part of the process to stop blood loss after vascular injury.  The reactions that lead to fibrin clot formation are commonly described as a cascade, in which the product of each step is an enzyme or cofactor needed for following reactions to proceed efficiently.  The entire clotting cascade can be divided into three portions, the extrinsic pathway, the intrinsic pathway, and the common pathway.

