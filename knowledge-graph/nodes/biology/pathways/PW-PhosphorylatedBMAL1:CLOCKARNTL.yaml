id: PW-PhosphorylatedBMAL1:CLOCKARNTL
type: knowledge
domain: biology
name: "Phosphorylated BMAL1:CLOCK (ARNTL:CLOCK) activates expression of core clock genes"
reactome_id: R-HSA-9931510

description: "After translocation into the nucleus, the phosphorylated BMAL1:CLOCK heterodimer and, by inference, the BMAL1:NPAS2 heterodimer activate transcription by binding E-box elements (consensus: CANNTG) in the promoters of more than 2000 target genes (inferred from mouse homologs in Hatanaka et al. 2010, Guillaume et al. 2011) and recruiting coactivators such as CREB-binding protein (CREBBP) (inferred from mouse homologs in Garg et al."

