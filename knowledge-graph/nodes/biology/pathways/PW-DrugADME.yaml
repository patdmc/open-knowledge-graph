description: Pharmacokinetics (PK) is a branch of pharmacology dedicated to determining the chemical fate of substances in living organisms, from administration to elimination from the body. PK can be described as how an organism affects a drug, whereas pharmacodynamics (PD) is the study of how a drug affects the organism. Both PK and PD are described for each drug annotated in the Drug Absorption, Distribution, Metabolism and Excretion (ADME) pathways.

