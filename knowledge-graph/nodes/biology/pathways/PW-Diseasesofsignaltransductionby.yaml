description: "Signaling processes are central to human physiology (e.g., Pires-da Silva & Sommer 2003), and their disruption by either germ-line and somatic mutation can lead to serious disease. Here, the molecular consequences of mutations affecting visual signal transduction and signaling by diverse growth factors are annotated."

