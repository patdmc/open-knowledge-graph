name: Keratinization
reactome_id: R-HSA-6805567

description: "Keratins are the major structural protein of vertebrate epidermis, constituting up to 85% of a fully differentiated keratinocyte (Fuchs 1995). Keratins belong to a superfamily of intermediate filament (IF) proteins that form alpha-helical coiled-coil dimers, which associate laterally and end-to-end to form approximately 10 nm diameter filaments. Keratin filaments are heteropolymeric, formed from equal amounts of acidic type I and basic /neutral type 2 keratins."

