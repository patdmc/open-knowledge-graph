id: PW-DevelopmentalBiology
type: knowledge
domain: biology
name: Developmental Biology
reactome_id: R-HSA-1266738

description: Developmental biology seeks to understand the array of processes by which a fertilized egg gives rise to the diverse tissues of the adult body. Examples of several developmental processes have been annotated here. In the early embryo, transcriptional regulation of pluripotent stem cells, gastrulation (including NODAL signaling), and activation of HOX genes during differentiation are annotated.

