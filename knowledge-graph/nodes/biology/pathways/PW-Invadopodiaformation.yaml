name: Invadopodia formation
reactome_id: R-HSA-8941237

description: "Podosomes and invadopodia are actin-based dynamic protrusions of the plasma membrane of metazoan cells that represent sites of attachment to and degradation of the extracellular matrix (Linder & Kopp 2005, Murphy & Courtneidge 2011). They are characteristically composed of an actin-rich core surrounded by adhesion and scaffolding proteins. Current convention is to use the term podosome for the structures found in normal cells (such as monocytic cells, endothelial cells and smooth muscle cells) and in Src-transformed fibroblasts, and invadopodium for the structures found in cancer cells."

