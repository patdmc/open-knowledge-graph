name: Olfactory Signaling Pathway
reactome_id: R-HSA-381753

description: "Mammalian Olfactory Receptor (OR, also called odorant receptor) genes were discovered in rats by Linda Buck and Richard Axel, who predicted that odorants would be detected by a large family of G protein-coupled receptors (GPCRs) that are selectively expressed in the olfactory epithelium. This prediction was based on previous biochemical evidence that cAMP levels increased in olfactory neurons upon odor stimulation. These predictions proved to be accurate, and Buck and Axel received a Nobel Prize for this and subsequent work (reviewed in Keller & Vosshall 2008).Subsequent work in mice and other vertebrates has confirmed that OR genes are comprised of a very large family of G Protein-Coupled Receptors (GPCRs) that are selectively-expressed in olfactory epithelium."

