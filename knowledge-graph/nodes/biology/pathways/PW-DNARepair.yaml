id: PW-DNARepair
type: knowledge
domain: biology
name: DNA Repair
reactome_id: R-HSA-73894

description: "DNA repair is a phenomenal multi-enzyme, multi-pathway system required to ensure the integrity of the cellular genome. Living organisms are constantly exposed to harmful metabolic by-products, environmental chemicals and radiation that damage their DNA, thus corrupting genetic information. In addition, normal cellular pH and temperature create conditions that are hostile to the integrity of DNA and its nucleotide components."

