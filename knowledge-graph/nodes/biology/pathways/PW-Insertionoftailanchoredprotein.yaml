id: PW-Insertionoftailanchoredprotein
type: knowledge
domain: biology
name: "Insertion of tail-anchored proteins into the endoplasmic reticulum membrane"
reactome_id: R-HSA-9609523

description: "Tail-anchored (TA) proteins have a hydrophobic transmembrane domain (TMD) located near the C-terminus (\"tail\") of the protein. Depending on the nature of the TMD, TA proteins can be inserted into the endoplasmic reticulum (ER) membrane by at least 4 mechanisms: cotranslational insertion by the signal recognition particle (SRP), post-translational insertion by ASNA1 (TRC40), post-translational insertion by the SRP, and post-translational insertion by a SRP-independent mechanism (SND) (Casson et al. 2017, reviewed in Borgese and Fasana 2011, Casson et al."

