id: PW-Surfactantmetabolism
type: knowledge
domain: biology
name: Surfactant metabolism
reactome_id: R-HSA-5683826

description: "The alveolar region of the lung creates an extensive epithelial surface that mediates the transfer of oxygen and carbon dioxide required for respiration after birth. Type I epithelial cells form the alveolar surface and mediate gaseous exchange. Type II epithelial cells secrete pulmonary surfactant, a lipoprotein complex that forms a thin interfacial film, lowering surface tension at the air-liquid interface in alveoli and maintaining the structural integrity of alveoli, preventing their collapse at low volumes (Agassandian & Mallampalli 2013)."

