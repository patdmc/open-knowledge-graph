id: PW-Diseasesofmetabolism
type: knowledge
domain: biology
name: Diseases of metabolism
reactome_id: R-HSA-5668914

description: Metabolic processes in human cells generate energy through the oxidation of molecules consumed in the diet and mediate the synthesis of diverse essential molecules not taken in the diet as well as the inactivation and elimination of toxic ones generated endogenously or present in the extracellular environment. Mutations that disrupt these processes by inactivating a required enzyme or regulatory protein, or more rarely by changing its specificity can lead to severe diseases. Metabolic diseases annotated here involve aspects of carbohydrate, glycosylation, amino acid (phenylketonuria), surfactant and vitamin metabolism, and biological oxidations.

