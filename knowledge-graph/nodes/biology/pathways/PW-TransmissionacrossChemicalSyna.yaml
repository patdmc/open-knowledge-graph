name: Transmission across Chemical Synapses
reactome_id: R-HSA-112315

description: Chemical synapses are specialized junctions that are used for communication between neurons, neurons and muscle or gland cells. The synapse involves a presynaptic neuron and a postsynaptic neuron, muscle cell or glad cell. The pre and the postsynaptic cell are separated by a gap (space) of 20 to 40 nm called the synaptic cleft.

