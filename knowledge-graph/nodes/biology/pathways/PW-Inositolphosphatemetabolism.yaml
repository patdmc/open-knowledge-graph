id: PW-Inositolphosphatemetabolism
type: knowledge
domain: biology
name: Inositol phosphate metabolism
reactome_id: R-HSA-1483249

description: "Inositol phosphates (IPs) are molecules involves in signalling processes in eukaryotes.  myo-Inositol consists of a six-carbon cyclic alcohol with an axial 2-hydroxy and five equatorial hydroxyls.  Mono-, di-, and triphosphorylation of the inositol ring generates a wide variety of stereochemically distinct signalling entities."

