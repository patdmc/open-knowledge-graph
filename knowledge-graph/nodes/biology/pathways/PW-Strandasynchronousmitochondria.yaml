id: PW-Strandasynchronousmitochondria
type: knowledge
domain: biology
name: "Strand-asynchronous mitochondrial DNA replication"
reactome_id: R-HSA-9913635

description: "The human mitochondrial genome is a circular double-stranded DNA of 16569 bp that encodes 2 rRNAs, 22 tRNAs, and 13 proteins. Based on density in a denaturing cesium chloride gradient, a heavy (H) strand and a light (L) strand are distinguishable. Two basic mechanisms of mitochondrial DNA replication have been proposed: (1) strand-asynchronous DNA replication (also called strand-displacement DNA replication), in which initiation of H strand synthesis significantly precedes initiation of L strand synthesis and each initiation is primed at a specific origin, and (2) strand-synchronous DNA replication, also called strand-coupled DNA replication, in which initiations of H strand synthesis and L strand synthesis occur concurrently and are primed by short RNA primers distributed through the genome (Yang et al."

