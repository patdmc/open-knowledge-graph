name: Azathioprine ADME
reactome_id: R-HSA-9748787

description: "Thiopurines were originally developed for cancer treatment in the early 1950s, with 6-mercaptopurine (6MP) being the first thiopurine approved by the FDA for the treatment of leukaemia, just two years after its discovery. Azathioprine (AZA), a prodrug of 6MP, was developed by the addition of a nitroimidazol group a few years later to bypass the high first-pass metabolism of 6MP due to oxidation in intestinal cells by xanthine oxidase (XDH). AZA is a thiopurine prodrug, and its pharmacological action is based on the release of the active metabolite 6-mercaptopurine (6MP) which is further metabolised to pharmacoligically active 6-thioguanine nucleotides (6-TGNs)."

