id: PW-AdaptiveImmuneSystem
type: knowledge
domain: biology
name: Adaptive Immune System
reactome_id: R-HSA-1280218

description: "Adaptive immunity refers to antigen-specific immune response efficiently involved in clearing the pathogens. The adaptive immune system is comprised of B and T lymphocytes that express receptors with remarkable diversity tailored to recognize aspects of particular pathogens or antigens. During infection, dendritic cells (DC) which act as sentinels in the peripheral tissues recognize and pick up the pathogen in the form of antigenic determinants and then process these antigens and present them to T cells."

