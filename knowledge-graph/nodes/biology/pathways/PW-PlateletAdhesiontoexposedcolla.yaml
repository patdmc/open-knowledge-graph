id: PW-PlateletAdhesiontoexposedcolla
type: knowledge
domain: biology
name: Platelet Adhesion to exposed collagen
reactome_id: R-HSA-75892

description: Initiation of platelet adhesion is the first step in the formation of the platelet plug. Circulating platelets are arrested and subsequently activated by exposed collagen and von Willebrand factor (VWF). It is not entirely clear which type of collagen is responsible for adhesion and activation; collagen types I and III are abundant in vascular epithelia but several other types including IV are present (Farndale RW 2006).

