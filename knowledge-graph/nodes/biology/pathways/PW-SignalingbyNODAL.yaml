id: PW-SignalingbyNODAL
type: knowledge
domain: biology
name: Signaling by NODAL
reactome_id: R-HSA-1181150

description: Signaling by NODAL is essential for patterning of the axes of the embryo and formation of mesoderm and endoderm (reviewed in Schier 2009, Shen 2007). The NODAL proprotein is secreted and cleaved extracellularly to yield mature NODAL. Mature NODAL homodimerizes and can also form heterodimers with LEFTY1, LEFTY2, or CERBERUS, which negatively regulate NODAL signaling.

