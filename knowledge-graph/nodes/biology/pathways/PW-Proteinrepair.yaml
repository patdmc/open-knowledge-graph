name: Protein repair
reactome_id: R-HSA-5676934

description: "Reactive oxygen species (ROS) such as H2O2, superoxide anions and hydroxyl radicals interact with molecules in the cell causing damage that impairs cellular functions. Although cells have mechanisms to destroy ROS and repair the damage caused by ROS, it is considered to be a major factor in age-related diseases and the ageing process (Zhang & Weissbach 2008, Kim et al. 2014)."

