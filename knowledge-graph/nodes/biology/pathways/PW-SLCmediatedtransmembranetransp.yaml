id: PW-SLCmediatedtransmembranetransp
type: knowledge
domain: biology
name: "SLC-mediated transmembrane transport"
reactome_id: R-HSA-425407

description: "Proteins with transporting functions can be roughly classified into 3 categories: ATP-powered pumps, ion channels, and transporters. Pumps utilize the energy released by ATP hydrolysis to power the movement of the substrates across the membrane, against their electrochemical gradient. Channels at the open state can transfer the substrates (ions or water) down their electrochemical gradient, at an extremely high efficiency (up to 108 s-1)."

