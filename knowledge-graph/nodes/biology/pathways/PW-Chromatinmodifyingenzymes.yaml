id: PW-Chromatinmodifyingenzymes
type: knowledge
domain: biology
name: Chromatin modifying enzymes
reactome_id: R-HSA-3247509

description: Eukaryotic DNA is associated with histone proteins and organized into a complex nucleoprotein structure called chromatin. This structure decreases the accessibility of DNA but also helps to protect it from damage. Access to DNA is achieved by highly regulated local chromatin decondensation.

