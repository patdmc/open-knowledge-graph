id: PW-tRNAprocessing
type: knowledge
domain: biology
name: tRNA processing
reactome_id: R-HSA-72306

description: "Genes encoding transfer RNAs (tRNAs) are transcribed by RNA polymerase III in the nucleus and by mitochondrial RNA polymerase in the mitochondrion.In the nucleus transcription reactions produce precursor tRNAs (pre-tRNAs) that have extra 5' leaders, 3' trailers, and, in some cases, introns which are removed by enzymes and enzyme complexes: RNase P cleaves the 5' leader, RNase Z cleaves the 3' trailer, TRNT1 polymerizes CCA onto the resulting 3' end, the TSEN complex cleaves at each end of the intron, and the tRNA ligase complex ligates the resulting exons (reviewed in Rossmanith et al. 1995, Phizicky and Hopper 2010, Suzuki et al. 2011, Abbott et al."

