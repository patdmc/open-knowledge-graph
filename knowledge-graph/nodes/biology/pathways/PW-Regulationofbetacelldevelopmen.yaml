description: The normal development of the pancreas during gestation has been intensively investigated over the past decade especially in the mouse (Servitja and Ferrer 2004; Chakrabarti and Mirmira 2003). Studies of genetic defects associated with maturity onset diabetes of the young (MODY) has provided direct insight into these processes as they take place in humans (Fajans et al. 2001).

