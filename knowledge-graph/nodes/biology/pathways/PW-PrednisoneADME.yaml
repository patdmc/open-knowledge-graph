name: Prednisone ADME
reactome_id: R-HSA-9757110

description: "Prednisone (PREDN) is a prodrug of prednisolone (PREDL), and is rapidly absorbed. To achieve high uptake of the near water-insoluble molecule the highest dose 50 mg has to be dissolved in 250 ml water. Its conversion to the highly active prednisolone (PREDL) in liver cells is reversible but represents the favored reaction direction (Pickup, 1979).Prednisone and prednisolone are considered to be fully therapeutically equivalent."

