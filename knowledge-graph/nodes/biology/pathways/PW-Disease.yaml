name: Disease
reactome_id: R-HSA-1643685

description: "Biological processes are captured in Reactome by identifying the molecules (DNA, RNA, protein, small molecules) involved in them and describing the details of their interactions. From this molecular viewpoint, human disease pathways have three mechanistic causes: the inclusion of microbially-expressed proteins, altered functions of human proteins, or changed expression levels of otherwise functionally normal human proteins.The first group encompasses the infectious diseases such as influenza, tuberculosis and HIV infection. The second group involves human proteins modified either by a mutation or by an abnormal post-translational event that produces an aberrant protein with a novel function."

