id: PW-Metabolism
type: knowledge
domain: biology
name: Metabolism
reactome_id: R-HSA-1430728

description: "Metabolic processes in human cells generate energy through the oxidation of molecules consumed in the diet and mediate the synthesis of diverse essential molecules not taken in the diet as well as the inactivation and elimination of toxic ones generated endogenously or present in the extracellular environment. The processes of energy metabolism can be classified into two groups according to whether they involve carbohydrate-derived or lipid-derived molecules, and within each group it is useful to distinguish processes that mediate the breakdown and oxidation of these molecules to yield energy from ones that mediate their synthesis and storage as internal energy reserves. Synthetic reactions are conveniently grouped by the chemical nature of the end products, such as nucleotides, amino acids and related molecules, and porphyrins."

