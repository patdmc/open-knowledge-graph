name: Disorders of transmembrane transporters
reactome_id: R-HSA-5619115

description: "Proteins with transporting functions can be roughly classified into 3 categories: ATP hydrolysis-coupled pumps, ion channels, and transporters. Pumps utilize the energy released by ATP hydrolysis to power the movement of substrates across the membrane against their electrochemical gradient. Channels in their open state can transfer substrates (ions or water) down their electrochemical gradient at an extremely high efficiency (up to 108 s-1)."

