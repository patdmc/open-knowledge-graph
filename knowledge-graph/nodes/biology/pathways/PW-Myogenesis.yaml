id: PW-Myogenesis
type: knowledge
domain: biology
name: Myogenesis
reactome_id: R-HSA-525793

description: "Myogenesis, the formation of muscle tissue, is a complex process involving steps of cell proliferation mediated by growth factor signaling, cell differentiation, reorganization of cells to form myotubes, and cell fusion. Here, one regulatory feature of this process has been annotated, the signaling cascade initiated by CDO (cell-adhesion-molecule-related/downregulated by oncogenes) and associated co-receptors.CDO/Cdon is a type I transmembrane multifunctional co-receptor consisting of five immunoglobulin and three fibronectin type III (FNIII) repeats in the extracellular domain, and an intracellular domain with no identifiable motifs. It has been implicated in enhancing muscle differentiation in promyogenic cells."

