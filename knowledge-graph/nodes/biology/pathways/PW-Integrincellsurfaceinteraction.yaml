id: PW-Integrincellsurfaceinteraction
type: knowledge
domain: biology
name: Integrin cell surface interactions
reactome_id: R-HSA-216083

description: "The extracellular matrix (ECM) is a network of macro-molecules that underlies all epithelia and endothelia and that surrounds all connective tissue cells. This matrix provides the mechanical strength and also influences the behavior and differentiation state of cells in contact with it. The ECM are diverse in composition, but they generally comprise a mixture of fibrillar proteins, polysaccharides synthesized, secreted and organized by neighboring cells."

