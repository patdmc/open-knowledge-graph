id: PW-Metabolismofcarbohydratesandca
type: knowledge
domain: biology
name: Metabolism of carbohydrates and carbohydrate derivatives
reactome_id: R-HSA-71387

description: Starches and sugars are major constituents of the human diet and the catabolism of monosaccharides, notably glucose, derived from them is an essential part of human energy metabolism (Dashty 2013). Glucose can be catabolized to pyruvate (glycolysis) and pyruvate synthesized from diverse sources can be metabolized to form glucose (gluconeogenesis). Glucose can be polymerized to form glycogen under conditions of glucose excess (glycogen synthesis), and glycogen can be broken down to glucose in response to stress or starvation (glycogenolysis).

