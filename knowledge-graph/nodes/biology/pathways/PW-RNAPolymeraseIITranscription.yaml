id: PW-RNAPolymeraseIITranscription
type: knowledge
domain: biology
name: RNA Polymerase II Transcription
reactome_id: R-HSA-73857

description: "RNA polymerase II (Pol II) is the central enzyme that catalyses DNA- directed mRNA synthesis during the transcription of protein-coding genes. Pol II consists of a 10-subunit catalytic core, which alone is capable of elongating the RNA transcript, and a complex of two subunits, Rpb4/7, that is required for transcription initiation.   The transcription cycle is divided in three major phases: initiation, elongation, and termination."

