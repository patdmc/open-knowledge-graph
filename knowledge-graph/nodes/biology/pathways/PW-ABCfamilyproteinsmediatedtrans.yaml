id: PW-ABCfamilyproteinsmediatedtrans
type: knowledge
domain: biology
name: "ABC-family proteins mediated transport"
reactome_id: R-HSA-382556

description: "The ATP-binding cassette (ABC) superfamily of active transporters involves a large number of functionally diverse transmembrane proteins. They transport  a variety of compounds through membranes against steep concentration gradients at the cost of ATP hydrolysis.  These substrates include amino acids, lipids, inorganic ions, peptides, saccharides, peptides for antigen presentation, metals, drugs, and proteins."

