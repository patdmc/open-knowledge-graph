id: PW-RORA,B,CandNR1D1REVERBAregulat
type: knowledge
domain: biology
name: "RORA,B,C and NR1D1 (REV-ERBA) regulate gene expression"
reactome_id: R-HSA-9933387

description: "Both Retinoid-related orphan receptors (RORA, RORB, RORC) and the heme-binding nuclear receptor NR1D1 (REV-ERBA) bind ROR response elements (RREs, ROREs) in DNA (reviewed in Duez and Staels 2008, Cox and Takahashi 2019, Laothamatas et al. 2023). RORs and NR1D1 produce opposite effects, however: RORs recruit coactivators such as EP300 (p300) and PPARGC1A to activate transcription; NR1D1 recruits the corepressor NCOR1 and the histone deacetylase HDAC3 to repress transcription."

