id: PW-Gastrulation
type: knowledge
domain: biology
name: Gastrulation
reactome_id: R-HSA-9758941

description: "Gastrulation is the reorganization of the blastula to form the multilayered gastrula. During gastrulation, a portion of cells from the exterior of the epithelial epiblast layer migrate to the interior, where they form mesoderm and endoderm which, together with the outer layer of ectoderm (arising from epiblast cells that have not migrated), comprise the three cell layers that are characteristic of triploblastic metazoans (reviewed in Technau and Scholz 2003). In the human peri-implantation embryo, epiblast cells ingress through the primitive streak located in the posterior region of the embryonic disc to form the mesoderm and endoderm of the embryo proper (reviewed in Bardot and Hadjantonakis 2020, Ghimire et al."

