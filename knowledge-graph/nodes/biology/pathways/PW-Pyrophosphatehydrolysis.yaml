id: PW-Pyrophosphatehydrolysis
type: knowledge
domain: biology
name: Pyrophosphate hydrolysis
reactome_id: R-HSA-71737

description: Many biosynthetic reactions are coupled to the cleavage of ATP to yield AMP and pyrophosphate.  These reactions are typically freely reversible when carried out with purified substrates and enzymes in vitro.  In vivo, however, the pyrophosphate is rapdily and essentially irreversibly hydrolyzed by a ubiquitous inorganic pyrophosphatase.

