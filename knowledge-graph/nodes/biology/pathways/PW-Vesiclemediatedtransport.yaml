id: PW-Vesiclemediatedtransport
type: knowledge
domain: biology
name: "Vesicle-mediated transport"
reactome_id: R-HSA-5653656

description: "The transit of proteins and other cargo through the cell requires a cellular transport process in which transported substances are moved in membrane-bounded vesicles. Transported substances are enclosed in the vesicle lumen or located in the vesicle membrane. The transport process begins with the formation of the vesicle itself, often triggered by the interaction of the cargo with the vesicle formation machinery."

