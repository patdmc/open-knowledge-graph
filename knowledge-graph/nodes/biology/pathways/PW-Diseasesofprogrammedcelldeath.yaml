description: "Programmed cell death is frequently impaired in cancer and is thought to significantly contribute to resistance to chemotherapy. Mutations and perturbations in expression of different proteins involved in programmed cell death, such as TP53 (p53), BH3-only family proteins, caspases and their regulators enable malignant cells to evade apoptosis (Ghavami et al. 2009, Chao et al."

