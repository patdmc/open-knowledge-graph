name: Mitochondrial RNA degradation
reactome_id: R-HSA-9836573

description: "The human mitochondrial genome encodes two rRNAs, 22 tRNAs, and 13 proteins. The mitochondrial genome is transcribed from two divergent promoters into two large precursor RNAs, one from each strand, that are endonucleolytically processed into individual mRNAs, tRNAs, and rRNAs (Mercer et al. 2011, reviewed in Barchiesi and Vascotto 2019, Jedynak-Slyvka et al."

