name: Ciprofloxacin ADME
reactome_id: R-HSA-9793528

description: Ciprofloxacin (Cipro) is a widely used broad spectrum bacterial antibiotic. Due to its association with disabling and potentially persistent adverse reactions and current high levels of resistance its use is now recommended in patients who have no alternative treatment option for respiratory and urinary tract infections, skin and soft tissue infections, bone and joint infections, infectious diarrhea, typhoid fever and gonorrhea with susceptible strains. Adverse reactions include tendinitis, tendon rupture, peripheral neuropathy, and CNS effects.

