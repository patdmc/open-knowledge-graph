id: PW-DegradationofCRYandPERproteins
type: knowledge
domain: biology
name: Degradation of CRY and PER proteins
reactome_id: R-HSA-9932298

description: "In order to initiate a new round of transcription activated by BMAL1:CLOCK in the morning, Cryptochrome proteins (CRY1, CRY2) and Period proteins (PER1, PER2, PER3), the repressors of BMAL:CLOCK, are ubiquitinylated by SCF E3 ligase complexes and then proteolyzed by the 26S proteasome during the night. The BTRC,FBXW11:CUL1:SKP1:RBX1 E3 ligase complex ubiquitinylates phosphorylated PER1, PER2, and likely PER3 in the cytosol (Shirogane et al. 2005, inferred from mouse homologs in Reischl et al."

