id: PW-Specificationofprimordialgermc
type: knowledge
domain: biology
name: Specification of primordial germ cells
reactome_id: R-HSA-9827857

description: "Primordial germ cells (PGCs), the progenitors of female gametes (oocytes) and male gametes (sperm), are specified and segregated from somatic cells early during mammalian development. In the mouse embryo, precursors of PGCs are present in the proximal epiblast adjacent to the extraembryonic ectoderm before gastrulation (E6.0, pre-streak stage) and PGCs, marked by high alkaline phosphatase activity (Ginsburg et al. 1990), are translocated to the extraembryonic mesoderm at the base of the developing allantois during gastrulation (Lawson and Hage 1994)."

