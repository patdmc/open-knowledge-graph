name: Membrane Trafficking
reactome_id: R-HSA-199991

description: The secretory membrane system allows a cell to regulate delivery of newly synthesized proteins, carbohydrates, and lipids to the cell surface, a necessity for growth and homeostasis. The system is made up of distinct organelles, including the endoplasmic reticulum (ER), Golgi complex, plasma membrane, and tubulovesicular transport intermediates. These organelles mediate intracellular membrane transport between themselves and the cell surface.

