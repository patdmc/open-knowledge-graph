id: PW-ChromosomeMaintenance
type: knowledge
domain: biology
name: Chromosome Maintenance
reactome_id: R-HSA-73886

description: "Maintenance of chromosomal organization is critical for stable chromosome function. Two aspects of maintenance annotated in Reactome are centromeric chromatin assembly outside the context of DNA replication, involving nucleosome assembly with the histone H3 variant CenH3 (also called CENP-A), and the maintenance of telomeres, protein-DNA complexes at the ends of linear chromosomes that are important for genome stability."

