id: PW-NuclearRNAdecay
type: knowledge
domain: biology
name: Nuclear RNA decay
reactome_id: R-HSA-9930044

description: "In addition to protein coding mRNAs and stable RNAs such as rRNAs, tRNAs, snoRNAs, and snRNAs, the human genome is pervasively transcribed (Clark et al. 2011) to yield other non-coding RNAs such as enhancer transcripts, promoter upstream transcripts (PROMPTs, Preker et al. 2008), long non-coding RNAs (lncRNAs), and apparently non-functional transcripts (reviewed in Ogami and Suzuki 2021)."

