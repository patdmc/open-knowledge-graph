description: "Paracetamol (APAP, aka acetaminophen or N-acetyl-p-aminophenol) is an analgesic drug used for to treat mild to moderate pain and as an antipyretic agent. It is one of the most widely used drugs in the world and is available alone or in combination with other drugs for pain relief, fever and allergy. It is thought to act through the inhibition of cyclooxygenases 1 and 2 (Graham et al."

