name: MAPK family signaling cascades
reactome_id: R-HSA-5683057

description: "The mitogen activated protein kinases (MAPKs) are a family of conserved protein serine threonine kinases that respond to varied extracellular stimuli to activate intracellular processes including gene expression, metabolism, proliferation, differentiation and apoptosis, among others.   The classic MAPK cascades, including the ERK1/2 pathway, the p38 MAPK pathway, the JNK pathway and the ERK5 pathway are characterized by three tiers of sequentially acting, activating kinases (reviewed in Kryiakis and Avruch, 2012; Cargnello and Roux, 2011).  The MAPK kinase kinase kinase (MAPKKK), at the top of the cascade, is phosphorylated on serine and threonine residues in response to external stimuli; this phosphorylation often occurs in the context of an interaction between the MAPKKK protein and a member of the RAS/RHO family of small GTP-binding proteins."

