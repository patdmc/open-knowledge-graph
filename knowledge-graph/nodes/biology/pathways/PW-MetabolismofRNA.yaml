id: PW-MetabolismofRNA
type: knowledge
domain: biology
name: Metabolism of RNA
reactome_id: R-HSA-8953854

description: "This superpathway encompasses the processes by which RNA transcription products are further modified covalently and non-covalently to yield their mature forms, and the regulation of these processes. Annotated pathways include ones for capping, splicing, and 3'-cleavage and polyadenylation to yield mature mRNA molecules that are exported from the nucleus (Hocine et al. 2010)."

