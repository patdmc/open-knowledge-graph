id: PW-SmoothMuscleContraction
type: knowledge
domain: biology
name: Smooth Muscle Contraction
reactome_id: R-HSA-445355

description: "Layers of smooth muscle cells can be found in the walls of numerous organs and tissues within the body. Smooth muscle tissue lacks the striated banding pattern characteristic of skeletal and cardiac muscle. Smooth muscle is triggered to contract by the autonomic nervous system, hormones, autocrine/paracrine agents, local chemical signals, and changes in load or length.
Actin:myosin cross bridging is used to develop force with the influx of calcium ions (Ca2+) initiating contraction."

