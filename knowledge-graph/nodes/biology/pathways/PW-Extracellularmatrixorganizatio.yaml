name: Extracellular matrix organization
reactome_id: R-HSA-1474244

description: "The extracellular matrix is a component of all mammalian tissues, a network consisting largely of the fibrous proteins collagen, elastin and associated-microfibrils, fibronectin and laminins embedded in a viscoelastic gel of anionic proteoglycan polymers. It performs many functions in addition to its structural role; as a major component of the cellular microenvironment it influences cell behaviours such as proliferation, adhesion and migration, and regulates cell differentiation and death (Hynes 2009). ECM composition is highly heterogeneous and dynamic, being constantly remodeled (Frantz et al."

