name: Programmed Cell Death
reactome_id: R-HSA-5357801

description: Cell death is a fundamental cellular response that has a crucial role in shaping our bodies during development and in regulating tissue homeostasis by eliminating unwanted cells. There are a number of different forms of cell death, each with a corresponding number of complex subprocesses. The first form of regulated or programmed cell death to be characterized was apoptosis.

