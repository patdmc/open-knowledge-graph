id: PW-ECMproteoglycans
type: knowledge
domain: biology
name: ECM proteoglycans
reactome_id: R-HSA-3000178

description: "Proteoglycans are major components of the extracellular matrix. In cartilage the matrix constitutes more than 90% of tissue dry weight. Proteoglycans are proteins substituted with glycosaminoglycans (GAGs), linear polysaccharides consisting of a repeating disaccharide, generally of an acetylated amino sugar alternatingwith a uronic acid."

