id: PW-Transcriptionalregulationoftes
type: knowledge
domain: biology
name: Transcriptional regulation of testis differentiation
reactome_id: R-HSA-9690406

description: In humans, primordial germ cells (PGCs) are specified about 2 weeks after fertilization, a time before gastrulation (reviewed in Svingen and Koopman 2013, Mäkelä et al. 2019). PGCs are initially located extraembryonically and then migrate to colonize the gonadal ridges (genital ridges) of the embryo during the fifth week after fertilization.

