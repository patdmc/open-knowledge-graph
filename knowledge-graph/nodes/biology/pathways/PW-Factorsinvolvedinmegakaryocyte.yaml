id: PW-Factorsinvolvedinmegakaryocyte
type: knowledge
domain: biology
name: Factors involved in megakaryocyte development and platelet production
reactome_id: R-HSA-983231

description: "Megakaryocytes (MKs) give rise to circulating platelets (thrombocytes) through terminal differentiation of MKs which release cytoplasmic fragments as circulating platelets. As MKs mature they undergo endoreduplication (polyploidisation) and expansion of cytoplasmic mass to cell sizes larger than 50-100 microns, and ploidy ranges up to 128 N. As MKs mature, the polyploid nucleus becomes horseshoe-shaped, the cytoplasm expands, and platelet organelles and the demarcation membrane system are amplified."

