name: Signaling by Nuclear Receptors
reactome_id: R-HSA-9006931

description: "Nuclear receptors (NRs) are ligand-activated transcription factors that bind to small lipid based molecules to regulate gene expression and other cellular process. This family includes receptors for steroid hormones and derivatives (such as estrogen, progesterone,  glucocorticoids, Vitamin D, oxysterols and bile acids, among others) as well as receptors for retinoic acids, thyroid hormones and fatty acids and their derivatives. These ligands are able to diffuse directly through cellular membranes as a result of their lipophilic nature (reviewed in Beato et al, 1996; Holzer et al, 2017)."

