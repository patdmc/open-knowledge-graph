description: Ribavirin (RBV) is a synthetic nucleoside analog structurally related to guanine. It is given orally as part of the treatment of HCV infection, and by inhalation for the treatment of RSV infection. According to the WHO, ribavirin can also be used for the treatment of viral hemorrhagic fevers (WHO 2015).RBV is administered orally in doses of 400 to 600 mg.

