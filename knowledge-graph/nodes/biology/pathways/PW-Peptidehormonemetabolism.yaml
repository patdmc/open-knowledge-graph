id: PW-Peptidehormonemetabolism
type: knowledge
domain: biology
name: Peptide hormone metabolism
reactome_id: R-HSA-2980736

description: "Peptide hormones are cleaved from larger precursors in the secretory system (endoplasmic reticulum, Golgi apparatus, secretory granules) of the cell. After secretion peptide hormones are modified and degraded by extracellular proteases.Insulin processing occurs in 4 steps: formation of intramolecular disulfide bonds, formation of proinsulin-zinc-calcium complexes, proteolytic cleavage of proinsulin by PCSK1 (PC1/3) and PCSK2 to yield insulin, translocation of the granules across the cytosol to the plasma membrane.During Synthesis, secretion, and deacetylation of Ghrelin, proghrelin is acylated by ghrelin O-acyltransferase and cleaved by PCSK1 to yield the mature acyl ghrelin and C-ghrelin. In the bloodstream acyl ghrelin is deacylated by butyrylcholinesterase and platelet-activating factor acetylhydrolase.During Metabolism of Angiotensinogen to Angiotensin, Renin cleaves angiotensinogen to yield a decapaptide, angiotensin I (angiotensin-1, angiotensin-(1-10))."

