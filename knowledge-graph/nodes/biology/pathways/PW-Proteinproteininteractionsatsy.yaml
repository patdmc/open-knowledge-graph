name: "Protein-protein interactions at synapses"
reactome_id: R-HSA-6794362

description: "Synapses constitute highly specialized sites of asymmetric cell-cell adhesion and intercellular communication. Its formation involves the recruitment of presynaptic and postsynaptic molecules at newly formed contacts. Synapse assembly and maintenance invokes heterophilic presynaptic and postsynaptic transmembrane proteins that bind each other in the extracellular space and recruit additional proteins via their intracellular domains."

