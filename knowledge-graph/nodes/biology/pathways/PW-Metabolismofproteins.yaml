description: "Metabolism of proteins, as annotated here, covers the full life cycle of a protein from its synthesis to its posttranslational modification and degradation, at various levels of specificity. Protein synthesis is accomplished through the process of Translation of an mRNA sequence into a polypeptide chain. Protein folding is achieved through the function of molecular chaperones which recognize and associate with proteins in their non-native state and facilitate their folding by stabilizing the conformation of productive folding intermediates (Young et al."

