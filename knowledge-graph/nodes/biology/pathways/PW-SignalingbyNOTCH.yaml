name: Signaling by NOTCH
reactome_id: R-HSA-157118

description: "The Notch Signaling Pathway (NSP) is a highly conserved pathway  for cell-cell communication. NSP is involved in the regulation of cellular differentiation, proliferation, and specification. For example, it is utilised by continually renewing adult tissues such as blood, skin, and gut epithelium not only to maintain stem cells in a proliferative, pluripotent, and undifferentiated state but also to direct the cellular progeny to adopt different developmental cell fates."

