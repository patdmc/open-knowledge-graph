id: PW-ProcessingofCappedIntronContai
type: knowledge
domain: biology
name: "Processing of Capped Intron-Containing Pre-mRNA"
reactome_id: R-HSA-72203

description: "Co-transcriptional pre-mRNA splicing is not obligatory. Pre-mRNA splicing begins co-transcriptionally and often continues post-transcriptionally. Human genes contain an average of nine introns per gene, which cannot serve as splicing substrates until both 5' and 3' ends of each intron are synthesized."

