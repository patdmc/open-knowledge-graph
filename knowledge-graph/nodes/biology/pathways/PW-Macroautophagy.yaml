id: PW-Macroautophagy
type: knowledge
domain: biology
name: Macroautophagy
reactome_id: R-HSA-1632852

description: "Macroautophagy (hereafter referred to as autophagy) acts as a buffer against starvation by liberating building materials and energy sources from cellular components. It has additional roles in embryonic development, removal of apoptotic cells or organelles, antigen presentation, protection against toxins and as a degradation route for aggregate-prone proteins and infectious agents. The dysregulation of autophagy is involved in several human diseases, for example, Crohn's disease, cancer and neurodegeneration (Ravikumar et al."

