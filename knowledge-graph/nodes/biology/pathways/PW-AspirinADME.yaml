name: Aspirin ADME
reactome_id: R-HSA-9749641

description: "In water aspirin (acetylsalicylic acid, ASA) dissolves, dissociating into the acetylsalicylate ion (ASA-). ASA- is an anti-clotting agent and nonsteroidal anti-inflammatory drug (NSAID); the therapeutic effects are mediated through its interaction with PTGS enzymes. On a molar basis ASA- (a) is more potent as an analgesic/anti-inflammatory agent, (b) has greater gastric ulcerogenic activity, and (c) is much more effective as an inhibitor of prostaglandin biosynthesis and platelet aggregation than salicylate (ST) (Flower 1974; Mills et al, 1974; Rainsford 1975; Rainsford 1977).Acetylsalicylic acid is only slightly soluble in conditions being found in the stomach mucosa, mostly because of unavailability of sufficient amount of solvent."

