id: PW-Visualphototransduction
type: knowledge
domain: biology
name: Visual phototransduction
reactome_id: R-HSA-2187338

description: Visual phototransduction is the process by which photon absorption by visual pigment molecules in photoreceptor cells is converted to an electrical cellular response. The events in this process are photochemical, biochemical and electrophysiological and are highly conserved across many species. This process occurs in two types of photoreceptors in the retina, rods and cones.

