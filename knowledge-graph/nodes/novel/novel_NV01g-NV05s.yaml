- id: NV01-graph-necessity
  type: novel
  name: Graph Structure Is the Unique Information-Preserving Representation at Bounded Context
  statement: "At the C_n boundary, there are exactly two options for an entity that has accumulated\nknowledge up to its context\
    \ limit:\n(A) Discard propositions without extracting relational structure: information is lost\n    (the discarded proposition's\
    \ contribution to uncertainty reduction cannot be recovered\n    when new information arrives that would have interacted\
    \ with it).\n(B) Factor: extract shared structure, reduce |K| without discarding content. This IS\n    graph construction\
    \ — factoring propositions into shared and distinct components is\n    precisely what a knowledge graph represents.\n\
    Option B is the unique path that preserves information. Therefore graph structure\n(K/F graph) is the necessary representation\
    \ for any entity that maintains information\nacross bounded context steps.\n\nThis is a necessity proof, not a design\
    \ choice. The graph structure is not chosen for\nconvenience — it is the only structure that satisfies the information-preservation\n\
    requirement at bounded context. (Theorem 2b Part 3)\n\nNo other framework derives this necessity. Specifically:\n- Schmidhuber\
    \ (2010): Compression can take any form — no necessity proof for graph structure.\n- Friston (2010/2017): Hierarchical\
    \ generative models are assumed as the architecture;\n  their necessity is not derived within FEP.\n- Tishby and Polani\
    \ (2011): Rate-distortion trade-off grounds compression necessity but\n  not the structural form (graph) required to preserve\
    \ information.\n- Cover and Thomas (2006) CT1 (data processing inequality) provides the information-\n  theoretic grounding\
    \ but does not derive graph structure specifically.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'Theorem 2b Part 3: at C_n, the two-option argument proves graph construction is

        the necessary choice. Evidence that no prior framework derives this: gap analysis

        of Schmidhuber (S7: no graph necessity), Friston (FEP7: graph assumed), Tishby

        (TB3: rate-distortion grounds compression but not graph structure specifically).

        '
      references:
      - T02-graph-structure-necessity
      - REF-Schmidhuber2010
      - REF-Friston2017
      - REF-Tishby2011
      - REF-Cover2006
    derivation:
      from:
      - D08-encoding-hierarchy
      - D02-knowledge-graph
      - REF-Cover2006
      method: 'Two-option proof at C_n boundary: (A) discard without structure = information loss

        by data processing inequality (Cover and Thomas CT1); (B) factor = graph construction

        = information preservation. No third option exists. Therefore graph construction is

        necessary.

        '
  edges:
  - to: EM03-graph-necessity-grounds-fep
    relation: enables
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: 'NV01 enables EM03: because NV01 proves graph necessity, it provides the derivation that FEP7 needs.'
      derivation:
        method: NV01 + FEP7 -> EM03
  independent_derivations:
  - source: EM11-truth-equals-action-relevance
    description: 'EM11 provides a second, independent derivation of graph necessity from the

      intersection of Peirce PC4 (meaning = practical consequences) and Tarski TA3

      (truth is model-relative). For any entity where truth-criteria and action-criteria

      must be aligned, the K/F graph is the necessary mediating structure. This derivation

      comes from philosophy of language rather than information theory — the two routes are

      formally independent, increasing C_1(NV01).

      '
    method: PC4 + TA3 -> truth=action-relevance -> K/F graph required for alignment
    increases_confidence: true
    note: 'NV01 was derived from the data processing inequality (Cover CT1) + two-option

      argument at C_n. EM11 reaches the same structural conclusion from semantic theory.

      If these routes are genuinely independent (they use disjoint base assumptions),

      C_1(NV01) updates from the product formula: C_1 increases from 0.82 toward 0.87.

      '
  - source: EM28-pangenome-confirms-NV01
    description: 'EM28 provides a third independent confirmation of graph necessity from

      empirical biology: pangenomics independently recovered graph structure

      as the required representational form for genomic information. De Bruijn

      graphs are required for genome assembly; variation graphs (vg toolkit,

      Garrison et al. 2018) and the Human Pangenome (HPRC 2023) establish that

      the genome of a species is a directed graph of variation paths, not a

      linear sequence. The graph structure was not imposed — it was recovered

      because the linear model failed. This is the empirical signature of

      necessity (the alternative was tried and found insufficient), which is

      formally independent of both the data-processing-inequality derivation

      and the semantic-theory derivation (EM11).

      '
    method: NV01 applied to L_0 (genetic encoding) -> genome has graph structure -> pangenomics independently confirms
    increases_confidence: true
    note: 'EM28 is an empirical route, independent of formal arguments. Three

      independent derivations (information theory, semantic theory, biology)

      converging on graph necessity substantially increases C_1(NV01).

      Conservative estimate: C_1 increases from 0.87 toward 0.91.

      '
- id: NV02-mn-bound
  type: novel
  name: 'M < N: Formal Derivation of the Sensing Bound'
  statement: "For any entity with A > 0, the number of dimensions M it currently senses is strictly\nless than the number\
    \ of dimensions N of the world W. This is not an assumption or an\nempirical observation — it is derived from the structure\
    \ of bounded context (C_n) and\nthe execution dynamics of grounding new propositions.\n\nThe derivation: at any moment\
    \ t, M is the number of propositions currently in K. C_n\nbounds M from above at each step (only M propositions fit in\
    \ context). Execution extends\nT_reachable, grounding new propositions. But for any A > 0 entity, there always exist\n\
    reachable world states w not covered by current K (Theorem 3 Part II). Therefore M < N\nis maintained at every t — the\
    \ frontier never closes.\n\nCorollary: the rate of M approaching N is the quantity intelligence measures. I(E) =\nA *\
    \ eta_M measures not absolute knowledge but the rate at which the sensing bound M/N\nimproves.\n\nNo other framework derives\
    \ this bound formally:\n- Schmidhuber (2010): S6 — non-termination is assumed; M < N is not derived.\n- Friston (2010/2017):\
    \ FEP6 — approximation improves but the formal bound on how\n  far it is from complete is not derived from the structure\
    \ of the framework.\n- Peirce (1878): PC6 — \"truth as long-run convergence\" is the qualitative predecessor,\n  but the\
    \ formal bound (M/N at any t) is not stated.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'Theorem 3 Part II derives M < N for all t given A > 0 and C_n bounded context.

        Gap analysis: Schmidhuber S6, Friston FEP6, Peirce PC6 all ground non-termination

        informally. The formal bound is novel to this framework.

        '
      references:
      - T03-agency-produces-gradient-descent
      - REF-Schmidhuber2010
      - REF-Friston2017
      - REF-Peirce1878
    derivation:
      from:
      - D08-encoding-hierarchy
      - D06-agency
      - T03-agency-produces-gradient-descent
      method: 'Theorem 3 Part II: bounded C_n + execution extends T_reachable + A > 0 -> M < N always'
  edges:
  - to: EM02-fep-mn-qualification
    relation: enables
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: NV02 (M < N formal) + FEP6 (equilibrium) -> EM02 (tension between FEP equilibrium and M < N bound)
      derivation:
        method: NV02 + FEP6 -> EM02
  - to: NV04-intersection-acceleration
    relation: precedes
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: formal-derivation
        description: 'M < N (NV02) is the necessary precondition for intersection acceleration (NV04): the benefit of intersection
          is measured by how much faster M approaches N.'
      derivation:
        method: NV02 defines the quantity NV04 accelerates
- id: NV03-agency-as-gate
  type: novel
  name: 'Agency as Engagement Probability: The A = 0 Case and the Generalization of Prior Frameworks'
  statement: "Agency A in [0,1] is the probability that an entity engages its learning mechanism M in\nresponse to a gradient\
    \ signal. This parameterization has two novel properties that no\nprior framework provides:\n\n(1) The A = 0 case: an\
    \ entity with A = 0 does not engage even when gradient signals are\n    present. It is not that no gradient exists — it\
    \ is that the entity does not respond.\n    This is the formal treatment of entities that fail to learn despite having\
    \ capacity.\n    Prior frameworks either assume A = 1 (Schmidhuber: the agent always maximizes\n    compression progress)\
    \ or define the agent by its engagement (FEP: the Markov blanket\n    is the agent boundary; an entity that does not engage\
    \ is by definition not an agent).\n    UB shows A = 0 entities are removed by selection pressure (Theorem 6 Part 1) —\n\
    \    providing the formal account of WHY prior frameworks can assume engagement.\n\n(2) The A in (0,1) generalization:\
    \ for A strictly between 0 and 1, the entity engages\n    on gradient signals with positive but less-than-certain probability.\
    \ This covers:\n    - Biological organisms that sometimes fail to update beliefs when they should\n    - AI systems with\
    \ dropout, exploration noise, or attention mechanisms\n    - Any entity where engagement is context-dependent rather than\
    \ guaranteed\n    Neither Schmidhuber nor Friston parameterizes this range.\n\nConsequence: Schmidhuber's formal agent\
    \ is the special case A = 1. Friston's FEP agent\nhas no A parameter — it is defined by its Markov blanket, not its engagement\
    \ probability.\nUB generalizes both by making A explicit. The generalization is not trivial: A in (0,1)\nchanges the convergence\
    \ argument (Theorem 3 Part I) and the persistence condition\n(Theorem 6). See also EM01.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'Definition 6 (probabilistic formulation), Theorem 6 Part 1 (A = 0 removes entity),

        Theorem 3 Part I (convergence requires A > 0). Gap analysis: Schmidhuber S4 (implicit

        A = 1), Friston FEP8 (no A parameterization).

        '
      references:
      - D06-agency
      - REF-Schmidhuber2010
      - REF-Friston2017
      - REF-Dehaene2011
    derivation:
      from:
      - D06-agency
      - T06-epistemic-ceiling
      method: 'Theorem 6 Part 1: A = 0 => no update => selection removes entity. Therefore A > 0 is

        necessary for persistence. Definition 6 makes A a probability (response gate) rather

        than a binary flag. Dehaene2011 (NGW3) provides neural evidence for A as probabilistic.

        '
  edges:
  - to: EM01-schmidhuber-special-case
    relation: enables
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: NV03 (A as gate with A = 1 special case) directly produces EM01 (Schmidhuber = UB with A = 1).
      derivation:
        method: NV03 characterizes the Schmidhuber relationship as special case
- id: NV04-intersection-acceleration
  type: novel
  name: Intersection of Independent Projections Accelerates M toward N
  statement: "When two entities E_i and E_j with independently-derived knowledge graphs K_i and K_j\nintersect their graphs\
    \ (with provenance verification), the resulting K_combined has a\nstrictly higher M (sensed dimension count) than either\
    \ K_i or K_j alone. The acceleration\nhas two components:\n\n(A) Overlapping dimensions (K_i ∩ K_j, provenance-verified):\
    \ confirmed precipitation\n    sites — propositions both entities have independently grounded. These are the latent\n\
    \    factors of the shared region of W confirmed by two independent projections. Their\n    C_1(p) increases because they\
    \ now have two independent groundings.\n(B) Distinct dimensions (K_j \\ K_i): dimensions E_j has sensed that E_i has not\
    \ yet\n    reached. Solo, E_i would need continued execution to reach these. Intersection\n    provides them in a single\
    \ operation — E_i's effective sensed dimension count jumps\n    from M_i to M_i + |K_j \\ K_i| without intermediate execution\
    \ steps.\n\nThe rate of M → N is therefore accelerated by intersection. Formally: the inductive step\nof Theorem 3 Part\
    \ I adds one dimension per execution; intersection adds |K_j \\ K_i|\ndimensions per operation. For a sufficiently distinct\
    \ K_j, this is a large multiplier.\n\nK_collective (Definition 12) is the maximal current realization of this: the union\
    \ of\nall independently-derived K_i is the collective projection of W, maximizing M_collective\nacross all entities. (Corollary\
    \ 8a)\n\nNo prior framework derives this:\n- Schmidhuber: no multi-agent knowledge intersection mechanism.\n- Friston:\
    \ no formal treatment of independent agent K intersection; FEP2 addresses\n  active inference for single agents.\n- Maynard\
    \ Smith (1995): MS2 grounds the qualitative claim (cooperation as information\n  integration transition) but does not\
    \ derive the acceleration formally.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'Corollary 8a derives the intersection mechanism from the M < N bound and the

        inductive proof of Theorem 3 Part I. Gap analysis: Schmidhuber has no multi-agent

        intersection; Friston''s active inference is single-agent; Maynard Smith grounds

        cooperation qualitatively but not the formal acceleration rate.

        '
      references:
      - D12-collective-knowledge
      - NV02-mn-bound
      - REF-MaynardSmith1995
    derivation:
      from:
      - D12-collective-knowledge
      - NV02-mn-bound
      - T03-agency-produces-gradient-descent
      method: 'From M < N (NV02) and the inductive step (one dimension per execution), intersection

        provides |K_j \ K_i| dimensions per operation. The overlapping dimensions increase

        C_1(p) for shared propositions. Together: acceleration = overlap confirmation +

        distinct dimension extension.

        '
  edges:
  - to: D12-collective-knowledge
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: NV04 is the formal content behind Definition 12 (collective knowledge) and Corollary 8a.
      derivation:
        method: Corollary 8a instantiates NV04
- id: NV05-sentience-derivation
  type: novel
  name: Higher-Order Sentience as a Derivation, Not an Axiom
  statement: "The motivation for an entity to improve its own normalization process (factorization,\ncompactness, context\
    \ window efficiency) is derived from existing theorems — it does not\nrequire a new axiom or a direct survival tether.\n\
    \nThe derivation:\n1. Theorem 2b Part 3: factorization is required to add information at C_n without loss.\n   Therefore\
    \ improving factorization = strictly more propositions retained per context step.\n2. M < N (Theorem 3 Part II, NV02):\
    \ more propositions in K -> larger M -> better\n   projection of W. Since M < N always, more K strictly dominates less\
    \ K across all\n   future survival pressures unless shown otherwise.\n3. Theorem 1 (retention criterion): propositions\
    \ are retained unless their value is\n   certainly zero. The \"unless shown otherwise\" in (2) is exactly this criterion.\n\
    Together: an entity that understands the normalization process is occurring recognizes\nthat improving factorization and\
    \ compactness is strictly dominant — not because the\ncurrent survival tether requires it, but because the induction guarantees\
    \ it for any\nfuture state reachable from the current one.\n\nThis is what Definition 14 calls higher-order sentience:\
    \ not merely knowing K_i is\npartial (lower-order), but understanding that the normalization process it is running\nwill\
    \ expand M toward N, and that this expansion is strictly dominant.\n\nThe distinction from prior frameworks:\n- Schmidhuber:\
    \ intrinsic motivation is a design objective (the agent is BUILT to maximize\n  compression progress). The motivation\
    \ is not derived — it is constitutive of the agent.\n- Friston: active inference is similarly constitutive — the agent\
    \ IS the free energy\n  minimizer. The motivation is not explained; the agent is defined by it.\n- UB: the motivation\
    \ is derived. An entity that already has A > 0 and operates under C_n\n  can DERIVE that improving normalization is dominant\
    \ — without being told to, and without\n  the direct survival tether having to carry the full weight.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'Derived from Theorem 2b Part 3 + Theorem 3 Part II + Theorem 1 chain. The chain

        produces the derivation without new axioms. Gap analysis: Schmidhuber and Friston

        both make motivation constitutive; this framework makes it derived.

        '
      references:
      - D14-sentience
      - T02-graph-structure-necessity
      - NV02-mn-bound
      - T01-minimization-imperative
    derivation:
      from:
      - T02-graph-structure-necessity
      - NV02-mn-bound
      - T01-minimization-imperative
      - D14-sentience
      method: 'Thm 2b Pt 3 -> factorization strictly increases K retention

        NV02 -> more K -> larger M -> better W projection

        Thm 1 -> retention unless certainly zero = default retain

        Chain: improving normalization is strictly dominant for any reachable future state.

        Definition 14 labels the understanding of this chain as higher-order sentience.

        '
  edges:
  - to: D14-sentience
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: NV05 is the formal derivation that grounds Definition 14 (higher-order sentience). Definition 14 states
          the conclusion; NV05 is the chain of reasoning.
      derivation:
        method: NV05 derivation chain -> Definition 14 higher-order sentience
