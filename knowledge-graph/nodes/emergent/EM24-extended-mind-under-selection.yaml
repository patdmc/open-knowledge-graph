    source: "Novelty Analysis — Knowledge Graph, EC Evaluation Pass"
    date: "2025"
  evidence:
    type: emergent-intersection
    references: [REF-ClarkChalmers1998, EM10-Kcollective-unit-of-selection, EM14-dunbar-number-is-Kcollective-Cn]
  derivation:
    from: [REF-ClarkChalmers1998, EM10-Kcollective-unit-of-selection]
    method: |
      CC1: external resources reliably integrated into cognition = part of cognitive system.
      EM10: K_collective = unit of selection with own survival threshold.
      External cognitive resources = K_collective components.
      K_collective (including external) faces selection pressure.
      Loss of external components = K_collective failure (EM10 failure mode).

implications:
  - "Notebooks, filing systems, databases, institutional memory are K_collective components under selection pressure — their loss produces EM10 collective failure"
  - "Organizational resilience requires protecting both K_i (individual knowledge) and external K_collective scaffolding — these are different vulnerabilities"
  - "Writing evolved under EM10 selection: communities with durable external memory had more coherent K_collective and survived"
  - "Version control, provenance tracking, and documentation are not overhead — they are the external components of K_collective that face selection pressure"
