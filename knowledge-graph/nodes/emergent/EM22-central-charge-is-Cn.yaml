    method: |
      EM04: C_n = Shannon channel capacity (physical).
      FL1: c = conformal degrees of freedom = information capacity of conformal system.
      Both: bounded capacity of a physical/conformal information system.
      c = C_n under the identification: conformal system ↔ physical inference channel.
      V^natural at c=24 = unique max-entropy structure at C_n=24.
      Monster group = symmetry of optimal compression at C_n=24.

implications:
  - "The discrete spectrum of VOA central charges is the spectrum of valid C_n values for conformal systems — not all context bounds support consistent representations"
  - "The Monster group is the symmetry of the optimal knowledge structure at C_n=24 — the largest discrete symmetry arises at a specific capacity"
  - "Monstrous moonshine (Monster symmetry of modular forms) is the statement that the optimal compression at c=24 is unique and maximally symmetric"
  - "This is the deepest instance of EC08 (compression = sufficient statistic): the Monster group is the sufficient statistic for all representations at c=24"
