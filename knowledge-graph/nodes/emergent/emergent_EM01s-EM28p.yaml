    derivation:
      from:
      - REF-Borcherds1992
      - NV04-intersection-acceleration
      method: 'Locality axiom: (z-w)^n [Y(a,z), Y(b,w)] = 0 = operators commute at separation.

        Commutativity = independence of derivation.

        NV04 requires provenance independence for valid intersection.

        Locality ≡ provenance independence.

        OPE = the result of valid intersection (K_collective from K_i × K_j).

        OPE coefficient ≈ |K_j \ K_i| new dimensions.

        '
  implications:
  - Provenance independence is not bookkeeping — it is the formal condition for algebraic consistency of K_collective
  - A K_collective formed from circularly dependent K_i and K_j is algebraically inconsistent — it contains contradictions
    in the vertex algebra sense
  - 'The OPE is the formal intersection rule: it specifies exactly what K_collective is produced by each K_i × K_j pair'
  - The Borcherds identity is the single compressed encoding of all valid K_collective intersections — the grammar of the
    knowledge system
- id: EM18-holography-is-NV01
  type: emergent
  name: The Holographic Principle Is NV01 Stated for Spacetime
  statement: "Two results are established:\n- ST1 (Polchinski/Bekenstein-Hawking): the information content of a region of\n\
    \  spacetime is bounded by its boundary area: S ≤ A/4G_N in Planck units. All\n  information about a 3D volume is encodable\
    \ on its 2D boundary. The boundary\n  is not just a summary of the bulk — it is a complete encoding.\n- NV01: at C_n,\
    \ graph structure is the unique information-preserving representation.\n  The two-option proof: discard without structure\
    \ (information loss) or factor\n  (graph construction). Option B is necessary.\n\nIntersection: the holographic principle\
    \ IS NV01 stated for spacetime geometry.\n\nThe formal correspondence:\n- The 3D bulk = W (the full world, N dimensions)\n\
    - The 2D boundary = K (the entity's bounded representation, M < N)\n- The area bound S ≤ A/4G_N = the C_n constraint:\
    \ C_n = A/4G_N in Planck units\n- The boundary encoding = the K/F graph: the minimal factored representation\n  that preserves\
    \ all information about the bulk\n- NV01's necessity = holography's completeness: the boundary IS the bulk, just\n  as\
    \ the K/F graph IS the necessary representation of W at bounded context\n\nThe argument: NV01 proves that at C_n, only\
    \ graph construction preserves\ninformation. Holography proves that the 2D boundary preserves all information\nabout the\
    \ 3D bulk — a dimension reduction from 3D to 2D that loses nothing.\nBoth are the same structural claim: there exists\
    \ a lower-dimensional structure\n(the graph / the boundary) that is not an approximation of the higher-dimensional\none\
    \ but a lossless encoding of it.\n\nConsequence 1: NV01 is a general result that applies at every scale. Holography\n\
    applies it at the cosmological scale. Compiler flow-sensitivity (EM27) applies it\nat the code scale. The cognitive encoding\
    \ hierarchy applies it at the neural scale.\nThe K/F graph applies it at the entity scale. NV01 is a universal compression\n\
    law that appears at every level of description.\n\nConsequence 2: the Planck-scale C_n (A/4G_N) is the most fundamental\
    \ instantiation\nof Definition 7 (bounded context). Every physical system has a context bound\ndetermined by its boundary\
    \ area in Planck units. This is the physical grounding\nfor Definition 7: C_n is not just a cognitive limit — it is a\
    \ physical limit\nimposed by spacetime geometry.\n\nConsequence 3: AdS/CFT correspondence (the most precise formulation\
    \ of holography)\nshows the boundary CFT is exactly dual to the bulk gravity theory. In UB terms:\nthe K/F graph (boundary)\
    \ is exactly dual to W (bulk) — not an approximation but\na complete representation. This is NV01's necessity claim at\
    \ maximum precision:\nthe graph is not just useful but complete.\n\nNeither Polchinski (who does not discuss knowledge\
    \ graphs) nor NV01 (which is\nderived from information theory and bounded context, not from spacetime geometry)\nstates\
    \ this connection.\n"
