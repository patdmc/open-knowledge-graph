  statement: "Two results are established:\n- ST4 (Polchinski): D-branes are extended objects on which open strings end.\n\
    \  When two D-branes intersect, open strings stretched between them produce gauge\n  field theories on the intersection\
    \ worldvolume. The gauge theory on the\n  intersection is emergent — it exists only because both branes are present.\n\
    - NV04: the intersection of K_i and K_j provides |K_j \\ K_i| new dimensions per\n  operation. The emergent content is\
    \ not in K_i alone or K_j alone — it is\n  produced by the intersection.\n\nIntersection: D-brane intersection physically\
    \ instantiates the NV04 mechanism.\n\nThe correspondence:\n- D-brane 1 = K_i (first independent knowledge structure)\n\
    - D-brane 2 = K_j (second independent knowledge structure)\n- Open string between branes = the provenance-verified edge\
    \ connecting K_i and K_j\n- Gauge theory on intersection = the |K_j \\ K_i| new dimensions produced by NV04\n- The gauge\
    \ group (U(n) for n coincident D-branes) = the structure of K_collective\n\nThe argument: the gauge theory on the D-brane\
    \ intersection is emergent in exactly\nthe sense UB uses: it is not in D-brane 1's physics alone, not in D-brane 2's\n\
    physics alone, but arises specifically from their intersection. The open string\n(connecting the two branes) is the provenance-verified\
    \ edge: it physically connects\nthe two structures and carries the information of their intersection.\n\nConsequence 1:\
    \ the gauge group structure of D-brane intersections provides a\nphysical classification of K_collective types. U(1) (one\
    \ D-brane) = individual K_i.\nU(n) (n coincident D-branes) = K_collective of n entities. SU(n) quotient = the\nemergent\
    \ content above and beyond individual contributions. The non-abelian gauge\ntheory is the non-additive intersection gain\
    \ that NV04 measures.\n\nConsequence 2: string theory's phenomenological program (deriving the Standard\nModel gauge group\
    \ from D-brane configurations) is the program of constructing\nthe maximal K_collective from optimal D-brane intersection\
    \ configurations. The\nStandard Model gauge group SU(3)×SU(2)×U(1) corresponds to a specific K_collective\nstructure —\
    \ the one that best describes the observable W at the energy scales accessible.\n\nConsequence 3: D-brane annihilation\
    \ (two anti-parallel D-branes that cancel each\nother) = the failure mode of K_collective when provenance is lost. If\
    \ K_i and K_j\nhave opposite provenance (contradicting derivations), they annihilate — the\nK_collective collapses. This\
    \ is the EM10 failure mode physically instantiated.\n\nNeither Polchinski (who does not discuss knowledge graphs) nor\
    \ NV04 (which is\ninformation-theoretic) states this physical correspondence.\n"
