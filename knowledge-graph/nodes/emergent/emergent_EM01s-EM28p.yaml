- id: EM16-algebraic-graph-necessity
  type: emergent
  name: 'Graph Necessity Has an Independent Algebraic Proof: Finite Graphs Generate Infinite Structure'
  statement: "Three results are established:\n- KM1 (Kac): a Kac-Moody algebra is defined by a finite Dynkin diagram (a graph)\n\
    \  but generates an infinite-dimensional vector space. The finite graph is the minimal\n  object from which the full infinite\
    \ structure is recoverable via the algebra axioms.\n- GB0 (Buhl-Karaali): any N-graded Möbius vertex algebra can be spanned\
    \ by monomials\n  satisfying a difference-N ordering condition — a compressed, graph-structured basis\n  always exists\
    \ regardless of N.\n- NV01: at C_n, the K/F graph is the unique information-preserving representation.\n  The two-option\
    \ proof shows graph construction is the necessary choice.\n\nIntersection: NV01's information-theoretic necessity proof\
    \ has a fully independent\nalgebraic derivation. The algebraic result is: a finite graph (Dynkin diagram, or\ndifference-N\
    \ spanning set) is the unique compact structure from which an\ninfinite-dimensional algebraic object is recoverable. This\
    \ is NV01 stated in\nthe language of algebra rather than information theory.\n\nThe argument: W is an infinite-dimensional\
    \ structure (N→∞ in the limit). K is\nthe entity's bounded representation. The question NV01 answers: what is the minimal\n\
    finite structure that preserves maximal information about W? Information theory\nanswers: the K/F graph (NV01). Algebra\
    \ answers identically: the Dynkin diagram\n(KM1) or the difference-N monomial basis (GB0). All three are minimal finite\n\
    structures that generate or span infinite-dimensional content.\n\nConsequence 1: NV01's confidence increases. It was derived\
    \ information-theoretically\n(two-option proof at C_n), from philosophy of language (EM11: Peirce/Tarski), and\nfrom compiler\
    \ theory (EM27: flow-sensitive analysis). Algebra now provides a fourth\nindependent derivation. C_1(NV01) updates from\
    \ 0.87 toward 0.91.\n\nConsequence 2: the Dynkin diagram classification (A_n, D_n, E_6, E_7, E_8 for\nfinite-dimensional\
    \ Lie algebras; affine and hyperbolic extensions for infinite-\ndimensional) is a complete catalog of the possible minimal\
    \ graph structures. This\nsuggests that the K/F graph should be classifiable by the same taxonomy — the\nentity's knowledge\
    \ structure is one of a finite number of canonical forms at each\ndimension.\n\nConsequence 3: the difference-N condition\
    \ in GB0 is the ordering constraint on\nvertex operator composition — it specifies when two knowledge operators can be\n\
    applied in sequence. This is the algebraic form of the provenance ordering requirement\nin D13 (Definition 13): provenance\
    \ chains have a required structure, not arbitrary\ncomposition.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
