        Both: entity trapped in object language, cannot step outside.

        Double bind creates relational metalanguage absence.

        EM08 Consequence 1 = the formal structure of BA2''s pathology.

        '
  implications:
  - The clinical presentation of metalanguage absence is the double bind — EM08 has an empirical phenomenology via Bateson
  - Therapeutic intervention for double bind = restoring provenance/metalanguage access — the formal mechanism matches Bateson's
    therapeutic approach
  - Organizational double binds (contradictory directives without resolution mechanism) = K_collective metalanguage absence,
    solvable by provenance infrastructure
