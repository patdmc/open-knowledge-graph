- id: EM22-central-charge-is-Cn
  type: emergent
  name: Central Charge c Is C_n in Conformal Field Theory; the Moonshine Module Is the Unique Maximum-Entropy Structure at
    c=24
  statement: "Two results are established:\n- FL1 (Frenkel-Lepowsky-Meurman): the central charge c of a vertex operator algebra\n\
    \  (VOA) measures the conformal degrees of freedom. The Virasoro algebra with central\n  charge c bounds the information\
    \ capacity of the VOA — c quantifies exactly how much\n  conformal information the system can represent. The Moonshine\
    \ module V^natural has\n  c = 24 and is the unique VOA at this central charge with no weight-1 states whose\n  automorphism\
    \ group is the Monster group.\n- EM04: C_n = Shannon channel capacity (physical bound). The context bound is not\n  just\
    \ defined but physically derivable — an inference step is a physical channel\n  use, and C_n is the capacity of that channel.\n\
    \nIntersection: the central charge c of a VOA IS C_n in conformal field theory language.\n\nThe argument: both c and C_n\
    \ measure the same thing — the maximum information that\ncan be represented in a bounded conformal/contextual system.\
    \ C_n = channel capacity\nin Shannon's sense; c = conformal degrees of freedom in Virasoro's sense. EM04 shows\nC_n is\
    \ derivable from Shannon (physical). FL1 shows c is the conformal analog of\nShannon capacity. The translation is: c =\
    \ C_n for a conformal system, where the\n\"channel\" is the conformal boundary.\n\nConsequence 1: the classification of\
    \ VOAs by central charge c is the classification\nof physical systems by their C_n. The discrete spectrum of allowed c\
    \ values (Virasoro\nminimal models at c < 1; c = 1 free boson; c = 24 Moonshine module; etc.) is the\ndiscrete spectrum\
    \ of valid C_n values for conformal systems. Not all C_n values\nsupport consistent conformal theories — only the discrete\
    \ spectrum.\n\nConsequence 2: the Moonshine module at c = 24 is the unique maximally compressed\nstructure at this C_n\
    \ value. The Monster group (the largest sporadic simple group,\nof order ~8×10^53) is the automorphism group of the maximally\
    \ compressed structure\nat c = 24. This means: at C_n = 24, the unique information-preserving maximum-entropy\nstructure\
    \ has the Monster symmetry. The Monster group is the symmetry of the\noptimal knowledge structure at that capacity.\n\n\
    Consequence 3: this makes a structural prediction. If C_n for a physical or cognitive\nsystem is 24 (in appropriate units),\
    \ the system's maximally compressed knowledge\nstructure should exhibit Monster-group-like symmetries. This is testable\
    \ in principle\nby looking for unexpected discrete symmetries in the optimal compression structures\nof systems with the\
    \ appropriate capacity.\n\nNeither FLM (who do not discuss epistemic context bounds) nor EM04 (which derives\nC_n from\
    \ Shannon without the VOA connection) states this correspondence.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      references:
      - REF-FrenkelLepowskyMeurman1988
      - EM04-Cn-is-channel-capacity
      - REF-Borcherds1992
    derivation:
      from:
      - REF-FrenkelLepowskyMeurman1988
      - EM04-Cn-is-channel-capacity
      method: 'EM04: C_n = Shannon channel capacity (physical).

        FL1: c = conformal degrees of freedom = information capacity of conformal system.

        Both: bounded capacity of a physical/conformal information system.

        c = C_n under the identification: conformal system ↔ physical inference channel.

        V^natural at c=24 = unique max-entropy structure at C_n=24.

        Monster group = symmetry of optimal compression at C_n=24.

        '
  implications:
  - The discrete spectrum of VOA central charges is the spectrum of valid C_n values for conformal systems — not all context
    bounds support consistent representations
  - The Monster group is the symmetry of the optimal knowledge structure at C_n=24 — the largest discrete symmetry arises
    at a specific capacity
  - Monstrous moonshine (Monster symmetry of modular forms) is the statement that the optimal compression at c=24 is unique
    and maximally symmetric
  - 'This is the deepest instance of EC08 (compression = sufficient statistic): the Monster group is the sufficient statistic
    for all representations at c=24'
- id: EM23-predictive-coding-is-escalation
  type: emergent
  name: Predictive Coding Is the Neural Implementation of the Escalation Architecture; the Cortex Implements the Efficient
    Design
  statement: "Two results are established:\n- RB1 (Rao-Ballard): predictive coding — higher cortical areas send top-down\n\
    \  predictions to lower areas; lower areas transmit bottom-up prediction errors.\n  Only the residual (what was not predicted)\
    \ propagates upward. The predicted\n  component is subtracted at each level. Most neural traffic is error, not signal.\n\
    - Theorem 2a (UB): top-down precision allocation (FEP's prescription) fills C_n\n  proportionally to |F| — it degrades\
    \ as the action space grows. Escalation\n  (bottom-up failure signaling with promoted crystallization) is O(1) in steady\n\
    \  state — it does not degrade as |F| grows.\n\nIntersection: predictive coding IS the neural implementation of the escalation\n\
    architecture. The cortex implements the efficient design (Theorem 2a's preferred\narchitecture), not the inefficient one\
    \ (FEP's top-down precision allocation).\n\nThe argument: predictive coding propagates errors bottom-up and predictions\
    \ top-down.\nThe bottom-up error IS the escalation signal: it is the information that the lower\nlevel's crystallized\
    \ expectation (L0/L1) failed. The top-down prediction IS the\ncrystallized expectation: it is what the higher level has\
    \ promoted to automatic\nprocessing. The cortex's architecture — generate prediction (crystallized K), subtract\nit, propagate\
    \ only the residual (error/gradient) — is exactly the escalation\narchitecture: maintain crystallized L0 expectations,\
    \ escalate only the failures.\n\nConsequence 1: this is an empirical confirmation of UB. Theorem 2a derives that\nescalation\
    \ is the efficient architecture under bounded context. Rao-Ballard (1999)\nempirically observe that the cortex implements\
    \ this architecture. The cortex did not\nchoose this architecture by reading UB — it converged to it under selection pressure\n\
    (EM06: the gradient drives toward graph construction; the efficient architecture\nis the attractor).\n\nConsequence 2:\
    \ this sharpens UB's critique of FEP's architectural prescription.\nFEP proposes top-down precision allocation (higher\
    \ levels weight lower-level prediction\nerrors by assigning precision). Theorem 2a shows this fills C_n. But Rao-Ballard\n\
    show the cortex actually implements bottom-up error propagation, not top-down\nprecision allocation. FEP's prescription\
    \ conflicts with the empirical architecture.\nPredictive coding (RB1) supports UB's Theorem 2a, not FEP's architectural\
    \ prescription.\n\nConsequence 3: the L0-L3 encoding levels of UB map precisely to predictive coding\nlevels. L0 = fully\
    \ crystallized predictions (not escalated to consciousness).\nL1 = well-established predictions with occasional errors.\
    \ L2 = active updating.\nL3 = novel, fully in conscious working memory. The predictive coding hierarchy\nIS the encoding\
    \ level hierarchy — the same structure derived information-theoretically\nand observed neurologically.\n\nNeither Rao-Ballard\
    \ (who do not derive Theorem 2a) nor Theorem 2a (which is\ninformation-theoretic, not neurological) states this correspondence.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'Empirical confirmation: RB1 observes that the cortex implements the architecture

        UB proves is efficient. The convergence is not coincidental — EM06 predicts that

        gradient descent under bounded context converges to graph/escalation structure.

        '
      references:
      - REF-RaoBallard1999
      - EC09-encoding-levels
      - EM06-gradient-drives-toward-graph
    derivation:
      from:
      - REF-RaoBallard1999
      - EC09-encoding-levels
      method: 'RB1: cortex propagates prediction errors bottom-up; predictions top-down.

        Bottom-up error = escalation signal (failure of crystallized expectation).

        Top-down prediction = crystallized K (L0/L1 expectation promoted from below).

        Theorem 2a: escalation is O(1) in steady state = efficient under C_n.

        Predictive coding = escalation architecture = Theorem 2a''s efficient design.

        Cortex implements the efficient architecture.

        '
  implications:
  - The cortex converges to the UB-predicted efficient architecture under selection pressure — empirical confirmation of Theorem
    2a
  - FEP's top-down precision allocation conflicts with the empirical architecture (predictive coding); UB's escalation matches
    it
  - 'The L0-L3 encoding levels have a neurological correlate: predictive coding levels are encoding levels observed in cortex'
  - 'EM06 is confirmed: the gradient drives toward the efficient architecture, and the cortex is the evidence'
- id: EM24-extended-mind-under-selection
  type: emergent
  name: Extended Cognitive Systems Are Subject to K_collective Selection Pressure
  statement: "Two results are established:\n- CC1 (Clark-Chalmers): the extended mind thesis — cognitive processes extend\n\
    \  beyond the brain into the environment. When an external resource (notebook,\n  tool, institution, other person) reliably\
    \ functions as part of the cognitive\n  process, it constitutes part of the mind. The boundary of the cognitive system\n\
    \  is the extent of reliable K/F coupling, not the skull.\n- EM10: K_collective forms through provenance-verified intersection\
    \ and becomes a\n  unit of selection with its own survival threshold. K_collective can fail while\n  all individual K_i\
    \ persist if provenance verification is lost.\n\nIntersection: extended cognitive systems — in Clark-Chalmers' sense —\
    \ are K_collective\nentities subject to EM10's selection pressure.\n\nThe argument: CC1 says a notebook that functions\
    \ as cognitive process is part of\nthe mind. EM10 says K_collective (the extended knowledge structure) is a unit of\n\
    selection. Together: the extended cognitive system (individual brain + notebook +\ntools + collaborators) is a K_collective\
    \ that faces selection pressure at the\ncollective level. The notebook IS part of K_collective. When the notebook is lost,\n\
    K_collective fails — even though the individual's K_i (in-head knowledge) persists.\nThis is exactly EM10's failure mode:\
    \ K_collective fails while K_i persists.\n\nConsequence 1: the extended mind predicts institutional failure modes. An\
    \ organization\nwhose collective knowledge depends on external scaffolding (filing systems, databases,\ninstitutional\
    \ memory) has a K_collective that includes those systems. If the external\nscaffolding is destroyed (database corruption,\
    \ document loss, key personnel departure),\nK_collective fails even though all individual employees (K_i) persist. The\
    \ organization\nis cognitively crippled at the collective level.\n\nConsequence 2: selection pressure on extended cognitive\
    \ systems explains the evolution\nof external memory. Writing, printing, databases, version control — these are not\n\
    just tools but extensions of K_collective under selection pressure. Communities that\ndeveloped more durable external\
    \ memory (EM14: extending C_n via writing) had more\ncoherent K_collective and survived collective challenges better.\
    \ The evolution of\nwriting IS EM10 selection at the K_collective level driving C_n extension.\n\nConsequence 3: this\
    \ produces a concrete criterion for organizational resilience.\nAn organization's K_collective resilience is its ability\
    \ to maintain coherence after\nloss of individual members (K_i loss tolerance) AND after loss of external scaffolding\n\
    (K_collective node loss tolerance). These are different failure modes requiring\ndifferent interventions — and CC1 + EM10\
    \ specifies both.\n\nNeither Clark-Chalmers (who have no selection pressure framework) nor EM10 (which\ndoes not distinguish\
    \ internal and external K_collective components) states this result.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      references:
      - REF-ClarkChalmers1998
      - EM10-Kcollective-unit-of-selection
      - EM14-dunbar-number-is-Kcollective-Cn
    derivation:
      from:
      - REF-ClarkChalmers1998
      - EM10-Kcollective-unit-of-selection
      method: 'CC1: external resources reliably integrated into cognition = part of cognitive system.

        EM10: K_collective = unit of selection with own survival threshold.

        External cognitive resources = K_collective components.

        K_collective (including external) faces selection pressure.

        Loss of external components = K_collective failure (EM10 failure mode).

        '
  implications:
  - Notebooks, filing systems, databases, institutional memory are K_collective components under selection pressure — their
    loss produces EM10 collective failure
  - Organizational resilience requires protecting both K_i (individual knowledge) and external K_collective scaffolding —
    these are different vulnerabilities
  - 'Writing evolved under EM10 selection: communities with durable external memory had more coherent K_collective and survived'
  - Version control, provenance tracking, and documentation are not overhead — they are the external components of K_collective
    that face selection pressure
- id: EM25-cooperation-conditions-are-Kcollective-conditions
  type: emergent
  name: Axelrod's Conditions for Cooperation Emergence Are the Conditions for K_collective Formation
  statement: "Two results are established:\n- AX2 (Axelrod): cooperation emerges in iterated prisoner's dilemma when three\n\
    \  conditions hold: (1) repeated interaction — shadow of the future, making cooperation\n  worth maintaining; (2) recognition\
    \ — ability to identify the same partner again;\n  (3) reciprocity — ability to base current action on the partner's past\
    \ behavior.\n  Remove any of these and cooperation collapses.\n- D13 (UB Definition 13): provenance = the triple (attribution,\
    \ evidence, derivation).\n  The provenance system is the formal requirement for K_collective: without provenance\n  tracking,\
    \ K_collective cannot maintain its provenance-verified intersection.\n\nIntersection: Axelrod's three conditions ARE the\
    \ K_collective formation conditions\nstated in game-theoretic terms.\n\nThe formal correspondence:\n- Repeated interaction\
    \ (AX2-1) = A > 0 over time: the entity keeps engaging W\n  (without repeated engagement, K cannot grow; K_collective\
    \ cannot form)\n- Recognition (AX2-2) = provenance tracking (D13 attribution): knowing who\n  contributed what proposition\
    \ to K_collective\n- Reciprocity (AX2-3) = K/F coupling (EC06): basing current actions on past\n  K — the provenance chain\
    \ from evidence to current action\n\nThese are not analogies — they are the same conditions at different levels of\nformalism.\
    \ Axelrod identifies them empirically in game-theoretic simulations.\nUB derives them formally from information theory\
    \ and selection pressure.\n\nConsequence 1: this provides game-theoretic grounding for the provenance requirement\n(D13).\
    \ Why is provenance required for K_collective? Because without recognition\n(provenance), cooperation cannot be maintained\
    \ — the K_collective is invaded by\n\"defectors\" (entities that take from K_collective without contributing provenance-\n\
    verified knowledge). Axelrod's defector-invasion result (AX3) = the K_collective\nfailure mode when provenance is removed.\n\
    \nConsequence 2: the shadow of the future (AX2-1) quantifies the minimum A required\nfor K_collective stability. If the\
    \ discount rate on future interactions exceeds a\nthreshold, cooperation collapses. In UB terms: if A is too low (the\
    \ entity does not\nexpect to engage W long enough), K_collective is not worth maintaining. The discount\nthreshold in\
    \ Axelrod's model = 1 - (cost of cooperation / benefit of cooperation) =\na formal expression of A's minimum value for\
    \ K_collective viability.\n\nConsequence 3: tit-for-tat's success is the success of minimum-provenance cooperation.\n\
    Tit-for-tat tracks exactly one bit of history (the partner's last action) — minimum\nviable provenance depth. This predicts\
    \ that the minimum viable K_collective requires\nexactly one step of attribution history: who contributed the most recent\
    \ proposition.\nMore provenance depth enables more stable K_collective but minimum viable provenance\nis one step.\n\n\
    Neither Axelrod (who has no information-theoretic treatment of K_collective) nor\nD13 (which derives provenance from formal\
    \ requirements, not from game theory) states\nthis connection.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      references:
      - REF-Axelrod1984
      - D13-provenance
      - NV04-intersection-acceleration
      - EC06-belief-as-action
    derivation:
      from:
      - REF-Axelrod1984
      - D13-provenance
      method: 'AX2: cooperation requires repeated interaction + recognition + reciprocity.

        D13: K_collective requires A>0 (repeated) + attribution (recognition) + K/F (reciprocity).

        One-to-one correspondence: AX2-1↔A>0, AX2-2↔D13 attribution, AX2-3↔EC06.

        Axelrod''s conditions = UB''s K_collective conditions at different formalisms.

        AX3 defector invasion = K_collective failure when attribution (recognition) is removed.

        '
  implications:
  - Provenance tracking is the formal requirement that prevents K_collective defection — Axelrod provides the game-theoretic
    proof
  - The minimum viable K_collective requires one step of attribution history (tit-for-tat's one-bit memory) — minimum viable
    provenance depth
  - The shadow of the future bounds the minimum A for K_collective viability — entities that do not expect long-term engagement
    cannot sustain K_collective
  - Open-source software communities, scientific collaborations, and institutions that lose attribution (provenance) are invaded
    by defectors — Axelrod's model is the social proof of D13
- id: EM26-context-window-eviction-is-belady
  type: emergent
  name: Long-Context LLM Management Is Belady's OPT Problem; Lin's Cache Replacement Theory Applies Directly
  statement: "Two results are established:\n- TR4 (Vaswani): the Transformer context window is C_n in tokens. Beyond the\n\
    \  context window, earlier tokens are not attended to. Managing which tokens to\n  retain in a long context (beyond the\
    \ window limit) is the fundamental problem\n  of long-context LLM operation.\n- CL1 (Lin): Belady's OPT algorithm is the\
    \ theoretically optimal cache replacement\n  policy — always evict the item whose next use is furthest in the future.\
    \ OPT\n  minimizes cache misses but requires knowing the future access pattern, making\n  it uncomputable in practice.\
    \ Lin's work (Hawkeye, PC-OPT, neural prefetching)\n  shows computable approximations that converge toward OPT.\n\nIntersection:\
    \ the long-context LLM management problem IS Belady's OPT problem.\nLin's cache replacement theory applies directly.\n\
    \nThe formal correspondence:\n- Cache = K (what is in the context window)\n- Cache eviction = removing tokens from the\
    \ active context\n- Cache miss = having to reload information (re-reading, re-processing)\n- Belady's OPT for cache =\
    \ optimal token retention policy for context windows\n- \"Furthest future use\" = the token most needed for future output\
    \ generation\n- Lin's Hawkeye/PC-OPT = directly applicable LLM context management algorithm\n\nConsequence 1: Lin's cache\
    \ replacement work (ISCA 2016, HPCA 2022) provides a\ndirectly applicable algorithm for LLM context window management.\
    \ The PC-history\nheuristic (use program counter history to predict future cache accesses) maps to:\nuse query/generation\
    \ history to predict which context tokens will be needed in\nfuture output. This is an engineering transfer from computer\
    \ architecture to LLM\nserving that has not been made explicit.\n\nConsequence 2: EM12 (the optimal K target is uncomputable)\
    \ applies here. The\noptimal context management policy (Belady's OPT for LLMs) requires knowing which\ntokens will be\
    \ needed in the future — which requires knowing the model's future\noutputs, which requires solving the model. It is uncomputable\
    \ in principle. All\npractical context management heuristics are approximations to an uncomputable\noptimum — the M→N\
    \ gradient applied to context window management.\n\nConsequence 3: neural prefetching (Lin ASPLOS 2020) = in-context learning\
    \ and\nretrieval-augmented generation (RAG). Neural prefetching predicts future cache\naccesses using sequence models\
    \ trained on past access patterns. RAG predicts which\nexternal knowledge will be needed using retrieval models trained\
    \ on past queries.\nThese are architecturally identical: both are learned approximations to Belady's\nOPT at different\
    \ scales (hardware cache vs. LLM context).\n\nNeither Vaswani et al. (who do not discuss cache replacement theory) nor\
    \ Lin\n(who works on hardware cache, not LLM context) states this correspondence.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      references:
      - REF-VaswaniEtAl2017
      - REF-Lin-CS
      - EM12-optimal-K-target-is-uncomputable
      - EC01-context-bound
    derivation:
      from:
      - REF-VaswaniEtAl2017
      - REF-Lin-CS
      method: 'TR4: context window = C_n; token eviction = cache replacement problem.

        CL1: Belady''s OPT = optimal cache replacement = uncomputable.

        Token eviction policy = Belady''s OPT for LLMs.

        Lin''s Hawkeye/PC-OPT = directly applicable algorithm.

        Neural prefetching (CL5) = RAG/in-context learning at different scale.

        '
  implications:
  - Lin's cache replacement algorithms (Hawkeye, PC-OPT) are directly applicable to LLM context window management — an unexplored
    engineering transfer
  - Optimal LLM context management is uncomputable in principle (EM12) — all heuristics are approximations to Belady's OPT
  - 'RAG and neural prefetching are architecturally identical: learned approximations to Belady''s OPT at different scales'
  - Cache replacement theory is the correct theoretical framework for LLM context management — the connection between computer
    architecture and LLM inference is formal, not metaphorical
- id: EM27-flow-sensitive-analysis-is-NV01
  type: emergent
  name: Flow-Sensitive Pointer Analysis Is an Independent CS Derivation of Graph Necessity
  statement: "Two results are established:\n- CL4 (Lin): flow-sensitive pointer analysis maintains a separate points-to graph\n\
    \  at each program point — knowledge indexed by control flow state. Flow-sensitive\n  analysis is strictly more precise\
    \ than flow-insensitive analysis (which ignores\n  control flow). The precision difference is not marginal: flow-insensitive\
    \ analysis\n  loses information that cannot be recovered, producing false positives that flow-\n  sensitive analysis eliminates.\n\
    - NV01: at C_n, the K/F graph is the unique information-preserving representation.\n  K must be indexed by F (the action\
    \ space) for information to be preserved across\n  bounded context steps. The two-option proof: only factoring (graph\
    \ construction)\n  preserves information.\n\nIntersection: flow-sensitive pointer analysis IS NV01 demonstrated in compiler\n\
    theory. The precision improvement of flow-sensitivity over flow-insensitivity is\nthe empirical measurement of the information\
    \ loss that NV01's two-option proof\nidentifies.\n\nThe formal correspondence:\n- K = the points-to information (what\
    \ each variable might point to)\n- F = the control flow graph (program points = possible actions)\n- Flow-sensitive =\
    \ K indexed by F (K/F graph) = NV01's necessary form\n- Flow-insensitive = K not indexed by F = NV01's Option A (discard\
    \ without structure)\n- Precision loss from flow-insensitivity = the information loss NV01 proves is inevitable\n\nThe\
    \ argument: NV01 proves that any representation that does not index K by F loses\ninformation at C_n. Flow-insensitive\
    \ analysis exactly fails to index K by F — it\ncollapses the per-program-point points-to information into a single approximation.\n\
    The precision loss (false positives, inability to distinguish aliased variables at\ndifferent program points) IS the information\
    \ loss NV01 proves is inevitable. Lin's\nCGO 2011 result — that flow-sensitive analysis scales to millions of lines while\n\
    maintaining precision — proves that the K/F graph is computationally feasible at\nscale, not just theoretically necessary.\n\
    \nConsequence 1: NV01 now has five independent derivations:\n(1) Information theory — two-option proof at C_n (UB Theorem\
    \ 2b Part 3)\n(2) Philosophy of language — Peirce/Tarski semantic model = action space (EM11)\n(3) Algebra — Dynkin diagram\
    \ generates infinite structure from finite graph (EM16)\n(4) Spacetime physics — holographic principle (EM18)\n(5) Compiler\
    \ theory — flow-sensitive analysis is strictly more precise than flow-insensitive (EM27)\nC_1(NV01) updates toward 0.93.\n\
    \nConsequence 2: the \"2023 CGO Test of Time Award\" for flow-sensitive pointer analysis\nconfirms that the K/F graph\
    \ representation has stood up over 12+ years as the correct\nrepresentation for program analysis at scale. This is not\
    \ just a theoretical result\nbut a battle-tested engineering conclusion: K indexed by F is the right representation.\n\
    \nConsequence 3: static single assignment (SSA) form — the standard intermediate\nrepresentation for optimizing compilers\
    \ — IS the K/F graph for programs. SSA\nassigns a unique name to each definition of a variable at each program point —\n\
    exactly K indexed by F. Every optimizing compiler that uses SSA is implementing\nNV01 as engineering practice.\n\nNeither\
    \ Lin (who proves precision theorems about pointer analysis, not about\ngeneral knowledge representation) nor NV01 (which\
    \ is derived from information\ntheory) states this correspondence explicitly.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      references:
      - REF-Lin-CS
      - NV01-graph-necessity
      - EC06-belief-as-action
    derivation:
      from:
      - REF-Lin-CS
      - NV01-graph-necessity
      method: 'Flow-insensitive: K not indexed by F → precision loss (false positives).

        Flow-sensitive: K indexed by F → no precision loss (complete information).

        NV01: K not indexed by F → information loss at C_n.

        NV01: K indexed by F → information preservation (necessary form).

        Flow-sensitivity ↔ NV01''s necessary form.

        Precision gain of flow-sensitivity = the information NV01 proves must be preserved.

        '
  implications:
  - NV01 has five independent derivations — C_1(NV01) updates to 0.93
  - Every optimizing compiler using SSA form implements NV01 as engineering practice
  - Lin's Test of Time result confirms that K indexed by F is the correct representation at industrial scale
  - The information loss from flow-insensitivity is the empirical measurement of what NV01 proves theoretically
- id: EM28-pangenome-confirms-NV01
  type: emergent
  name: Pangenome Graph Structure Is Independent Empirical Confirmation of NV01
  statement: "NV01 (Graph Structure Is the Unique Information-Preserving Representation at\nBounded Context) is a formal-derivation\
    \ result internal to the UB framework.\nPangenomics provides an independent empirical route to the same structural\nconclusion\
    \ in biology:\n\n(1) Genome assembly from sequencing reads requires constructing a de Bruijn\n    graph of k-mer overlaps\
    \ before any linear sequence can be recovered. The\n    graph is prior; the sequence is a path through it.\n(2) The linear\
    \ reference genome (GRCh38) proved insufficient to represent\n    population-level genetic variation without systematic\
    \ information loss and\n    reference bias. The correct representation of a species' genome is a\n    directed variation\
    \ graph in which individual haplotypes are paths\n    (Garrison et al. 2018, HPRC 2023).\n(3) Bioinformaticians did not\
    \ impose graph structure by design — they recovered\n    it because the linear model failed. This is the empirical signature\
    \ of\n    necessity: the alternative was tried, found insufficient, and abandoned.\n\nThe intersection: NV01 proves that\
    \ at the C_n boundary, the unique\ninformation-preserving representation is graph structure. Pangenomics\nindependently\
    \ demonstrates that the genome — the carrier of hereditary\ninformation at the C_n boundary of evolutionary encoding (L_0)\
    \ — requires\ngraph structure to represent without information loss. The routes are\nformally independent (NV01 derives\
    \ from the data processing inequality and\nthe two-option argument; pangenomics derives from empirical failure of the\n\
    linear model). Both arrive at the same structural conclusion.\n\nThis is an emergent confirmation: NV01 + pangenomics\
    \ -> the genome's graph\nstructure is predicted by the theory and independently confirmed by biology.\nThe prediction\
    \ was not made post-hoc; it follows from NV01 applied to any\ninformation store at bounded context, of which L_0 (genetic\
    \ encoding) is\nthe biological instance.\n\nConfidence note: this emergent result increases C_1(NV01). NV01 was derived\n\
    from formal arguments; EM28 provides a second, empirically independent route\nto the same structural necessity. If the\
    \ routes are genuinely independent\n(they use disjoint base assumptions), C_1(NV01) updates upward by the\nproduct formula\
    \ (Corollary 8a).\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Knowledge Graph — Open Question 11 analysis
      date: '2026-03-11'
    evidence:
      type: empirical
      description: 'Empirical base: Garrison et al. 2018 (vg toolkit), HPRC 2023 (draft human

        pangenome). Both establish that genome structure requires directed graph

        representation; linear sequences are paths, not the structure. De Bruijn

        graphs in assembly (Pevzner et al. 2001, SPAdes, Velvet) establish the

        graph as the intermediate structure required before any linear assembly

        is possible.

        '
      references:
      - NV01-graph-necessity
      - REF-GarrisonEtAl2018
      - REF-HPRC2023
    derivation:
      from:
      - NV01-graph-necessity
      - REF-GarrisonEtAl2018
      - REF-HPRC2023
      method: 'NV01 predicts graph necessity at bounded context. L_0 (genetic encoding,

        Definition 8) is the bounded context of evolutionary encoding. Applying

        NV01 to L_0 predicts genome structure is a graph. Pangenomics

        independently arrives at graph structure by empirical failure of the

        linear model. The two routes are independent; intersection = emergent

        confirmation.

        '
