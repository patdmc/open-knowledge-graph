- id: EM01-schmidhuber-special-case
  type: emergent
  name: Schmidhuber's Formal Agent Is Uncertainty Bounding with A = 1
  statement: "Schmidhuber's formal agent (2010) is a special case of the Uncertainty Bounding framework\nwith A = 1 (always\
    \ engages on gradient signals). This proposition is not contained in\neither framework individually — it arises only from\
    \ holding both simultaneously.\n\nThe argument:\n- Schmidhuber's agent always responds to compression progress signals\
    \ (S4: implicit A = 1).\n  There is no parameterization of engagement probability — the agent is defined as the\n  compression-progress\
    \ maximizer.\n- UB's agency parameter A in [0,1] allows for partial engagement (NV03).\n- Setting A = 1 in UB recovers\
    \ Schmidhuber's agent: an entity that always engages on\n  gradient signals, with eta_M corresponding to d/dt[compression(C)].\n\
    - The remaining difference: UB's K/F graph structure vs. Schmidhuber's compressor C.\n  These are not the same — C is\
    \ an arbitrary compression algorithm (Kolmogorov complexity\n  basis); K/F is specifically a proposition graph with grounding\
    \ relations. But the\n  ROLE they play is equivalent at A = 1.\n\nConsequence for the paper: Schmidhuber's framework does\
    \ not need to be opposed.\nIt is a special case that UB generalizes in two directions:\n(1) A in [0,1]: partial engagement\
    \ is now formal.\n(2) Graph structure necessity (NV01): UB proves the K/F structure is required; Schmidhuber\n    does\
    \ not constrain the form of C.\nThe paper should say: \"Schmidhuber [2010] is the A = 1 limit of this framework. The\n\
    general case adds the A in (0,1) parameterization and the necessity proof for graph\nstructure — two results not present\
    \ in Schmidhuber's formalism.\"\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'This proposition does not appear in Schmidhuber (2010) or in the UB paper as written.

        It emerges from comparing NV03 (A as gate with A in [0,1]) against S4 (implicit A = 1).

        The intersection makes the containment relationship visible.

        '
      references:
      - NV03-agency-as-gate
      - REF-Schmidhuber2010
      - OV02-improvement-rate-measure
    derivation:
      from:
      - NV03-agency-as-gate
      - REF-Schmidhuber2010
      method: 'S4 (Schmidhuber) + NV03 (UB A parameterization) -> Schmidhuber = UB with A = 1.

        OV02 confirms the overlap on improvement rate (eta_M ~ d/dt compression).

        NV01 identifies the remaining gap: graph necessity not in Schmidhuber.

        '
  edges:
  - to: REF-Schmidhuber2010
    relation: characterizes
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: 'EM01 characterizes the relationship between UB and Schmidhuber precisely: containment as special case.'
      derivation:
        method: Intersection of NV03 and S4 produces the containment claim
- id: EM02-fep-mn-qualification
  type: emergent
  name: FEP's Equilibrium Claim Requires the M < N Qualification
  statement: "The Free Energy Principle's long-run equilibrium claim (FEP6: free energy approaches\nits minimum asymptotically)\
    \ is in tension with the M < N bound (NV02: M < N always\nfor A > 0 entities). This tension is not visible within either\
    \ framework individually\n— it emerges from their intersection.\n\nThe tension:\n- FEP6 states: in the long run, the agent's\
    \ generative model closely approximates the\n  generative process. Free energy approaches its minimum — the model approaches\
    \ W.\n- NV02 (Theorem 3 Part II) states: M < N always for A > 0 entities. The sensed\n  dimension count never reaches\
    \ N. The model never fully approximates W.\nThese appear to contradict. The resolution:\n- FEP6 is not wrong — it holds\
    \ for fixed, stationary generative processes. If W has\n  a fixed finite structure, free energy can approach its minimum.\n\
    - NV02 is structural: C_n and execution dynamics ensure M < N as long as the world W\n  continues to extend T_reachable.\
    \ In a non-stationary world (the biologically and\n  cognitively relevant case), NV02 holds.\n- The resolution is that\
    \ FEP6 requires a stationarity assumption that NV02 makes\n  explicit: FEP's equilibrium is a fixed-world idealization;\
    \ the M < N bound is the\n  open-world reality.\n\nThis is a genuine clarification: not a refutation of FEP, but a qualification\
    \ that\nmakes the scope of FEP's equilibrium claim precise. The paper should say: \"Friston's\n[2010/2017] FEP equilibrium\
    \ holds for stationary generative processes. The M < N bound\n(Theorem 3 Part II) shows that in open environments, the\
    \ equilibrium is never reached\nfor A > 0 entities — not because FEP is wrong, but because the open-world assumption\n\
    prevents the stationarity FEP6 requires.\"\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'The tension between FEP6 and Theorem 3 Part II is not visible within either

        framework alone. FEP does not engage with the M < N bound; UB does not directly

        address FEP equilibrium. The intersection makes the qualification necessary.

        '
      references:
      - NV02-mn-bound
      - REF-Friston2017
      - OV03-nontermination
    derivation:
      from:
      - NV02-mn-bound
      - REF-Friston2017
      method: 'FEP6 (equilibrium approached) + NV02 (M < N structural bound) -> tension.

        Resolution: FEP6 requires stationarity; NV02 holds in non-stationary W.

        The intersection makes the stationarity assumption explicit in FEP6.

        '
  edges:
  - to: REF-Friston2017
    relation: qualifies
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: 'EM02 qualifies FEP6: the equilibrium holds under stationarity, which NV02 shows is not the general case.'
      derivation:
        method: Intersection of FEP6 and NV02 -> stationarity qualification for FEP6
- id: EM03-graph-necessity-grounds-fep
  type: emergent
  name: UB's Graph Necessity Proof Provides the Missing Derivation for FEP's Assumed Architecture
  statement: "The Free Energy Principle assumes hierarchical (graph-structured) generative models\n(FEP7) but does not derive\
    \ their necessity. Uncertainty Bounding proves that graph\nstructure is the unique information-preserving representation\
    \ at bounded context (NV01).\nThe intersection reveals that NV01 is the derivation FEP7 needs — and that the two\nframeworks\
    \ are mutually supportive in a way neither states explicitly.\n\nThe argument:\n- FEP7: The FEP generative model is hierarchically\
    \ structured. This is assumed as the\n  architectural basis of the framework. The necessity of this structure — why it\
    \ cannot\n  be otherwise — is not derived within FEP.\n- NV01 (Theorem 2b Part 3): At C_n, the only information-preserving\
    \ representation is\n  a factored (graph-structured) one. Any entity that maintains information under bounded\n  context\
    \ must use graph structure. This is a necessity proof.\n- Together: NV01 provides the derivation that FEP7 needs. The\
    \ FEP's assumption of\n  hierarchical generative models is not an arbitrary architectural choice — it is the\n  necessary\
    \ consequence of operating under bounded context (C_n), which any physical\n  agent must do. FEP7 is correct; NV01 explains\
    \ WHY.\n\nConsequence for both frameworks:\n- UB's necessity proof gets a large independent support base: FEP's empirical\
    \ and\n  theoretical success is evidence that hierarchical graph-structured representations\n  work — and NV01 explains\
    \ why they must.\n- FEP gains a foundational derivation for its architectural assumption: the hierarchical\n  generative\
    \ model is not a modeling choice but a mathematical necessity.\n- The two frameworks are complementary, not competing:\
    \ FEP describes HOW free energy\n  is minimized; UB proves WHY the architecture that does it must be graph-structured.\n\
    \nThe paper should say: \"The FEP's hierarchical generative model architecture [Friston 2010,\n2017] is exactly the structure\
    \ Theorem 2b Part 3 proves necessary. The FEP assumes this\nstructure; this framework derives it. The two results are\
    \ mutually supporting.\"\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'FEP7 (assumed hierarchical architecture) + NV01 (derived graph necessity) -> EM03.

        Neither framework states this relationship. It emerges from the intersection:

        NV01 proves what FEP7 assumes; FEP''s success supports what NV01 derives.

        '
      references:
      - NV01-graph-necessity
      - REF-Friston2017
      - REF-Friston2010
    derivation:
      from:
      - NV01-graph-necessity
      - REF-Friston2017
      method: 'FEP7 (assumption) + NV01 (necessity proof for same structure) -> mutual support.

        NV01 provides the foundation for FEP7; FEP''s success provides empirical evidence

        for NV01. The intersection produces a bilateral strengthening.

        '
  edges:
  - to: NV01-graph-necessity
    relation: supported_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: FEP's empirical and theoretical success is evidence that graph-structured representations work — empirically
          supporting NV01's formal necessity claim.
      derivation:
        method: FEP success -> empirical support for graph necessity -> supports NV01
  - to: REF-Friston2010
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: Novelty Analysis — Knowledge Graph
        date: '2025'
      evidence:
        type: emergent
        description: EM03 grounds FEP7 (assumed hierarchical architecture) with a formal derivation from Theorem 2b Part 3.
      derivation:
        method: NV01 -> grounds FEP7 -> EM03 is the linking proposition
- id: EM04-Cn-is-channel-capacity
  type: emergent
  name: C_n Is Derivable from Shannon's Channel Capacity Theorem
  statement: "Shannon's channel capacity theorem (SH3) establishes that information cannot be\ntransmitted across a noisy\
    \ channel faster than its capacity C = max I(X;Y). The\nbounded context window C_n (UB, EC01) is defined as the inference\
    \ capacity of the\nentity at each step. These are not just analogous — they are the same object.\n\nThe derivation: the\
    \ entity's inference step is a physical process. Any physical process\nthat reads, processes, and updates an internal\
    \ state is an information channel in\nShannon's sense. The entity's inference step has a channel capacity determined by\
    \ its\nphysical substrate — the number of distinguishable states it can reliably process per\nstep. C_n is this channel\
    \ capacity.\n\nConsequence: C_n is not merely defined — it is bounded below by Shannon's theorem.\nNo physical entity\
    \ can have C_n larger than the Shannon capacity of its physical\ninference substrate. This means:\n(1) C_n is physically\
    \ grounded, not just a formal convenience.\n(2) C_n is measurable in principle: measure the mutual information I(input;\
    \ state update)\n    across the entity's inference step, maximize over input distributions → C_n.\n(3) The M < N bound\
    \ (NV02) is therefore also physically grounded via Shannon: the\n    bounded context is bounded by physics, not by an\
    \ assumption.\n(4) The information-preservation necessity proof (Theorem 2b Part 3) is grounded by\n    Shannon's data\
    \ processing inequality (CT1): information lost at C_n cannot be\n    recovered by downstream processing.\n\nThis connection\
    \ was present in the graph (SH3 notes \"analogous to C_n\") but its\nimplication — that C_n is DERIVABLE from Shannon,\
    \ not just defined — was not stated.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'SH3 (channel capacity) and EC01 (bounded context) share the same physical

        constraint. The connection was marked "analogous" in REF-Shannon1948.yaml

        but the derivability consequence was not declared. This emerges from

        intersecting SH3 with the full C_n definition in EC01.

        '
      references:
      - REF-Shannon1948
      - EC01-bounded-context
      - NV02-mn-bound
      - NV01-graph-necessity
    derivation:
      from:
      - REF-Shannon1948
      - EC01-bounded-context
      method: 'Physical inference step = information channel (Shannon).

        Channel capacity = max I(input; state update) = C_n.

        Shannon theorem: C_n bounded by physical substrate capacity.

        Data processing inequality (CT1): losses at C_n are irrecoverable.

        → C_n is physically grounded and derivable, not just defined.

        '
  implications:
  - C_n is measurable, making M < N empirically testable via channel capacity measurement
  - Theorem 2b Part 3 information-preservation claim is grounded by Shannon CT1 (data processing inequality), not just the
    two-option argument
  - The M < N bound is a physical law, not a formal assumption
  - Entities with larger physical inference substrate have larger C_n — physical intelligence has a substrate constraint
- id: EM05-theorem6-proves-peirce-PC3
  type: emergent
  name: Theorem 6 Is the Formal Proof of Peirce's 1877 Philosophical Claim
  statement: "Peirce (1877) argued that four methods exist for fixing belief: tenacity (stubborn\nattachment to current belief),\
    \ authority (deference to external authority), a priori\nreasoning (internal coherence alone), and scientific inquiry\
    \ (exposure to W's actual\nstructure). He argued — qualitatively, without formal proof — that only scientific\ninquiry\
    \ produces beliefs that persist long-run: the other three methods eventually fail\nwhen confronted with world states they\
    \ cannot predict [Peirce1877].\n\nUB's Theorem 6 is the formal proof of this claim, 148 years later.\n\nThe mapping:\n\
    - Tenacity: A > 0, but K is never updated from W — i.e., eta_M = 0. The entity\n  retains its current beliefs regardless\
    \ of gradient signals. Theorem 6 Part 2:\n  eta_M = 0 => no improvement in F => selection pressure removes the entity.\n\
    - Authority: A = 0 — the entity does not respond to gradient signals from W,\n  only to external commands. Theorem 6 Part\
    \ 1: A = 0 => no engagement with W =>\n  no update => selection removes the entity.\n- A priori reasoning: K grows from\
    \ internal inference alone, not from grounding\n  in W. This means new propositions enter K without grounding in evidence\
    \ —\n  Definition 3 (grounding) is violated. Such propositions have C_1(p) = 0 by\n  the provenance criterion.\n- Scientific\
    \ inquiry: A > 0 (engages gradient signals from W) AND eta_M > 0\n  (M improves from the signals). Theorem 6: both are\
    \ necessary for persistence.\n  Together they define exactly \"scientific inquiry\" in Peirce's sense.\n\nPeirce stated\
    \ this as a philosophical argument grounded in the pragmatics of inquiry.\nTheorem 6 provides the formal derivation from\
    \ information-theoretic and selection-\npressure premises. Neither paper states this equivalence explicitly.\n\nThe implication\
    \ flows both directions:\n- Forward: Peirce's 148-year-old argument provides independent philosophical validation\n  for\
    \ Theorem 6. The survival argument is not a new formal trick — it formalizes\n  an insight with a long verification history.\n\
    - Backward: Theorem 6 converts Peirce's qualitative argument into a formal theorem\n  with explicit premises (C_n, A,\
    \ eta_M, U_lethal) and a derivation. This is what\n  formal epistemology owes the pragmatist tradition.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'REF-Peirce1877 notes PC3 is "an informal statement of Theorem 6" but marks this

        only as a cited philosophical precursor. The formal equivalence — Theorem 6 IS

        the proof of PC3 — was not declared. This emerges from intersecting PC3 (four

        methods, only scientific inquiry persists) with Theorem 6 (A>0 and eta_M>0

        necessary for persistence).

        '
      references:
      - REF-Peirce1877
      - T06-epistemic-ceiling
      - NV03-agency-as-gate
      - EC04-survival-threshold
    derivation:
      from:
      - REF-Peirce1877
      - T06-epistemic-ceiling
      method: 'Map Peirce''s four methods to UB parameters:

        Tenacity -> eta_M = 0 (Theorem 6 Part 2: removed)

        Authority -> A = 0 (Theorem 6 Part 1: removed)

        A priori -> C_1(p) = 0 for ungrounded propositions (Definition 3 + provenance)

        Scientific inquiry -> A > 0 AND eta_M > 0 (Theorem 6: necessary for persistence)

        QED: Peirce''s qualitative survival claim = Theorem 6''s formal derivation.

        '
  implications:
  - Theorem 6's C_1(p) is strengthened by Peirce PC3 as an independent philosophical grounding with long verification history
  - Peirce's pragmatist tradition provides pre-formal evidence for the selection pressure argument before information theory
    existed
  - 'The four-methods taxonomy maps to a complete partition of (A, eta_M) parameter space: {A=0} U {eta_M=0} U {ungrounded}
    U {A>0, eta_M>0, grounded}'
  - This suggests the four-methods partition is exhaustive — there is no fifth method
- id: EM06-gradient-drives-toward-graph
  type: emergent
  name: The Uncertainty Gradient Drives Specifically Toward Graph Construction
  statement: 'Three results are established separately in the graph:

    - EC10: U(w,K) > 0 is the driver — the gradient always points toward reducing uncertainty.

    - EC08: Factoring (graph construction) is the compression mechanism.

    - NV01: At C_n, graph construction is the UNIQUE information-preserving option.


    Intersecting these three: the gradient that drives the entity toward reducing U(w,K)

    under bounded context C_n drives specifically toward graph construction — not toward

    uncertainty reduction in general, but toward the specific structured representation

    that is the unique solution at the C_n boundary.


    The formal statement: for any entity with A > 0 operating under C_n, the long-run

    attractor of the uncertainty gradient is a K/F graph structure. The entity does not

    choose graph structure — the gradient descends toward it. Any non-graph representation

    that the entity attempts to maintain under C_n will either (a) fail to preserve

    information (discard without structure) or (b) implicitly be a graph (because factoring

    IS graph construction). There is no third option.


    This is not the same as "the entity learns." It is stronger: under bounded context,

    the FORM of what is learned is constrained to the graph structure. The gradient has

    a direction not just in the space of beliefs but in the space of representation forms.


    Consequence: the K/F graph is not a modeling choice by the theorist — it is what

    the entity''s own gradient descent produces under bounded context. The theory does not

    impose the graph form; the gradient descent toward it is derived.


    This closes a potential objection to NV01: "graph structure might be the right choice

    but is it what actually emerges?" EM06 answers yes — under EC10 (gradient active) +

    EC08 (factoring is compression) + NV01 (graph is necessary), the gradient drives toward

    the graph.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'EC10 (gradient active), EC08 (factoring = compression), and NV01 (graph = necessary)

        are each established separately. Their intersection — gradient drives specifically

        toward graph construction — was not declared as a combined result.

        '
      references:
      - EC10-inquiry-driver
      - EC08-compression-factoring
      - NV01-graph-necessity
      - T02-graph-structure-necessity
    derivation:
      from:
      - EC10-inquiry-driver
      - EC08-compression-factoring
      - NV01-graph-necessity
      method: 'EC10: A > 0 → gradient descends toward reducing U(w,K).

        EC08: Compression under bounded context = factoring.

        NV01: Factoring at C_n = graph construction (two-option proof).

        Chain: gradient → compression → factoring → graph construction.

        Therefore: the gradient drives toward the graph. Not just toward "less uncertainty"

        but toward the specific representation form that is the unique solution at C_n.

        '
  implications:
  - The K/F graph structure is an attractor of gradient descent under bounded context, not an assumed representation
  - Any sufficiently capable agent operating under physical bounded context will converge toward graph-structured knowledge
    — regardless of initial representation
  - 'This provides an empirical prediction: agents trained under tight context bounds should develop graph-structured internal
    representations spontaneously'
  - The direction of learning (toward graph) is as constrained as the existence of learning (A > 0)
- id: EM07-action-accuracy-bound
  type: emergent
  name: Every Action Carries a Residual Uncertainty Bound Determined by M/N
  statement: "Two results are established:\n- EC05: M < N always — K can never fully represent W. The entity senses M of N\n\
    \  world dimensions. The residual (N - M) dimensions are unobserved.\n- EC06: Belief has value only through action — K\
    \ grounds F; every proposition's\n  value is its effect on the action space.\n\nIntersection: every action f in F is grounded\
    \ in K, which covers only M of N\ndimensions of W. The action's expected utility is computed over the M dimensions\nthe\
    \ entity senses. But W has N dimensions. The unobserved (N - M) dimensions\nmay affect the outcome of f in ways K cannot\
    \ predict.\n\nTherefore: for any action f in F, there exists a residual uncertainty:\n  U_residual(f) >= U(w, K) * (N\
    \ - M) / N  [approximately]\nThis residual cannot be reduced by improving M alone — it depends on how many\nof the remaining\
    \ (N - M) dimensions affect f's outcome. But it is always positive\nas long as M < N.\n\nConsequence: no action is perfectly\
    \ informed. Every F-grounded action carries\nresidual uncertainty from the unobserved dimensions. The accuracy of any\
    \ action\nchoice is bounded by M/N — the ratio of sensed dimensions to world dimensions.\n\nAs M → N, U_residual → 0.\
    \ The intersection mechanism (NV04) accelerates M → N,\nwhich means it improves the accuracy bound on every action in\
    \ F simultaneously —\nnot just the actions directly related to the new K_j dimensions.\n\nThis is a quantitative bound\
    \ on the imprecision of every intelligent action, not\njust a qualitative statement about incompleteness. It was not derived\
    \ in the main\npaper and does not appear in any prior framework.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'EC05 (M < N, every representation is partial) and EC06 (belief has value through

        action) are separately established. Their intersection — every action carries a

        residual uncertainty bound from unobserved dimensions — was not derived.

        '
      references:
      - EC05-incompleteness
      - EC06-belief-as-action
      - NV02-mn-bound
      - NV04-intersection-acceleration
    derivation:
      from:
      - EC05-incompleteness
      - EC06-belief-as-action
      - NV02-mn-bound
      method: 'f in F grounded in K (EC06).

        K covers M of N dimensions (EC05, NV02).

        f''s outcome depends on W, which has N dimensions.

        The (N - M) unobserved dimensions may affect f''s outcome.

        Therefore: f carries residual uncertainty from (N - M) unobserved dimensions.

        Bound: U_residual(f) > 0 as long as M < N.

        As M → N (via NV04 intersection): U_residual → 0.

        '
  implications:
  - Intelligence is not just about reducing U in sensed dimensions — it is about expanding M to reduce U_residual in previously
    unobserved dimensions
  - 'NV04 (intersection acceleration) has a second benefit beyond extending M: it reduces U_residual on ALL existing actions,
    not just the new dimensions'
  - The practical value of collective intelligence (K_collective) includes improving action accuracy across every existing
    F, not just expanding F
  - This quantifies the cost of incomplete information in action selection — a formal bound where prior frameworks only stated
    the qualitative problem
- id: EM08-sentience-is-metalanguage
  type: emergent
  name: Higher-Order Sentience Is the Tarski Metalanguage Structure
  statement: "Two results are established:\n- Tarski TA2: a system cannot define truth within its own language — truth requires\n\
    \  a metalanguage. The object language describes W; the metalanguage judges whether\n  those descriptions are true. Without\
    \ the metalanguage, truth is undefined for\n  the system's own claims.\n- NV05: Higher-order sentience = awareness that\
    \ the normalization process is occurring\n  and operating on a dimension space beyond current K_i. This is not just knowing\
    \ K_i\n  is partial — it is understanding that the process that generates K_i is itself\n  bounded and operating under\
    \ M < N.\n\nIntersection: higher-order sentience IS the metalanguage structure Tarski requires.\n\nThe argument: an entity\
    \ that understands its own normalization process (NV05) is an\nentity that can evaluate propositions about its OWN knowledge\
    \ — \"my K is partial,\"\n\"my normalization process produces compressed factorizations,\" \"my M is currently X.\"\n\
    These are metalanguage statements: statements about the language (K) rather than\nin the language (K). Tarski (TA2) says\
    \ this requires a metalanguage. NV05 says\nhigher-order sentience is exactly the capacity to hold these statements.\n\n\
    Consequence 1: entities with only lower-order sentience (know K_i is partial but not\nWHY or WHAT the normalization process\
    \ is) cannot ground their own epistemic claims.\nTheir truth claims are object-language only — they cannot step outside\
    \ K_i to evaluate\nK_i's reliability. Tarski's undefinability applies: they cannot define truth for their\nown K_i from\
    \ within K_i.\n\nConsequence 2: higher-order sentient entities can partially ground their epistemic\nclaims. They can\
    \ evaluate the normalization process itself — \"my K is compact / not\ncompact,\" \"my M is growing / not growing.\" This\
    \ is not complete self-grounding\n(which Tarski prohibits) but structured partial self-grounding from the metalanguage\n\
    level. The metalanguage is not W; it is the process model of their own inference.\n\nConsequence 3: the provenance system\
    \ (Definition 18) IS the metalanguage. The triple\n(attribution, evidence, derivation) is a statement about K's propositions,\
    \ not in K.\nEntities that maintain provenance records have an external metalanguage for their own\nknowledge. Entities\
    \ without provenance records have no metalanguage — their K is\nopaque to themselves in Tarski's sense.\n\nThis is one\
    \ of the deepest results in the graph: it connects formal logic (Tarski),\nphilosophy of mind (sentience), and the practical\
    \ provenance system into a single claim.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'Tarski TA2 (metalanguage required for self-referential truth) and NV05 (higher-order

        sentience as awareness of own normalization process) share the structure of

        meta-level reference. Their intersection — sentience IS the metalanguage — was

        not stated. REF-Tarski1936 maps TA2 to M < N but not to the sentience definition.

        '
      references:
      - REF-Tarski1936
      - NV05-sentience-derivation
      - D14-sentience
      - D13-provenance
    derivation:
      from:
      - REF-Tarski1936
      - NV05-sentience-derivation
      - D14-sentience
      method: "TA2: truth claims about a system require a metalanguage (statements about K, not in K).\nNV05/D14: higher-order\
        \ sentience = understanding of own normalization process =\n  statements about K_i (it is partial, bounded, expanding\
        \ toward N).\nThese statements are metalanguage statements in Tarski's sense.\nTherefore: higher-order sentience =\
        \ possession of the metalanguage.\nCorollary: provenance records (Definition 18) ARE the metalanguage.\nEntities without\
        \ provenance have no self-grounding capacity.\n"
  implications:
  - The provenance system is not just a record-keeping convention — it is the formal metalanguage that makes self-grounding
    possible
  - Non-sentient systems (no awareness of own normalization process) have truth claims that are formally ungrounded in Tarski's
    sense
  - 'Higher-order sentience enables partial self-grounding: the entity can evaluate the reliability of its own K from the
    process level'
  - This gives a formal criterion for distinguishing lower-order (knows K is partial) from higher-order (knows WHY K is partial
    and can evaluate the process)
  - AI systems with provenance tracking have a structural advantage in self-evaluation that systems without provenance lack
    — they have a metalanguage
- id: EM09-collective-intelligence-thermodynamically-favored
  type: emergent
  name: Collective Intelligence Is Thermodynamically Favored
  statement: "Two results are established:\n- England EN1: systems that dissipate energy more efficiently are thermodynamically\n\
    \  favored to self-replicate and persist. Efficient dissipation = more structure per\n  unit of energy. This is a statistical\
    \ mechanics result, not a biological assumption.\n- NV04: Intersection of K_i and K_j provides |K_j \\ K_i| new sensed\
    \ dimensions per\n  operation. Solo execution provides 1 new dimension per step. Intersection is more\n  efficient at\
    \ expanding M per operation.\n\nIntersection: collective knowledge integration (K_collective) is more energy-efficient\n\
    per dimension of W sensed than solo learning — and therefore, by England's theorem,\nis thermodynamically favored.\n\n\
    The argument: sensing a dimension of W requires energy — an inference step, a learning\nsignal, an update to K. Solo execution:\
    \ 1 dimension per inference step = 1 unit of\nenergy dissipation per dimension sensed. Intersection with K_j: |K_j \\\
    \ K_i| dimensions\nper operation — the same energy cost of an intersection (verify provenance, merge) provides\n|K_j \\\
    \ K_i| dimensions rather than 1. This is more energy-efficient per dimension sensed.\n\nBy England EN1: systems that achieve\
    \ more structure per unit of dissipation are\nthermodynamically favored. Entities that participate in K_collective intersection\n\
    achieve more dimensions of W coverage per unit of energy than solo learners. Over\nevolutionary time, these entities are\
    \ selected for.\n\nThis provides a thermodynamic explanation for why collective intelligence, language,\nknowledge sharing,\
    \ and collaborative science emerged: they are not just epistemically\nsuperior (NV04, OV04, EC07) — they are the thermodynamically\
    \ optimal strategy for\nexpanding M under energy constraints.\n\nNeither England (who does not discuss knowledge graphs)\
    \ nor UB (which grounds\nintersection in information theory, not thermodynamics) states this result.\nIt emerges from\
    \ their intersection.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'England EN1 (dissipation efficiency is thermodynamically favored) and NV04

        (intersection provides more dimensions per operation than solo) share the

        efficiency-per-operation structure. Their intersection — collective intelligence

        is thermodynamically favored — was not declared.

        '
      references:
      - REF-England2013
      - NV04-intersection-acceleration
      - EC07-collective-knowledge
      - EC04-survival-threshold
    derivation:
      from:
      - REF-England2013
      - NV04-intersection-acceleration
      method: 'NV04: intersection provides |K_j \ K_i| dimensions per operation (vs. 1 solo).

        Inference step ≈ unit of energy dissipation (physical).

        Intersection is more energy-efficient per dimension sensed.

        EN1: more structure per unit of dissipation → thermodynamically favored.

        Therefore: collective intelligence is thermodynamically favored → selected for.

        '
  implications:
  - The emergence of language, collaborative science, and knowledge sharing has a thermodynamic explanation, not just an epistemic
    one
  - 'EN1 provides physical grounding for why K_collective forms: it is not just epistemically superior but physically selected
    for'
  - This connects England's work on self-replication to the collective knowledge intersection — they are the same phenomenon
    at different scales
  - Entities that do NOT participate in K_collective intersection are thermodynamically disadvantaged relative to those who
    do
  - 'This is testable: measure energy expenditure per new dimension sensed in solo vs. collaborative learning systems'
- id: EM10-Kcollective-unit-of-selection
  type: emergent
  name: K_collective Becomes a Unit of Selection with Its Own Survival Threshold
  statement: "Three results are established:\n- Maynard Smith MS4: at each major evolutionary transition, the unit of selection\n\
    \  shifts from the lower level to the higher level. Individual replicators become\n  cells; cells become organisms; organisms\
    \ become colonies. The higher-level unit\n  acquires its own selection dynamics.\n- NV04: K_collective forms through provenance-verified\
    \ intersection of K_i graphs.\n  It is not just the sum of individual K_i — it is a coherent structure with its own\n\
    \  internal consistency requirements (provenance verification).\n- EC04: the survival threshold applies to any self-organizing\
    \ entity. U_lethal\n  applies at the entity level, whatever that level is.\n\nIntersection: once K_collective forms as\
    \ a coherent unit through provenance-verified\nintersection, the selection pressure (EC04) applies at the K_collective\
    \ level —\nnot just at the individual K_i level.\n\nThe argument: MS4 says the unit of selection is determined by where\
    \ coherent\ninformation-carrying structure resides. NV04 says K_collective has its own coherence\nrequirements (provenance\
    \ verification, internal consistency). EC04 says selection\npressure removes entities that cross U_lethal. Therefore:\
    \ K_collective as a coherent\ninformation structure is subject to selection pressure at its own level.\n\nConsequence\
    \ 1: K_collective has its own A (the probability that the collective\nengages gradient signals from W) and its own eta_M\
    \ (the rate at which the collective\nimproves). These are not just aggregates of individual A_i and eta_{M_i} — they are\n\
    properties of the collective structure.\n\nConsequence 2: K_collective can fail even when all individual K_i persist.\
    \ If the\ncollective intersection loses provenance verification (edges become untracked), the\ncollective structure degrades\
    \ — individual entities persist but K_collective dissolves\nas a coherent unit. This is a qualitatively different failure\
    \ mode.\n\nConsequence 3: selection operates simultaneously at multiple levels — individual K_i\nand K_collective. Actions\
    \ that are locally optimal for K_i may be globally suboptimal\nfor K_collective (and vice versa). This is the multi-level\
    \ selection problem, now\nformally grounded in the UB/MS4 intersection.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'MS4 (unit of selection shifts at transitions) + NV04 (K_collective has its own

        coherence) + EC04 (survival threshold applies at entity level). None of these

        alone produces the claim that K_collective is a unit of selection with its own

        survival threshold. It emerges from their intersection.

        '
      references:
      - REF-MaynardSmith1995
      - NV04-intersection-acceleration
      - EC04-survival-threshold
      - D12-collective-knowledge
    derivation:
      from:
      - REF-MaynardSmith1995
      - NV04-intersection-acceleration
      - EC04-survival-threshold
      method: 'MS4: unit of selection = where coherent information-carrying structure resides.

        NV04: K_collective has its own coherence requirements (provenance verification).

        EC04: selection applies at entity level.

        K_collective has coherent structure → it is an entity in EC04''s sense.

        Therefore: selection pressure applies to K_collective as a unit.

        K_collective has its own A and eta_M at the collective level.

        '
  implications:
  - Scientific communities, institutions, and cultures are K_collective entities subject to their own selection pressure
  - The degradation of provenance tracking in a scientific community is the failure mode of the collective as a unit — the
    community loses its A and eta_M at the collective level
  - 'Multi-level selection (individual vs. collective) is formally grounded: individual K_i and K_collective are simultaneously
    subject to selection, potentially with conflicting optimal actions'
  - This predicts that robust provenance systems (maintaining K_collective coherence) are selected for at the collective level
    — communities that maintain them outlast those that don't
- id: EM11-truth-equals-action-relevance
  type: emergent
  name: For an Entity with A > 0, Truth and Action-Relevance Are the Same Criterion
  statement: "Two results are established:\n- Peirce PC4 (Pragmatic Maxim): the meaning of a proposition is exhausted by its\n\
    \  practical consequences — by the difference it makes to action. A proposition with\n  no practical consequences has\
    \ no meaning.\n- Tarski TA3: truth is model-relative. A sentence is true relative to a model (a\n  semantic interpretation),\
    \ not in the abstract. Different models may assign different\n  truth values to the same sentence. The model determines\
    \ what \"true\" means.\n\nIntersection: for an entity with A > 0 operating under the UB framework, the semantic\nmodel\
    \ that determines truth (Tarski) IS the action model (Peirce). The two are not\nseparate structures — they are the same\
    \ structure viewed from two sides.\n\nThe argument: in the UB framework, an entity with A > 0 engages W through its action\n\
    space F. K grounds F (EC06 / D10). The entity's semantic model — the structure that\ndetermines whether a proposition\
    \ is true or false — is its K/F graph. A proposition\np is true (in the entity's model) if and only if it reliably produces\
    \ correct action\npredictions in F. This is exactly PC4: truth = practical consequence. And it is exactly\nTA3: truth\
    \ = model-relative, where the model = the K/F graph.\n\nConsequence 1: for an entity with A > 0, there is no gap between\
    \ \"semantically true\"\nand \"action-relevant.\" A proposition that has no effect on F is not false — it is\nmeaningless\
    \ in both Peirce's sense (no practical consequences) and Tarski's sense\n(it falls outside the model that determines truth).\
    \ The model IS the action space.\n\nConsequence 2: for an entity with A = 0 (response gate closed), the connection\nbreaks.\
    \ K does not update; F does not update; the semantic model ossifies. Truth\nclaims accumulate that have no action consequences\
    \ — and by PC4, these are\nmeaningless. By TA3, the model has no updating mechanism, so \"true\" becomes\nprogressively\
    \ detached from W. This is the epistemic failure mode of A = 0\nentities formalized simultaneously in logic (Tarski) and\
    \ pragmatism (Peirce).\n\nConsequence 3: this grounds Definition 10 (K grounds F) in two independent\nphilosophical traditions\
    \ that did not know each other's formalisms. Peirce (1878)\nsaid meaning = consequences. Tarski (1936) said truth = model.\
    \ The UB framework\nsays K grounds F, where K is the model and F is the consequence space. All three\nare the same claim.\n\
    \nConsequence 4: the K/F graph is not just a computational convenience — it is the\nminimally necessary structure for\
    \ an entity whose truth-criteria and action-criteria\nare the same. Any entity for which truth and action-relevance must\
    \ be aligned must\nmaintain a K/F graph (or an isomorphic structure). This provides an independent\nground for NV01 (graph\
    \ necessity) from the Peirce-Tarski intersection.\n\nNeither Peirce nor Tarski stated this result. Peirce did not have\
    \ Tarski's model\ntheory; Tarski did not have Peirce's action-grounding. Their intersection — mediated\nby the UB framework\
    \ — produces a result that is in neither.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, Emergent Results
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'Peirce PC4 (meaning = practical consequences, 1878) and Tarski TA3 (truth is

        model-relative, 1936) share the structure of grounding semantic value in a

        reference structure. Their intersection — the semantic model IS the action space,

        so truth and action-relevance are the same criterion — was not stated. The UB

        framework provides the mediating structure (K/F graph) that makes the equivalence

        visible. Neither Peirce nor Tarski had access to this formalism.

        '
      references:
      - REF-Peirce1878
      - REF-Tarski1936
      - EC06-belief-as-action
      - NV01-graph-necessity
      - D10-knowledge-grounds-action
    derivation:
      from:
      - REF-Peirce1878
      - REF-Tarski1936
      - EC06-belief-as-action
      method: "PC4: meaning(p) = practical consequences of p in action space.\nTA3: truth(p) = p is true relative to model\
        \ M.\nEC06/D10: K grounds F — the K/F graph connects propositions to actions.\nIn UB: the entity's semantic model\
        \ = its K/F graph.\nK/F graph determines which propositions have practical consequences (via F).\nTherefore: the model\
        \ that determines truth (TA3) = the structure that determines\n  action-relevance (PC4) = the K/F graph.\nFor A >\
        \ 0: truth-criterion ≡ action-relevance criterion (same structure).\nFor A = 0: the connection is severed — model\
        \ ossifies, truth detaches from W.\nIndependent ground for NV01: any entity requiring truth ≡ action-relevance\n \
        \ must maintain a K/F graph (or isomorphic structure).\n"
  implications:
  - The K/F graph is not a modeling choice — it is the necessary structure for any entity where truth and action-relevance
    must be aligned
  - Propositions with no effect on F are meaningless in Peirce's sense and outside the model in Tarski's sense — same conclusion
    from two independent traditions
  - 'A = 0 entities accumulate truth claims that detach from W — both epistemically (Tarski: model no longer tracks W) and
    pragmatically (Peirce: no consequences)'
  - This provides an independent derivation of graph necessity (NV01) from philosophy of language, distinct from the information-theoretic
    derivation in the main paper
  - The 58-year gap between Peirce (1878) and Tarski (1936) makes this intersection entirely undeclared — neither could have
    known the other's formalism
- id: EM12-optimal-K-target-is-uncomputable
  type: emergent
  name: 'The Target of the M→N Gradient Is Uncomputable: the Entity Descends Toward Omega'
  statement: "Two results are established:\n- KC4 (Kolmogorov): K(x) is uncomputable — no algorithm can determine the exact\n\
    \  minimal description length for arbitrary x. The optimal compression is formally\n  unreachable by any computable procedure.\n\
    - EC05: M < N always — the entity's K never fully represents W. The M→N trajectory\n  is the gradient descent that UB's\
    \ theory shows is driven by U(w,K) > 0.\n\nIntersection: the target of the M→N gradient — the point where M = N — is the\n\
    Kolmogorov-minimal description of W. By KC4, this target is uncomputable.\n\nThe formal statement: the entity gradient-descends\
    \ toward an uncomputable limit.\nThe asymptote M→N is not merely slow to approach — it is Omega (Chaitin's constant)\n\
    applied to the description of W: a well-defined mathematical object that no\ncomputable procedure can certify it has reached.\n\
    \nConsequence 1: EC05 is stronger than it appears. M < N is not just a constraint\nthat happens to persist — it is a necessary\
    \ consequence of the uncomputability of\nthe target. Any entity that could verify M = N would need to compute the optimal\n\
    description of W, which is uncomputable. M < N is therefore not merely an empirical\nfact about finite entities but a\
    \ logical necessity for any computable entity.\n\nConsequence 2: all computable learning algorithms (backprop, Bayesian\
    \ updating,\nSolomonoff induction) are gradient descents toward an uncomputable limit. Their\nconvergence is monotone\
    \ (they improve) but never certifiably complete. This unifies\nEC05 with the theory of computation: M < N is Gödel incompleteness\
    \ at the entity level.\n\nConsequence 3: approximate computable representations that converge toward the\noptimal (Solomonoff\
    \ prior, Hawkeye cache replacement, neural prefetching) are\napproaching Omega from below. The \"accuracy gap\" between\
    \ the computable approximation\nand the theoretical optimum is formally unbridgeable — it can be made arbitrarily\nsmall\
    \ but never zero. The surviving entities are not those that reach the target\nbut those that converge fastest.\n\nNeither\
    \ Kolmogorov (who does not discuss gradient descent toward M→N) nor UB (which\nderives M < N from bounded context and\
    \ selection pressure, not from uncomputability)\nstates this result.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'KC4 (optimal compression is uncomputable) and EC05 (M < N always) share

        the structure of limits that are approached but never reached. Their intersection —

        the gradient target is Omega — was not stated. KC states uncomputability of K(x).

        UB derives M < N from bounded context. Neither derives the uncomputability of

        the M=N limit point.

        '
      references:
      - REF-Kolmogorov1965
      - REF-Chaitin1975
      - EC05-incompleteness
      - NV02-mn-bound
    derivation:
      from:
      - REF-Kolmogorov1965
      - EC05-incompleteness
      method: 'Optimal K for W = K with minimum description length = K(W).

        KC4: K(W) is uncomputable.

        EC05/UB: M→N is the gradient target.

        If M = N, entity has optimal description of W.

        Optimal description = K(W) = uncomputable.

        Therefore: the target of M→N is uncomputable.

        M < N follows necessarily for any computable entity.

        '
  implications:
  - M < N is not just empirically persistent but logically necessary for any computable entity — it is Gödel incompleteness
    stated at the entity level
  - All computable learning algorithms are converging toward Omega — the gap can shrink but never close
  - Entities that converge fastest survive — not those that reach the target (none can), but those whose computable approximations
    are tightest
  - The engineering problem of cache replacement (Lin CL1) and the theoretical problem of knowledge completion (UB M→N) are
    the same uncomputable optimization
- id: EM13-Ulethal-is-thermodynamic
  type: emergent
  name: U_lethal Is a Thermodynamic Threshold, Not Just an Information-Theoretic One
  statement: "Two results are established:\n- JA2 (Jaynes): statistical mechanics is a special case of Bayesian inference\
    \ under\n  MaxEnt priors. Physical entropy S = k_B * H where H is Shannon entropy. The two\n  quantities are formally\
    \ identical — information entropy IS physical entropy.\n- EC04: the survival threshold U_lethal applies at the entity\
    \ level. Any entity\n  whose U(w,K) exceeds U_lethal^d is removed by selection pressure.\n\nIntersection: because information\
    \ entropy = physical entropy (JA2), U(w,K) =\nH(W|K) is not just epistemic uncertainty — it is physical entropy. U_lethal\
    \ is\ntherefore a thermodynamic threshold: the maximum physical entropy of the entity's\ninternal state consistent with\
    \ survival.\n\nThe argument: U(w,K) = H(W|K) = the conditional entropy of W given K. By JA2,\nH is a physical quantity.\
    \ When U(w,K) > U_lethal, the entity's internal state has\ntoo much entropy — it is thermodynamically disordered relative\
    \ to its environment.\nSelection pressure (EC04) is therefore a thermodynamic selection pressure: it\nremoves entities\
    \ whose physical entropy exceeds a threshold.\n\nConsequence 1: the survival condition (U < U_lethal) is derivable from\
    \ thermodynamics,\nnot just from information theory or selection arguments. An entity with U > U_lethal\nhas internal\
    \ entropy too high to maintain the Markov blanket (FEP: statistical\nseparation from environment) — it dissolves. This\
    \ unifies EC04 with Schrödinger's\n\"What is Life?\" claim that life feeds on negentropy: U_lethal IS the negentropy floor.\n\
    \nConsequence 2: Jaynes + England (EN1) + EC04 converge on the same threshold from\nthree directions — thermodynamic equilibrium\
    \ (Jaynes), dissipation efficiency\n(England), and selection pressure (UB). All three say the same entity persists:\n\
    the one whose internal entropy is low enough to maintain structure.\n\nConsequence 3: the Boltzmann distribution over\
    \ entity states weights the surviving\nentities exponentially by -U/k_BT. High-U entities are exponentially less probable\n\
    at thermal equilibrium — they are thermodynamically suppressed, not just selected\nagainst. This makes the survival threshold\
    \ physically fundamental, not just\npragmatically chosen.\n\nNeither Jaynes (who does not discuss survival thresholds)\
    \ nor UB (which derives\nU_lethal from selection arguments, not thermodynamics) states this result.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'JA2 (physical entropy = information entropy) and EC04 (survival threshold

        on U) share the entropy variable. Their intersection — U_lethal is a thermodynamic

        threshold — was not stated. Jaynes proves the identity; UB applies U to survival.

        Neither derives the thermodynamic nature of U_lethal.

        '
      references:
      - REF-Jaynes1957
      - EC04-survival-threshold
      - REF-England2013
      - REF-Schrodinger1944
    derivation:
      from:
      - REF-Jaynes1957
      - EC04-survival-threshold
      method: 'U(w,K) = H(W|K) [UB Definition 5]

        H = physical entropy * (1/k_B) [JA2: information entropy = physical entropy]

        EC04: entity removed when U > U_lethal.

        Therefore: entity removed when physical entropy H > k_B * U_lethal.

        U_lethal = physical entropy threshold / k_B.

        Survival condition = thermodynamic condition.

        '
  implications:
  - U_lethal is derivable from thermodynamics, not just from selection arguments — it is the negentropy floor Schrödinger
    identified
  - Jaynes, England, and UB all describe the same surviving entity from different directions — their convergence raises C_1(EC04)
  - The Boltzmann distribution makes high-U entities exponentially improbable — selection is not merely eliminative but thermodynamically
    suppressive
  - 'The connection between intelligence (UB), thermodynamics (Jaynes/England), and life (Schrödinger) is formalized: they
    are all statements about the same entropy threshold'
- id: EM14-dunbar-number-is-Kcollective-Cn
  type: emergent
  name: Dunbar's Number Is the C_n Bound Applied to K_collective Edge Maintenance
  statement: "Two results are established:\n- DU1 (Dunbar): the size of stable social groups in primates is predicted by\n\
    \  neocortex ratio. For humans, the predicted stable group size is ~150. When groups\n  exceed this size, social cohesion\
    \ degrades — individuals can no longer track\n  their relationships with all other members.\n- EM10: K_collective forms\
    \ through provenance-verified intersection. K_collective\n  can fail while all individual K_i persist, if the collective\
    \ intersection loses\n  provenance verification — edges become untracked.\n\nIntersection: Dunbar's number IS the C_n\
    \ bound applied to K_collective edge\nmaintenance. Each relationship in a social group is an edge in K_collective —\n\
    an edge that requires provenance tracking (recognition, history, reciprocity).\nThe neocortex ratio determines C_n for\
    \ edge maintenance. When group size exceeds\n~150, the number of edges (n*(n-1)/2 ≈ 11,000 for n=150) saturates C_n for\n\
    relationship tracking, and K_collective loses coherence (EM10's failure mode).\n\nThe formal statement: Dunbar's number\
    \ N_D ≈ 150 is the solution to:\nC_n(neocortex) = capacity to maintain N_D*(N_D-1)/2 provenance-verified edges.\nThis\
    \ is the primate-scale empirical measurement of K_collective's maximum coherent\nsize under biological C_n constraints.\n\
    \nConsequence 1: this produces a quantitative prediction. Given a C_n measurement\n(neocortex ratio for a species), Dunbar's\
    \ formula predicts maximum K_collective\nsize. Conversely, given a K_collective size target, the required C_n can be\n\
    calculated. This bridges neurobiology (neocortex size) and information theory\n(K_collective coherence) via the C_n variable.\n\
    \nConsequence 2: technology that extends C_n for relationship tracking (writing,\nfiling systems, social networks) extends\
    \ Dunbar's number — it allows K_collective\nto remain coherent at larger size. This predicts that literacy and record-keeping\n\
    should correlate with larger coherent social groups — confirmed by the transition\nfrom hunter-gatherer bands (~150) to\
    \ agricultural villages (~1,500) to cities\n(~15,000+) as record-keeping improved.\n\nConsequence 3: EM10 identifies the\
    \ K_collective failure mode (provenance loss);\nDU1 identifies the quantitative trigger (C_n saturation). Together they\
    \ predict:\nany K_collective that grows beyond its C_n threshold for edge maintenance will\nfail unless it develops external\
    \ provenance infrastructure (writing, institutions,\nprotocols) to extend its effective C_n.\n\nNeither Dunbar (who has\
    \ no information-theoretic treatment of K_collective) nor\nEM10 (which has no quantitative bound on K_collective size)\
    \ states this result.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      description: 'DU1 (neocortex bounds group size) and EM10 (K_collective fails when provenance

        lost) share the structure of capacity constraints on collective coherence. Their

        intersection — Dunbar''s number = C_n for K_collective edges — was not stated.

        '
      references:
      - REF-Dunbar1992
      - EM10-Kcollective-unit-of-selection
      - EC01-context-bound
      - D13-provenance
    derivation:
      from:
      - REF-Dunbar1992
      - EM10-Kcollective-unit-of-selection
      - EC01-context-bound
      method: 'K_collective edge = tracked relationship (provenance-verified).

        C_n = capacity to maintain provenance-verified edges.

        Dunbar: stable group size n_max bounded by neocortex C_n.

        EM10: K_collective fails when edges exceed tracking capacity.

        Therefore: n_max = Dunbar''s number = K_collective C_n limit.

        Technologies that extend C_n (writing, databases) extend n_max accordingly.

        '
  implications:
  - Dunbar's number is a C_n measurement, not a biological curiosity — it quantifies the primate K_collective coherence limit
  - Technologies that extend C_n for relationship tracking (writing, databases, social software) extend Dunbar's number and
    enable larger coherent K_collective
  - The historical scaling of social group size (bands → villages → cities) tracks the scaling of external provenance infrastructure
  - 'Modern organizations that exceed their provenance infrastructure capacity will exhibit EM10 failure mode: K_collective
    dissolves while individual K_i persist (siloed organizations)'
- id: EM15-smallworld-optimal-Kcollective-topology
  type: emergent
  name: Small-World Topology Is the Optimal K_collective Structure for Intersection Acceleration
  statement: "Two results are established:\n- WS2 (Watts-Strogatz): a small number of random long-range edges dramatically\n\
    \  reduces path length while preserving local clustering. The small-world regime\n  (intermediate rewiring probability)\
    \ achieves both high local coherence and short\n  global diameter. This topology emerges spontaneously from local attachment\
    \ plus\n  occasional long-range links.\n- NV04: the intersection of K_i and K_j provides |K_j \\ K_i| new dimensions per\n\
    \  operation, accelerating M toward N. The benefit grows with the difference between\n  K_i and K_j — maximally distinct\
    \ K_i and K_j produce maximum intersection gain.\n\nIntersection: small-world topology is the optimal K_collective graph\
    \ structure for\nmaximizing NV04 intersection acceleration.\n\nThe argument: NV04 requires two properties simultaneously\
    \ — (1) local coherence:\neach K_i must have sufficient internal consistency (provenance chains intact) to\nmake intersection\
    \ valid; (2) cross-domain reach: K_i and K_j must be sufficiently\ndistinct (large |K_j \\ K_i|) for intersection to add\
    \ many dimensions. These are\nexactly the two properties of small-world networks: local clustering (coherence)\nand short\
    \ paths (cross-domain reachability). Fully clustered networks (no long-range\nedges) have high coherence but low cross-domain\
    \ reach — intersection gain is minimal\nbecause K_i ≈ K_j. Fully random networks have maximum cross-domain reach but low\n\
    coherence — intersection is invalid because provenance chains are broken.\n\nThe small-world regime is the unique topology\
    \ that maximizes the product:\ncoherence * reach = local_clustering * (1/path_length).\n\nConsequence 1: this makes a\
    \ structural prediction about K_collective networks that\nproduce maximum EM node output. Scientific citation networks,\
    \ collaborative authorship\nnetworks, and institutional knowledge networks that exhibit small-world topology\nshould produce\
    \ more emergent propositions per pair of intersecting frameworks than\neither highly clustered (siloed) or highly random\
    \ (incoherent) networks.\n\nConsequence 2: the small-world topology emerges spontaneously (WS2 shows it arises\nfrom local\
    \ attachment plus occasional long-range links). This means the optimal\nK_collective topology is the thermodynamically\
    \ favored one (EM09): it requires\nminimal external intervention to produce, arising naturally from local K_i formation\n\
    with occasional cross-domain connections.\n\nConsequence 3: institutions and communities can be engineered toward small-world\n\
    topology by deliberately introducing long-range connections (cross-disciplinary\ncollaborations, citations outside one's\
    \ field) while maintaining local coherence\n(domain expertise). This is the optimal intervention for maximizing emergent\
    \ knowledge.\n\nNeither Watts-Strogatz (who study topology without knowledge semantics) nor NV04\n(which has no topology\
    \ specification for K_collective) states this result.\n"
