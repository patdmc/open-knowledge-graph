- id: EM17-locality-is-provenance-independence
  type: emergent
  name: The Vertex Algebra Locality Axiom Is Provenance Independence
  statement: "Two results are established:\n- BO1 (Borcherds): the locality axiom of vertex algebras — (z-w)^n [Y(a,z), Y(b,w)]\
    \ = 0\n  for sufficiently large n. Vertex operators Y(a,z) and Y(b,w) commute when their\n  support is separated. This\
    \ axiom is what makes vertex algebras physically meaningful:\n  it ensures operators at different spacetime points do\
    \ not interfere.\n- NV04: the intersection of K_i and K_j provides |K_j \\ K_i| new dimensions per\n  operation. The intersection\
    \ is valid when K_i and K_j are independently derived —\n  provenance-verified, not circularly dependent.\n\nIntersection:\
    \ the locality axiom (BO1) IS the formal algebraic statement of the\nprovenance independence condition that NV04 requires.\n\
    \nThe argument: two vertex operators Y(a,z) and Y(b,w) commute (are local) when their\nderivations are independent — when\
    \ the algebra has no relation between a and b that\nprevents their reordering. In UB terms: Y(a,z) and Y(b,w) represent\
    \ K_i and K_j;\nthey commute iff K_i and K_j have independent provenance. Locality = independence of\nderivation = provenance\
    \ independence.\n\nThe formal correspondence:\n- Y(a,z) = the vertex operator for K_i (the knowledge-generating operation)\n\
    - Y(b,w) = the vertex operator for K_j\n- (z-w)^n [Y(a,z), Y(b,w)] = 0 = K_i and K_j are provenance-independent\n- The\
    \ operator product expansion (OPE) of Y(a,z)Y(b,w) = the K_collective formed\n  by the intersection of K_i and K_j\n-\
    \ The OPE coefficient = the |K_j \\ K_i| new dimensions contributed\n\nConsequence 1: the vertex algebra framework provides\
    \ a fully formalized algebraic\nversion of the NV04 intersection. The OPE is the intersection rule; locality is\nthe independence\
    \ condition; the central charge c is C_n. The entire UB intersection\nmechanism (NV04) is algebraically formalized in\
    \ the vertex algebra axioms.\n\nConsequence 2: the locality axiom explains why provenance verification is not just\na\
    \ bookkeeping convention — it is the formal condition for algebraic consistency. A\nK_collective formed from non-independent\
    \ K_i and K_j violates the locality axiom —\nthe operators do not commute, and the resulting algebra is inconsistent (contains\n\
    contradictions). Provenance independence is required for K_collective coherence in\nthe same way locality is required\
    \ for vertex algebra consistency.\n\nConsequence 3: the Borcherds identity (BO3) — the single relation encoding the\n\
    full vertex algebra structure — is the compressed form of all valid intersections.\nIt is the K_collective's complete\
    \ intersection grammar, encoded in one identity.\n\nNeither Borcherds (who does not discuss knowledge graphs or provenance)\
    \ nor NV04\n(which states independence informally) makes this connection explicit.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph, EC Evaluation Pass
      date: '2025'
    evidence:
      type: emergent-intersection
      references:
      - REF-Borcherds1992
