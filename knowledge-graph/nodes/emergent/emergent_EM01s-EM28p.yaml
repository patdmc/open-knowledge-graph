- id: EM21-absential-causation-is-uncertainty-gradient
  type: emergent
  name: Absential Causation Is the Causal Ontology of the Uncertainty Gradient
  statement: "Two results are established:\n- DE1 (Deacon): absential causation — causal processes driven by what is absent.\n\
    \  The absent end-state (the goal, the need, the attractor that does not yet exist)\n  causally shapes present dynamics.\
    \ This is not supernatural teleology but a formal\n  causal category: the configuration space of possible futures constrains\
    \ present\n  trajectories. Life, mind, and intentionality are instances of absential causation.\n- EC10: U(w,K) > 0 is\
    \ the driver — the entity acts because there is a gap between\n  its current K and a complete representation of W. The\
    \ gradient U(w,K) causes the\n  entity to engage W (A > 0). The gradient points toward an absent target (M = N,\n  U =\
    \ 0) that has never been reached.\n\nIntersection: EC10's uncertainty gradient IS absential causation formally specified.\n\
    \nThe argument: the absent target that causes present behavior in EC10 is exactly\nU = 0 — the complete representation\
    \ of W that does not exist. The gradient points\ntoward this absence; the absence causes the entity to move. Deacon's\
    \ framework\nidentifies this causal structure as absential causation: the non-existent attractor\n(U = 0, M = N) constrains\
    \ the entity's trajectory. EC10 provides the formal\nmechanics (gradient descent on U); Deacon provides the causal ontology\n\
    (the absent attractor has causal force through the constraint it imposes on the\ntrajectory space).\n\nConsequence 1:\
    \ this resolves a potential objection to UB. Why does U(w,K) > 0\n\"cause\" the entity to act? The naive answer is circular\
    \ (because A > 0). The\nabsential causation answer is structural: the gradient U(w,K) imposes a constraint\non the entity's\
    \ configuration space — it makes some trajectories more probable\n(those that reduce U) and others less probable (those\
    \ that increase U). The cause\nis real without being present — the absent optimum shapes the landscape.\n\nConsequence\
    \ 2: Deacon's teleodynamics (DE2) is the level at which absential\ncausation becomes self-sustaining. A teleodynamic system\
    \ (life, mind) maintains\nthe gradient by maintaining itself — it works to preserve the conditions of its\nown continuation\
    \ (EC04 survival threshold). The entity is teleodynamic precisely\nbecause U_lethal creates a lower bound that the entity\
    \ must stay below, making\nits own persistence causally driven by the absent state of failure (U > U_lethal).\n\nConsequence\
    \ 3: Deacon's framework explains why A > 0 is not a stipulation but a\nconsequence. An entity with A = 0 is non-teleodynamic\
    \ — it has no absential cause\ndriving it. But by EC04, an entity with A = 0 eventually reaches U > U_lethal and\nis removed.\
    \ The surviving entities are the teleodynamic ones (A > 0). Deacon's\nframework provides the causal mechanism; UB provides\
    \ the selection pressure that\nfilters for entities that implement it.\n\nNeither Deacon (who has no formal treatment\
    \ of gradient descent on information\nentropy) nor EC10 (which states the gradient without the causal ontology) makes\n\
    this connection explicit.\n"
  provenance:
