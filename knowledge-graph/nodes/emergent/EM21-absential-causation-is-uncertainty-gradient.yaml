  evidence:
    type: emergent-intersection
    references: [REF-Deacon2012, EC10-uncertainty-driver, EC04-survival-threshold]
  derivation:
    from: [REF-Deacon2012, EC10-uncertainty-driver]
    method: |
      EC10: U(w,K) > 0 drives entity via gradient toward absent U=0.
      DE1: absential causation = absent attractor causes present dynamics via constraint.
      U=0 is the absent attractor; U(w,K) > 0 is the constraint it imposes.
      EC10 gradient = formally specified absential causation.

implications:
  - "EC10 has a causal ontology: the uncertainty gradient is absential causation — the absent U=0 is the real cause of the entity's present behavior"
  - "A > 0 is not a stipulation but a consequence: surviving entities are the teleodynamic ones, selected by EC04"
  - "UB + Deacon resolves the 'why does uncertainty cause action?' objection: the absent optimum constrains the trajectory space — it has real causal force"
  - "Deacon's three levels (thermodynamic, morphodynamic, teleodynamic) map to UB's three regimes: below U_lethal → thermodynamic dissolution; at U_lethal boundary → morphodynamic self-organization; well below U_lethal → teleodynamic self-maintenance"
