    description: |
      The tension between FEP6 and Theorem 3 Part II is not visible within either
      framework alone. FEP does not engage with the M < N bound; UB does not directly
      address FEP equilibrium. The intersection makes the qualification necessary.
    references: [NV02-mn-bound, REF-Friston2017, OV03-nontermination]
  derivation:
    from: [NV02-mn-bound, REF-Friston2017]
    method: |
      FEP6 (equilibrium approached) + NV02 (M < N structural bound) -> tension.
      Resolution: FEP6 requires stationarity; NV02 holds in non-stationary W.
      The intersection makes the stationarity assumption explicit in FEP6.

