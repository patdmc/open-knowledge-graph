  derivation:
    from: [REF-Kac1990, REF-BuhlKaraali2008, NV01-graph-necessity]
    method: |
      KM1: finite Dynkin diagram → infinite Kac-Moody algebra (infinite W from finite K).
      GB0: difference-N spanning set exists for any N-graded Möbius VA.
      Both prove: a finite graph structure is the minimal representation of infinite content.
      NV01 proves the same from information theory.
      Three independent proofs of the same structural claim: C_1(NV01) increases.

implications:
  - "NV01 now has four independent derivations: information theory (UB), philosophy of language (EM11), compiler theory (EM27), and algebra (EM16)"
  - "The Dynkin diagram classification may provide a taxonomy for K/F graph types — finite A/D/E, affine, hyperbolic correspond to different entity knowledge regimes"
  - "The difference-N ordering condition (GB0) is the algebraic form of provenance ordering — knowledge operators must compose in structured sequences"
