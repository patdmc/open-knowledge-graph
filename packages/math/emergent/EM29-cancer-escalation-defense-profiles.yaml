        NF1: {n_hotspots: 4, earliest_shift: -0.85, latest_shift: -1.72, position_r: -0.962}
        KRAS: {n_hotspots: 15, earliest_shift: +0.09, latest_shift: +0.19, position_r: -0.425}
        EGFR: {n_hotspots: 8, earliest_shift: +0.82, latest_shift: +0.19, position_r: -0.837}

