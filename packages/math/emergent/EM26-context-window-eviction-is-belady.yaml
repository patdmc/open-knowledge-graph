    method: |
      TR4: context window = C_n; token eviction = cache replacement problem.
      CL1: Belady's OPT = optimal cache replacement = uncomputable.
      Token eviction policy = Belady's OPT for LLMs.
      Lin's Hawkeye/PC-OPT = directly applicable algorithm.
      Neural prefetching (CL5) = RAG/in-context learning at different scale.

implications:
  - "Lin's cache replacement algorithms (Hawkeye, PC-OPT) are directly applicable to LLM context window management — an unexplored engineering transfer"
  - "Optimal LLM context management is uncomputable in principle (EM12) — all heuristics are approximations to Belady's OPT"
  - "RAG and neural prefetching are architecturally identical: learned approximations to Belady's OPT at different scales"
  - "Cache replacement theory is the correct theoretical framework for LLM context management — the connection between computer architecture and LLM inference is formal, not metaphorical"
