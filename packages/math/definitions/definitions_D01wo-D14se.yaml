          signal
      derivation:
        method: Theorem 10 Step 2 uses G(f,K) = I(f;w|K) as the measure of collective advantage
- id: D06-agency
  type: definition
  number: 6
  name: Agency
  statement: "Agency A in [0,1] is the probability that entity E engages its learning mechanism M in\nresponse to a gradient\
    \ signal from W: the response gate. It is not an external objective\nimposed on E, nor a property derived from F or K.\
    \ It is constitutive: A is what makes F\nan active informed action space rather than a static structure. The informal\
    \ gloss —\nthe desire to know [Schmidhuber2010], intrinsic drive to reduce uncertainty — is a\nphenomenological description\
    \ of this gate, not the definition.\n\nAt A = 0: E does not respond to gradient signals; (F(t), K(t)) = (F(0), K(0)) for\
    \ all t.\nAt A = 1: E engages on every gradient signal it encounters.\nIntermediate values: response probability is shaped\
    \ by architecture, encoding history,\nand the density of unresolved uncertainty in E's reachable W.\n\nA is operationalizable\
    \ as:\n\n  A(E) proportional to lim_{U_lethal^d -> infinity} dU/dt(E)\n\nAn entity with A > 0 continues descending when\
    \ not forced to; an entity with A = 0\nthat was updating only under survival compulsion stops. The limit correctly isolates\n\
    intrinsic engagement from survival-compelled updating.\n\nA precipitates from M by the same normalization argument that\
    \ precipitates K from F.\nA is the first factor to precipitate from M's cross product: the normalized orientation\nthat\
    \ every M-application shares.\n\nRelationship to Schmidhuber (2010): Schmidhuber's formal agent implicitly has A = 1 —\n\
    it always responds to compression progress signals. Definition 6 generalizes this to\nA in [0,1], covering agents that\
    \ engage with positive but less-than-certain probability.\nThis generalization is novel to this framework. See NV03-agency-as-gate.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: Agency is derived as a necessary invariant of persistence under selection pressure (Theorem 6 Part 1).
        Its operationalization as the rate of uncertainty reduction as survival pressure approaches zero distinguishes genuine
        drive from compelled updating.
      references:
      - REF-Schmidhuber2010
    derivation:
      from:
      - D03-uncertainty
      - D09-survival-threshold
      - D11-higher-order-function-space
      method: A precipitates from M as the shared directional structure across all M-applications, by the same normalization
        argument that extracts K from F. Necessity proven in Theorem 6.
  edges:
  - to: T07-intelligence-measure
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: I(E) = A * eta_M; A is one of two necessary invariants in the intelligence measure
      derivation:
        method: Definition 7 states I(E) = A * eta_M; A is constitutive
  - to: T03-agency-produces-gradient-descent
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: Theorem 3 proves A > 0 necessarily produces gradient descent on U; A is the driver
      derivation:
        method: 'Theorem 3 is stated in terms of A: ''Agency Necessarily Produces Gradient Descent'''
  - to: REF-Schmidhuber2010
    relation: cited_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: cited
        description: Schmidhuber's formal theory of intrinsic motivation relates to agency as the drive to reduce uncertainty
      derivation:
        method: Cited in Definition 6
- id: D07-informed-action
  type: definition
  number: 3
  name: Informed Action Space
  statement: 'Let F subset (K x W_obs -> Delta_A) be a set of functions, where W_obs is an entity''s

    observable projection of W and Delta_A is a distribution over possible actions. Each

    element f in F has type f : K x W_obs -> Delta_A. F is the complete set of informed

    actions available to an entity.


    An informed action f in F is an action grounded in K, validated against W, and attributed

    to its origins: one that knows why it works. An uninformed action (grounded in no K) is

    not an element of F. Knowledge with no action potential is not an element of F either;

    it is data. An informed action is specifically the coupling: knowledge that enables action,

    action that is justified by knowledge.


    F carries graph structure. The elements of F are nodes; typed relations between them are

    edges. This structure is forced by the same three constraints (retrieval O(|F^[f]|),

    bounded C_n, deduplication) that force K to be a directed graph (Theorem 2b Part 3).


    Edge types on F:

    - depends_on: hard dependencies between actions (feasibility constraints)

    - recommends_before/after: probabilistic ordering evidence (soft gradient directions)

    - enhanced_by: combined actions that outperform either alone


    F is discrete as a graph — a set of nodes connected by typed edges. Each individual f in F

    maps into Delta_A, a probability simplex, which is continuous and metrizable. Gradient

    descent in F is traversal on this discrete graph, directed by the continuous-valued G(f'',K)

    at each adjacent node: discrete steps, continuously-valued objective.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: axiomatic
      description: Foundational definition establishing the type of informed actions and the graph structure of F. The graph
        structure of F is derived from the same three constraints as K (Theorem 2b Part 3).
      references: []
    derivation:
      from:
      - D01-world-state-space
      - D02-knowledge-graph
      method: F is defined as a function space over K x W_obs, grounded in the world state space and knowledge graph
  edges:
  - to: D02-knowledge-graph
    relation: derives_from
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: F is constitutively indexed by K — each f in F takes K as input and is grounded by propositions in K
      derivation:
        method: 'Definition 3 type signature f : K x W_obs -> Delta_A makes K a structural dependency'
  - to: T02-encoding-hierarchy-efficiency
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: Theorem 2b Part 3 proves F must have graph structure under the same retrieval, context, and memory constraints
          as K
      derivation:
        method: The three joint constraints on F (retrieval O(|F^[f]|), bounded C_n, deduplication) are established in Theorem
          2b
  - to: T09-type-irreducibility
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
