- id: D13-provenance
  type: definition
  number: 18
  name: Provenance
  statement: "For any proposition p in K_collective, provenance is the triple:\n\n  prov(p) = (attribution(p), evidence(p),\
    \ derivation(p))\n\nwhere attribution identifies who established p, evidence records how it was verified,\nand derivation\
    \ captures how it was inferred from prior knowledge.\n\nKnowledge without provenance cannot be reliably weighted in K_collective:\n\
    \n  P(p is reliable) proportional to prov(p)\n\nA fact with no provenance is indistinguishable from noise. This is not\
    \ a social norm;\nit is an epistemic requirement. Attribution and provenance are the infrastructure that\nmakes K_collective\
    \ more than the sum of individual beliefs. They are what separates a\nknowledge graph from a rumor.\n\nProvenance is the\
    \ mechanism that maintains transmission fidelity lambda > lambda_min\n(Theorem 10): it allows each entity to weight received\
    \ knowledge against its source,\nto distinguish signal from noise, and to apply the intersection test of Definition 16\n\
    independently. Without provenance, noise accumulates unchecked and fidelity cannot be\nassessed.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: Provenance is derived as the minimum infrastructure for a collective knowledge system to function above
        the survival threshold lambda_min. Without provenance, entities cannot distinguish signal from noise in transferred
        knowledge. The proportionality P(p reliable) proportional to prov(p) is the operational consequence.
      references: []
    derivation:
      from:
      - D12-collective-knowledge
      - T10-collective-gradient-dominance
      method: Provenance is required for lambda > lambda_min (Theorem 10); its triple structure (attribution, evidence, derivation)
        is the minimum specification for reliable weighting of transferred propositions
  edges:
