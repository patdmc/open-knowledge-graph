        description: Theorem 10 proves dU_collective/dt < dU_i/dt using K_collective and K_interaction as defined here
      derivation:
        method: Theorem 10 Step 1 uses K_collective superset K_i; Step 3 uses K_interaction to establish strict inequality
  - to: C14-non-termination-collective
