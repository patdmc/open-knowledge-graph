- id: D12-collective-knowledge
  type: definition
  number: 17
  name: Collective Knowledge
  statement: "For a set of entities {E_i}, the collective knowledge graph is:\n\n  K_collective = union_i K_i union K_interaction\n\
    \nwhere K_interaction is formally defined as:\n\n  K_interaction = {p not in union_i K_i | exists S subset {E_i}, |S|\
    \ >= 2:\n    P(E_p | union_{j in S} K_j) > max_{j in S} P(E_p | K_j)}\n\nwhere E_p subset W is the event corresponding\
    \ to proposition p and P(. | K) is the\nposterior defined in Definition 5.\n\nK_interaction is the set of propositions\
    \ not contained in any individual K_i but whose\nposterior probability rises strictly above what any single member of\
    \ some subset S can\nsupport — propositions the combined evidence of S makes accessible that no individual\nmember of\
    \ S could make accessible alone.\n\nThe definition ranges over all subsets S of size >= 2, not just pairs. Some propositions\n\
    become derivable only from three or more distinct perspectives combined. The number of\ncontributing subsets grows as\
    \ 2^n - n - 1, so K_interaction grows super-additively with\ncollective size. Entities with overlapping K contribute less\
    \ to K_interaction than entities\nwhose knowledge graphs cover different regions of W.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: K_interaction is defined formally using the posterior from Definition 5. The super-additive growth of K_interaction
        with collective size (2^n - n - 1 contributing subsets) is derived combinatorially. The value of the collective is
        not K-size but precipitation count |Prec(K_collective)| (Theorem 10 Step 2b).
      references:
      - REF-Woolley2010
    derivation:
      from:
      - D02-knowledge-graph
      - D03-uncertainty
      - D04-prior-and-posterior
      method: K_collective is the union of individual K_i plus K_interaction; K_interaction is defined by the posterior-based
        condition that combined evidence exceeds any individual's evidence
  edges:
  - to: T10-collective-gradient-dominance
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
