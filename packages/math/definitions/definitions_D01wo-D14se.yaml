        type: formal-derivation
        description: The minimization imperative (Theorem 1) operates on H(W|K), the expected uncertainty defined here
      derivation:
        method: Theorem 1 is stated in terms of U(w,K) as defined in Definition 5
- id: D04-prior-and-posterior
  type: definition
  number: 4-5 (prior/posterior structure)
  name: Prior and Posterior over World States
  statement: "Let (W, F, P_0) be a probability space with prior P_0 over world states. The prior P_0(w)\nis the entity's initial\
    \ distribution over W before conditioning on any knowledge.\n\nEach proposition p in K contributes a likelihood factor\
    \ l_p : W -> [0,1], where l_p(w)\nis the probability of observing the evidence that grounds p if the true world state\
    \ were w.\nThe graph's edge structure encodes conditional independence: if p and q have no path\nbetween them in K, their\
    \ factors are conditionally independent given their shared ancestors,\nyielding a valid factorization.\n\nThe posterior\
    \ over world states given the full knowledge graph is:\n\n  P(w | K) proportional to P_0(w) * product_{p in K} l_p(w)\n\
    \nThis is the standard Bayes posterior obtained by conditioning P_0 on all propositions\nsimultaneously. P(w | K) is well-defined\
    \ and normalizable for any proper prior P_0 and\nbounded likelihood functions l_p.\n\nThe theory is parametric in P_0\
    \ — it does not depend on a specific prior, only on its\nexistence and well-formedness.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: Standard Bayesian conditioning. The prior-likelihood-posterior factorization follows directly from Bayes'
        theorem applied to the Bayesian network structure of K. Well-definedness follows from properness of P_0 and boundedness
        of likelihood factors.
      references:
      - REF-Pearl1988
      - REF-Shannon1948
    derivation:
      from:
      - D01-world-state-space
      - D02-knowledge-graph
      - D03-uncertainty
      method: 'Bayesian updating: prior P_0 updated by likelihood factors from each proposition p in K via standard Bayes
        posterior'
  edges:
  - to: D03-uncertainty
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: U(w,K) = -log P(w|K) requires P(w|K) as defined by the prior-posterior structure
      derivation:
        method: Definition 5 explicitly depends on P(w|K) whose derivation is the prior-posterior structure
  - to: REF-Pearl1988
    relation: cited_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: cited
        description: Pearl's Bayesian network formalism provides the conditional independence structure for the factorization
      derivation:
        method: Cited in Definition 5 for the Bayesian network interpretation of K
- id: D05-information-gain
  type: definition
  number: 3b
  name: Information Gain
  statement: "The information gain of action f given current knowledge K is:\n\n  G(f, K) = E_w[U(w, K) - U(w, K_f)]\n   \
    \        = H(W | K) - H(W | K, phi(f, w))\n           = I(f ; W | K)\n\nwhere K_f = K union {p_f} is the updated knowledge\
    \ after executing f and observing its\nfeedback phi(f, w), and p_f is the proposition grounded by observing phi(f, w).\n\
    \nThis is standard mutual information [Shannon1948] expressed in terms of U: the reduction\nin uncertainty about w achieved\
    \ by executing f and observing its feedback.\n\nG(f, K) >= 0 when p_f is grounded by observing the true feedback phi(f,\
    \ w): conditioning\non true information cannot increase conditional entropy (data processing inequality [Cover2006]).\n\
    \nG(f, K) = 0 when f provides no new information about w given K.\n\nThis bound holds for truthfully observed feedback;\
    \ a false or corrupted p_f may increase U\nand falls outside the scope of this definition.\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'Standard mutual information I(f;W|K) re-expressed using the paper''s uncertainty measure U. Non-negativity
        follows from the data processing inequality (Cover & Thomas 2006): conditioning on true information cannot increase
        conditional entropy.'
      references:
      - REF-Shannon1948
      - REF-Cover2006
    derivation:
      from:
      - D03-uncertainty
      - D02-knowledge-graph
      method: G(f,K) = I(f;W|K) = H(W|K) - H(W|K,phi(f,w)) by definition of mutual information, with H(W|K) = E[U(w,K)] per
        Definition 5
  edges:
  - to: D03-uncertainty
    relation: derives_from
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: G(f,K) is defined as the expected reduction in U(w,K); requires U as defined in Definition 5
      derivation:
        method: G(f,K) = E_w[U(w,K) - U(w,K_f)] directly references U
  - to: REF-Shannon1948
    relation: cited_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: cited
        description: Shannon's mutual information I(f;W|K) is the formal basis of G(f,K)
      derivation:
        method: Cited in Definition 3b
  - to: REF-Cover2006
    relation: cited_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: cited
        description: Data processing inequality grounds G(f,K) >= 0 for truthfully observed feedback
      derivation:
        method: Cited in Definition 3b for non-negativity bound
  - to: T10-collective-gradient-dominance
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
