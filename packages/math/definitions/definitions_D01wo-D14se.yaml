- id: D01-world-state-space
  type: definition
  number: 1
  name: World State Space
  statement: 'The world W is the complete set of states an entity might face. W is assumed:

    (1) non-empty and infinite; (2) not fully observable by any single entity;

    (3) inexhaustible — no entity can reduce uncertainty to zero across all of W.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: axiomatic
      description: Foundational axiom — assumed as the operating environment for all subsequent derivations. Inexhaustibility
        is required for non-termination of gradient descent (Theorem 3 Part II).
      references: []
    derivation:
      from: []
      method: Axiomatic — no prior nodes required
  edges:
  - to: D02-knowledge-graph
    relation: grounded_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: K is defined as a set of propositions about W — the relation to W is definitional
      derivation:
        method: Definition 2 references Definition 1 explicitly
  - to: D09-survival-threshold
    relation: grounded_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: U_lethal^d is imposed by W — the survival threshold is a property of W acting on the entity
      derivation:
        method: Definition 9 explicitly states 'imposed by W'
- id: D02-knowledge-graph
  type: definition
  number: 2
  name: Knowledge Graph
  statement: 'K is a directed acyclic graph where nodes are propositions p about W

    and edges represent inferential or causal relationships between propositions.

    K_max is the maximum number of propositions that fit in C_n.

    K^[f] denotes the subgraph of propositions relevant to action f (progressive disclosure).

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: 'The DAG structure is not assumed — it is derived: provenance forces acyclicity because a proposition cannot
        be derived from a proposition that was itself derived from it. Graph structure is the most efficient architecture
        for progressive disclosure under bounded C_n.'
      references:
      - T01-minimization-imperative
      - T02-encoding-hierarchy
    derivation:
      from:
      - D01-world-state-space
      - D07-encoding-hierarchy
      method: Definition over W; graph structure motivated by Theorem 2 (encoding hierarchy) and progressive disclosure argument
  edges:
  - to: D03-uncertainty
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: U(w, K) is defined in terms of K — uncertainty is a function of the knowledge graph
      derivation:
        method: Definition 3 (Uncertainty) references K from Definition 2
  - to: D05-information-gain
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: G(f, K) is the expected reduction in H(W|K) — information gain requires K
      derivation:
        method: Definition 3b (Information Gain) is a function of K
- id: D03-uncertainty
  type: definition
  number: 5
  name: Uncertainty as Surprisal
  statement: "The uncertainty of entity E about world state w is the surprisal of w given K [Shannon1948, Cover2006]:\n\n\
    \  U(w, K) = -log P(w | K)\n\nU(w, K) measures how surprising — how informationally costly — the specific world state\
    \ w\nis given what K contains. It is high when K gives little constraint on w, and low when K\nmakes w highly predictable.\n\
    \nK is a directed graph of propositions interpreted as a Bayesian network [Pearl1988]. Each\nproposition p in K contributes\
    \ a likelihood factor l_p : W -> [0,1]. The posterior over\nworld states given the full knowledge graph is:\n\n  P(w |\
    \ K) proportional to P_0(w) * product_{p in K} l_p(w)\n\nThe expected uncertainty over all world states is the conditional\
    \ entropy:\n\n  H(W | K) = E_w[U(w, K)] = -sum_w P(w | K) log P(w | K)\n"
  provenance:
    attribution:
      author: Patrick McCarthy
      source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
      date: '2025'
      doi: 10.5281/zenodo.18923066
    evidence:
      type: formal-derivation
      description: Defined via Shannon surprisal. The posterior is standard Bayes conditioning on all propositions in K simultaneously.
        The graph's edge structure encodes conditional independence following Pearl's Bayesian network formalism.
      references:
      - REF-Shannon1948
      - REF-Cover2006
      - REF-Pearl1988
    derivation:
      from:
      - D01-world-state-space
      - D02-knowledge-graph
      method: Shannon surprisal applied to the posterior P(w|K) derived from K as a Bayesian network over W
  edges:
  - to: D01-world-state-space
    relation: derives_from
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: U(w,K) is defined over world states w in W; W must exist for U to be defined
      derivation:
        method: Definitional dependency — U maps W x K to real values
  - to: D02-knowledge-graph
    relation: derives_from
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: formal-derivation
        description: K is the conditioning set that determines P(w|K); uncertainty is defined relative to K
      derivation:
        method: Definitional dependency — U(w,K) conditions on K
  - to: REF-Shannon1948
    relation: cited_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: cited
        description: Shannon's information theory grounds the surprisal definition U = -log P(w|K)
      derivation:
        method: Direct citation in Definition 5
  - to: REF-Pearl1988
    relation: cited_by
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
      evidence:
        type: cited
        description: K is interpreted as a Bayesian network following Pearl's formalism
      derivation:
        method: Direct citation in Definition 5
  - to: T01-minimization-imperative
    relation: grounds
    provenance:
      attribution:
        author: Patrick McCarthy
        source: 'Uncertainty Bounding as the Basis of Intelligence: A Formal Theory'
        date: '2025'
