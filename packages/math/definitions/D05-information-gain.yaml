id: D05-information-gain
type: definition
number: "3b"
name: "Information Gain"
statement: |
  The information gain of action f given current knowledge K is:

    G(f, K) = E_w[U(w, K) - U(w, K_f)]
             = H(W | K) - H(W | K, phi(f, w))
             = I(f ; W | K)

  where K_f = K union {p_f} is the updated knowledge after executing f and observing its
  feedback phi(f, w), and p_f is the proposition grounded by observing phi(f, w).

  This is standard mutual information [Shannon1948] expressed in terms of U: the reduction
  in uncertainty about w achieved by executing f and observing its feedback.

  G(f, K) >= 0 when p_f is grounded by observing the true feedback phi(f, w): conditioning
  on true information cannot increase conditional entropy (data processing inequality [Cover2006]).

  G(f, K) = 0 when f provides no new information about w given K.

  This bound holds for truthfully observed feedback; a false or corrupted p_f may increase U
  and falls outside the scope of this definition.

provenance:
  attribution:
    author: "Patrick McCarthy"
    source: "Uncertainty Bounding as the Basis of Intelligence: A Formal Theory"
    date: "2025"
    doi: "10.5281/zenodo.18923066"
  evidence:
    type: formal-derivation
    description: "Standard mutual information I(f;W|K) re-expressed using the paper's uncertainty measure U. Non-negativity follows from the data processing inequality (Cover & Thomas 2006): conditioning on true information cannot increase conditional entropy."
    references: [REF-Shannon1948, REF-Cover2006]
  derivation:
    from: [D03-uncertainty, D02-knowledge-graph]
    method: "G(f,K) = I(f;W|K) = H(W|K) - H(W|K,phi(f,w)) by definition of mutual information, with H(W|K) = E[U(w,K)] per Definition 5"

