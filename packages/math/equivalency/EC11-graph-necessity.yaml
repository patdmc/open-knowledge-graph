id: EC11-graph-necessity
type: equivalency-class
name: "Graph Necessity: K Must Be Indexed by F — Six Independent Derivations"
underlying_proposition: |
  The knowledge structure K must be indexed by the action structure F: knowledge
  without an action reference is unrepresentable at bounded context C_n. This is
  not a design choice but a formal necessity. Six independent bodies of literature
  arrive at the same structural conclusion from six different starting points: the
  K/F graph (where K-nodes carry their action implications) is the unique structure
  that preserves all information at C_n without translation loss.

members:
  - id: UB-T2b-Part3
    framework: "Uncertainty Bounding (Theorem 2b Part 3)"
    formulation: |
      At bounded context C_n with M < N, the only information-preserving
      representation is one where K-nodes are indexed by F: their action implications
      must be stored alongside the proposition. Without F-indexing, the agent cannot
      distinguish equally probable world-states with different action implications —
      they compress identically but require different responses. The two-option proof:
      either K is F-indexed (graph) or it is not (flat), and the flat representation
      loses F-information that cannot be recovered at context C_n.
    epistemic_status: formal-derived
    derivation: "Theorem 2b Part 3: two-option proof from C_n + M < N + bounded action space"

  - id: Tarski-semantic-model
    framework: "Tarski (1936)"
    formulation: |
      A semantic model maps every sentence to the states of affairs that satisfy it.
      The satisfaction relation IS the action-indexing: a proposition is true in
      a model exactly when the model (action context) satisfies it. EM11 shows that
      Tarski's satisfaction relation = UB's K/F grounding relation. The model-theoretic
      necessity is the same as the K/F graph necessity: truth without a model
      (proposition without action context) is undefined.
    epistemic_status: formal-mathematical
    derivation: "EM11: Tarski satisfaction relation maps to UB K/F grounding; from REF-Tarski1936"

  - id: Kac-Dynkin
    framework: "Kac (1990) — Kac-Moody algebras"
    formulation: |
      The Dynkin diagram classifies all simple Lie algebras. Each node represents
      a simple root; edges represent the action of roots on each other (Cartan matrix
      entries). The algebra's K-structure (root system) is inseparable from its
      F-structure (root action operators). EM16 shows that this algebraic necessity
      is a formal instantiation of NV01: the abstract roots require action operators
      to be defined; a root without its associated operator is not a well-formed
      algebraic object.
    epistemic_status: formal-mathematical
    derivation: "EM16: Dynkin diagram as K/F graph; root = K-node, action operator = F-edge; from REF-Kac1990"

  - id: Polchinski-holography
    framework: "Polchinski (1998) — String Theory / Holographic Principle"
    formulation: |
      The holographic principle states that the physical degrees of freedom of a
      volume are fully encoded on its boundary with area A/4G_N in Planck units.
      The boundary IS the K/F graph at cosmological scale: the 2D boundary encodes
      the 3D bulk (K) and the boundary theory encodes all interactions (F).
      EM18 shows C_n = A/4G_N: context bound = holographic bound = Bekenstein-Hawking
      entropy. The information is on the boundary (K/F graph), not in the bulk (flat K).
    epistemic_status: formal-theoretical
    derivation: "EM18: holographic principle instantiates NV01 at spacetime scale; from REF-Polchinski1998"

  - id: Lin-flow-sensitive
    framework: "Lin (compiler theory)"
    formulation: |
      Flow-sensitive pointer analysis is strictly more precise than flow-insensitive
      analysis. In pointer analysis, K (the set of possible aliasing relationships)
      must be indexed by F (the program control-flow path) to avoid conflating
      aliasing relationships that are true on some paths but not others.
      The precision loss of flow-insensitive analysis is exactly the information
      lost when K is not indexed by F — an engineering proof that K/F indexing
      preserves information that flat K loses.
    epistemic_status: empirical-formal
    derivation: "EM27: flow-sensitive analysis is provably more precise; from REF-Lin-CS"

  - id: FLM-vertex-locality
    framework: "Frenkel, Lepowsky, Meurman (1988)"
    formulation: |
      Vertex operator algebras require the locality axiom: V(a,z)V(b,w) and
      V(b,w)V(a,z) must agree on the same domain (the annular region). The
      locality axiom IS the K/F indexing: vertex operators (F-operations on states)
      must be well-defined relative to each other's domains. EM17 shows locality
      = provenance independence: the result of applying operators is path-independent
      (same structure as D13 provenance). A vertex algebra without locality is
      ill-defined — which is the algebraic statement of K/F graph necessity.
    epistemic_status: formal-mathematical
    derivation: "EM17: VOA locality axiom as K/F necessity; from REF-FrenkelLepowskyMeurman1988"

  - id: Transformer-attention
    framework: "Vaswani et al. (2017) — Transformer Architecture"
    formulation: |
      The transformer's self-attention mechanism computes for each token (K-node)
      a weighted sum over all other tokens weighted by their relevance to the query
      (F-relevance). The attention matrix IS the K/F graph at inference time:
      each row is a K-node; each entry is the strength of the F-indexed relationship
      to another K-node. Attention without query-key structure (F-indexing)
      degenerates to uniform averaging — information-losing flat K.
    epistemic_status: empirical-formal
    derivation: "TR1: transformer attention = K/F graph implementation; from REF-VaswaniEtAl2017"

equivalence_analysis: |
  Seven bodies of literature independently derive that K must be indexed by F.
  The formal translations:

  - UB Theorem 2b Part 3: two-option proof from information theory + C_n bound
  - Tarski: truth requires a model (satisfaction relation = K/F indexing)
  - Kac-Moody: roots require action operators (Dynkin diagram = K/F graph)
  - Holography: bulk encoded on boundary (boundary = K/F graph at cosmological scale)
  - Compiler theory: flow-sensitive > flow-insensitive (F-indexing preserves precision)
  - Vertex algebras: locality axiom (operator = F-action on K-state)
  - Transformer attention: query-key structure (attention = K/F graph at inference)

  The structural equivalence: in every framework, the entity that plays the role of K
  (propositions, roots, bulk states, program aliases, vertex states, token embeddings)
  must be indexed by the entity that plays the role of F (models, operators, boundary,
  control flow, vertex operators, queries) or information is lost.

  This EC node elevates NV01 from a UB-specific claim to a cross-framework formal
  necessity. C_1(NV01) is substantially strengthened by this convergence.

  Note on EC03 relationship: EC03 covers "structured internal representation" (K/F
  graph exists and is structured). EC11 covers the stronger claim: the K/F structure
  is uniquely necessary (no alternative representation preserves full information at C_n).
  EC11 grounds EC03.

confidence_C1p:
  estimate: 0.91
  basis: "Formal proofs in four independent frameworks (Tarski, Kac-Moody, FLM, UB T2b) + empirical formal in two engineering domains (compiler theory, transformer architecture) + formal-theoretical in physics (holography)"
  weakest_link: "The exact equivalence between holographic bound and C_n requires accepting EM18's identification C_n = A/4G_N, which is a strong cross-domain claim not yet independently verified"

contradictions:
  - source: "Gibson (1979) direct perception"
    claim: "Perception is direct, not mediated by internal representations indexed to action"
    resolution: "Scope mismatch (same resolution as EC03): Gibson's claim applies to perceptual coupling; K/F graph necessity applies to long-term knowledge structure. The two operate at different timescales and are not in conflict."

implications_for_ub: |
  EC11 is the most important new EC node in the corpus. It elevates NV01 (graph
  necessity) from a claim that requires UB's specific derivation to a proposition
  with seven independent derivations across mathematics, physics, computer science,
  and cognitive architecture. The weakest novel claim in the theory (T2b Part 3,
  C_1 = 0.82) is substantially strengthened by this convergence: the probability
  that the K/F graph necessity is wrong is now bounded by the probability that
  ALL seven independent derivations are wrong simultaneously.

  EC11 also motivates extending D02 (knowledge graph definition) to explicitly state
  that the graph form is not a representational choice but a necessity — the only
  structure that preserves full information under C_n.

