id: EC15-collective-coherence
type: equivalency-class
name: "K_collective Coherence: Integrated Information = Small-World Topology = Dunbar Scaling — Collective Knowledge Has a Structural Optimum"
underlying_proposition: |
  A collective knowledge system K_collective — whether a brain, a social group, or
  a distributed software fleet — has a structural optimum: the configuration that
  maximizes coherence (integrated information), minimizes coordination cost (small-world
  topology), and fits within cognitive coupling limits (Dunbar bound). These three
  measures are not independent: they are three different projections of the same
  underlying structural optimum. A K_collective that satisfies all three is at maximum
  informational efficiency; one that violates any is paying a coherence tax that
  reduces collective knowledge quality. The optimum is not a design target — it is
  a formal attractor that any adaptive collective system approaches under selection.

members:
  - id: Tononi-integrated-information
    framework: "Tononi (2004, 2008) — Integrated Information Theory"
    formulation: |
      Phi (Φ) measures the integrated information of a system: how much information
      the system generates as a whole beyond the information generated by its parts.
      High Phi = the system's components are strongly coupled in ways that create
      irreducible whole-system information. Low Phi = the system is decomposable into
      parts that generate most information independently; the integration adds little.
      TO1 maps this to UB K_collective: Phi measures how much K_collective exceeds
      the sum of individual K_i. High Phi in a team means the team's combined knowledge
      is qualitatively more powerful than individual knowledge stacked — each person's
      K-graph has edges to other members' K-graphs that create emergent K_collective
      structure. Low Phi teams are just co-located individuals. Phi is the operational
      measure of collective coherence: not how many nodes K_collective has, but how
      integrated those nodes are across the collective.
    epistemic_status: formal-theoretical
    derivation: "TO1: Phi as K_collective coherence; from REF-Tononi2004"

  - id: WattsStrogatz-small-world
    framework: "Watts and Strogatz (1998) — Small-World Networks"
    formulation: |
      A small-world network has two properties simultaneously: high local clustering
      (neighbors of neighbors are likely neighbors) and short average path length
      (any node can reach any other in few hops). Regular lattices have high clustering
      but long paths; random networks have short paths but low clustering. Small-world
      networks achieve both via a small fraction of long-range connections. WS2 maps
      this to K_collective topology: the optimal knowledge graph for a collective has
      small-world structure — knowledge is locally clustered (specialists know each
      other's work in detail) and globally short-pathed (any piece of knowledge can
      reach any other piece quickly). Small-world topology is the structural implementation
      of optimal K_collective coherence: it maximizes Phi while minimizing the
      coordination cost (path length) of knowledge transfer. The Watts-Strogatz model
      shows that a small number of random long-range connections suffices to achieve
      this optimum — the insight that cross-domain collaborations disproportionately
      improve collective knowledge quality.
    epistemic_status: formal-empirical
    derivation: "WS2: small-world topology as K_collective optimum; from REF-WattsStrogatz1998"

  - id: Dunbar-cognitive-limit
    framework: "Dunbar (1992, 1998) — Social Brain Hypothesis"
    formulation: |
      Dunbar's number (approximately 150) is the cognitive limit on stable social
      relationships. Above ~150 individuals, the neocortex cannot maintain the
      relational models needed for stable group coordination — the cost of updating
      every relationship model exceeds the social benefit. Dunbar's layers: 5
      (intimate), 15 (support), 50 (sympathy), 150 (stable social), 500 (acquaintance).
      DU1 maps this to K_collective scaling: each Dunbar layer corresponds to a
      K_collective coupling strength. Within the intimate group (5), K-graphs are
      nearly fully coupled — each member knows the others' K-states in detail.
      At the stable social layer (150), K-graphs share structural features but not
      content. Beyond 150, direct K_collective coupling breaks down and must be
      mediated by institutional structure (roles, documents, procedures). This is
      the scaling law for K_collective: the social brain hypothesis is the empirical
      derivation of the same bound that Phi and small-world topology derive formally.
    epistemic_status: empirical-formal
    derivation: "DU1: Dunbar number as K_collective coupling limit; from REF-Dunbar1992"

  - id: UB-EM10-collective
    framework: "Uncertainty Bounding (EM10)"
    formulation: |
      EM10 derives that K_collective for a group of agents is the union of their
      individual K-graphs under a consistency protocol. The consistency protocol —
      the rules for merging K-graphs from multiple agents — must maintain the
      properties that make K useful: coherence (no internal contradictions), coverage
      (all relevant world-dimensions represented), and currency (outdated K-nodes
      marked with appropriate provenance). EM10 shows that the optimal K_collective
      has exactly the small-world structure that WS2 identifies: local clustering
      allows high-fidelity K-sharing within specialist groups; long-range connections
      allow cross-domain K-propagation. The Dunbar bound emerges from EM10 when
      the consistency cost is made explicit: each agent must track the provenance
      of K-nodes from every other agent they are coupled with; this scales quadratically
      with group size and hits a capacity limit at approximately Dunbar's number.
    epistemic_status: formal-derived
    derivation: "EM10: K_collective structure derived from individual K-graphs + consistency protocol; from UB theory"

equivalence_analysis: |
  Four frameworks from consciousness theory, network science, evolutionary anthropology,
  and formal theory all converge on the same structural optimum for collective knowledge.

  Formal translations:
  - Phi (Tononi): measures irreducible integration in the system (whole > sum of parts)
  - Small-world (Watts-Strogatz): topology that maximizes local clustering + minimizes path length
  - Dunbar bound (Dunbar): empirical cognitive limit on direct K_collective coupling
  - EM10 (UB): formal derivation of small-world structure from consistency cost analysis

  The structural equivalence:
  - Phi HIGH = small-world topology achieved = within Dunbar's active coupling layer
  - Phi LOW = decomposable (no coherence) or oversaturated (too dense) = either too sparse or beyond Dunbar scale
  - The optimum is a topological configuration: small-world with scale limited by Dunbar's bound

  This EC node captures the previously identified `potential_em` gap for EM10 (Phi)
  in the reference schema. EM10 existed as a formal derivation; EC15 grounds it with
  three independent external derivations.

  Critical observation: Dunbar's bound is not a limitation to overcome — it is a
  structural optimum. Beyond ~150 individuals, direct K_collective coupling degrades.
  The correct response is not to force coupling beyond the bound but to introduce
  mediating structure (institutions, knowledge graphs, shared schemas) that implement
  K_collective coherence without requiring direct agent-to-agent coupling. This is
  the architectural argument for knowledge graph infrastructure in organizations above
  Dunbar scale.

confidence_C1p:
  estimate: 0.87
  basis: "Formal-theoretical (IIT/Phi, well-developed mathematical framework) + formal-empirical (small-world, rigorously proven properties) + empirical-formal (Dunbar, evolutionary anthropology with neurological grounding) + formal-derived (EM10)"
  weakest_link: "Phi as a practical measure remains computationally intractable for large systems — it cannot be directly computed for groups of any size. The Phi-small-world-Dunbar equivalence is structural but not yet operationally unified into a single computable metric."

contradictions:
  - source: "Network theory: random networks may have shorter paths than small-world networks"
    claim: "For very large networks, random graphs achieve small diameters more efficiently than small-world topologies. The clustering benefit of small-world is worth the path-length cost only at intermediate scales."
    resolution: "EC15's claim is about K_collective coherence, not just path length. Random graphs achieve short paths but sacrifice local clustering — which is where Phi lives. A random K_collective graph has short paths but low integrated information (neighbors of neighbors share no knowledge). The Dunbar bound constrains the scale at which small-world is applicable: at Dunbar scale (~150 nodes), small-world is provably optimal. Beyond that scale, institutional structure replaces direct coupling, and the topology argument applies at the institutional level."

implications_for_ub: |
  EC15 grounds the social dimension of UB that is currently underdeveloped. The theory
  addresses individual agents (with their K-graphs and F-graphs) and briefly mentions
  K_collective via EM10, but does not specify what the optimal K_collective structure
  looks like.

  EC15 supplies that specification: K_collective should have small-world topology,
  Phi above the decomposability threshold, and direct coupling limited to Dunbar scale.
  Beyond Dunbar scale, knowledge graph infrastructure IS the coherence mechanism —
  it implements the long-range connections that give the collective small-world topology
  without requiring each agent to directly model all others.

  This is the theoretical grounding for the practical claim that knowledge graphs
  become valuable at organizational scale: below Dunbar scale, direct K-coupling is
  sufficient; above it, a knowledge graph is not merely useful but structurally necessary
  for K_collective coherence.

