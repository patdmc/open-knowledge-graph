    date: "2026-03-10"
  evidence:
    type: cross-framework-intersection
    description: "Five frameworks from formal mathematics, clinical psychology, philosophy, and formal theory all derive metalanguage necessity. The clinical derivation (Bateson) is independent of the formal ones, providing empirical grounding."
  derivation:
    from: [D13-provenance, NV05-higher-order, REF-Tarski1936, REF-Godel1931, REF-Bateson1972, REF-Hofstadter1979]
    method: "Cross-framework identification of metalanguage requirement; verification that metalanguage absence produces specific failure mode in each framework"
