- id: EC06-belief-as-action
  type: equivalency-class
  name: 'Belief as Action Disposition: K grounds F = Habit of Action = Affordance = Active Inference'
  underlying_proposition: 'Retained knowledge (belief) is not an end in itself — it is a disposition to act

    differently than without it. A proposition''s value is entirely its effect on the

    action space. Knowledge and action are not two separate things; knowledge IS the

    structure that shapes action. A proposition with no consequences for any possible

    action has no cognitive value.

    '
  members:
  - id: UB-K-grounds-F
    framework: Uncertainty Bounding
    formulation: 'K grounds F: each proposition p in K grounds at least one informed action f

      in F. The grounding relation is the connection between knowledge and action.

      Propositions with no grounded actions are not retained (Theorem 1 retention

      criterion: retain unless value is certainly zero).

      '
    epistemic_status: formal-definition
    derivation: Definition 2 (K/F grounding); Theorem 1 (retention criterion)
  - id: PC-belief-as-habit
    framework: Peirce (1878)
    formulation: 'Belief is not a mental state but a habit of action — a settled disposition

      to act in a certain way given certain conditions. Beliefs that produce no

      different actions are empty (pragmatic maxim: meaning = conceivable practical

      effects).

      '
    epistemic_status: philosophical
    derivation: 'Pragmatic maxim: meaning = practical consequences'
  - id: FEP-active-inference
    framework: Friston (2017)
    formulation: 'Active inference: action minimizes expected free energy under the generative

      model. The belief state (posterior) directly drives action. A belief that

      changes no expected free energy reduction does not drive action.

      '
    epistemic_status: formal-theoretical
    derivation: 'FEP2: active inference unifies perception and action under free energy minimization'
  - id: GI-affordances
    framework: Gibson (1979)
    formulation: 'Affordances ARE beliefs in action-relevant terms. To perceive an affordance

      is to perceive what action is possible. There is no separation between

      perceiving (knowing) and affording (action potential).

      '
    epistemic_status: conceptual
    derivation: 'Ecological psychology: direct perception of action possibilities'
  - id: BA-workspace-as-action
    framework: Baars (1988)
    formulation: 'Global workspace broadcast = making information available for action selection.

      Information in the workspace influences all processors, including motor systems.

      Knowledge that is not broadcast does not influence action.

      '
    epistemic_status: empirical-theoretical
    derivation: 'GWT: global broadcast = action-availability; local processing = not yet action-relevant'
  equivalence_analysis: 'Five frameworks independently derive the same proposition: knowledge (belief, posterior,

    affordance, broadcast) has value only through its effect on action. No retained knowledge

    exists without action consequence.


    Formal translation:

    - K grounds F (UB) = belief as habit of action (Peirce) = affordance (Gibson)

    - The grounding relation in UB IS Peirce''s pragmatic maxim formalized

    - FEP active inference: the posterior that drives action = K that grounds F


    This is one of the deepest equivalency classes because it bridges formal AI theory

    (UB, FEP), philosophy (Peirce), ecological psychology (Gibson), and cognitive

    neuroscience (Baars). Five traditions arrive at the same structural claim

    through completely independent derivations.


    Strength of equivalence: VERY HIGH. Peirce''s 1878 formulation is explicitly

    instantiated in UB''s Definition 2 grounding relation.

    '
  confidence_C1p:
    estimate: 0.95
    basis: Five independent traditions, with Peirce (1878) as the formal philosophical grounding that UB directly instantiates
    weakest_link: The exact formal grounding (K grounds F) vs. Peirce's qualitative habit is a translation — the formal equivalence
      requires showing the grounding relation IS a habit in Peirce's sense
  contradictions: []
  implications_for_ub: 'The K/F grounding relation is among UB''s most-supported premises. Peirce, Gibson,

    Baars, and Friston all independently motivate it. The UB contribution is making

    the grounding relation formal and deriving the retention criterion (Theorem 1) from it.

    This is a case where EC maps UB''s formal definition to a rich existing literature

    — deepening the philosophical grounding significantly.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Five traditions independently derive belief-as-action-disposition. Peirce's pragmatic maxim is explicitly
        instantiated by UB's grounding relation.
    derivation:
      from:
      - D02-knowledge-graph
      - D07-informed-action
      - REF-Peirce1878
      - REF-Friston2017
      - REF-Gibson1979
      - REF-Baars1988
      method: 'Philosophical grounding chain: Peirce 1878 -> formal instantiation in UB Definition 2'
- id: EC07-collective-knowledge
  type: equivalency-class
  name: 'Collective Knowledge as Information Integration: K_collective = Major Transitions = Cultural Evolution'
  underlying_proposition: 'When multiple independent agents pool their knowledge structures, the collective

    representation is strictly superior to any individual representation. This is not

    merely additive — the intersection of independent projections produces confirmed

    knowledge (higher confidence) and extended sensing (more dimensions covered).

    Collective knowledge integration is a qualitative transition, not a quantitative one.

    '
  members:
  - id: UB-Kcollective
    framework: Uncertainty Bounding
    formulation: 'K_collective: the intersection of independently-derived K_i graphs, with

      provenance verification. Two mechanisms: overlapping dimensions increase C_1(p);

      distinct dimensions extend M without intermediate execution. Formally: solo

      extends M by 1 per step; intersection extends by |K_j \ K_i| per operation.

      (Corollary 8a, NV04)

      '
    epistemic_status: formal-derived
    derivation: 'Corollary 8a: derived from M < N + inductive structure of Theorem 3 Part I'
  - id: MS-major-transitions
    framework: Maynard Smith and Szathmáry (1995)
    formulation: 'Major evolutionary transitions = changes in how hereditary information is

      stored and integrated. The transition from individual replicators to cooperating

      units IS an information integration event: individual K''s become a shared

      collective information structure.

      '
    epistemic_status: empirical-theoretical
    derivation: Historical analysis of evolutionary transitions; information-theoretic framing
  - id: FEP-extended-markov
    framework: Friston (2010, extended)
    formulation: 'Extended Markov blankets: the FEP applies to groups of agents sharing a

      collective Markov blanket. The group-level generative model is the

      collective representation — K_collective in UB terms.

      '
    epistemic_status: theoretical-extension
    derivation: Extension of FEP to multi-agent systems; not yet fully formalized
  - id: PC-community-of-inquiry
    framework: Peirce (1877)
    formulation: 'Truth is what a community of inquirers would agree on given unlimited time.

      The community''s collective inquiry converges faster than any individual''s —

      independent lines of evidence reinforce each other.

      '
    epistemic_status: philosophical
    derivation: 'Pragmatist epistemology: community of inquirers as convergence accelerator'
  equivalence_analysis: 'Four frameworks independently ground the claim that collective knowledge integration

    produces qualitatively superior representations:


    - UB: formal acceleration mechanism (NV04), with explicit cardinality

    - Maynard Smith: empirical evidence from evolutionary history

    - FEP extended: theoretical extension (less developed)

    - Peirce: philosophical grounding of community of inquiry as convergence accelerator


    Formal translation: K_collective (UB) = the collective generative model (FEP extended) =

    the integrated information structure at a major transition (Maynard Smith) = the

    convergent community of inquiry (Peirce).


    The UB contribution: formal derivation of the acceleration mechanism with explicit

    cardinality (|K_j \ K_i| distinct dimensions gained per intersection). The others

    ground the qualitative claim; UB provides the quantitative mechanism.


    Strength of equivalence: HIGH for UB/Peirce/Maynard Smith. MODERATE for FEP

    extended (less developed formalization).

    '
  confidence_C1p:
    estimate: 0.83
    basis: Evolutionary evidence (Maynard Smith) + philosophical grounding (Peirce) + formal derivation (UB). FEP extension
      not yet fully formalized.
    weakest_link: The exact cardinality acceleration (|K_j  K_i| per operation) is specific to UB and not independently verified
      by the other frameworks
  contradictions: []
  implications_for_ub: 'NV04 (intersection acceleration) and D12 (collective knowledge) have moderate support.

    The qualitative claim (collective > individual) is well-grounded; the quantitative

    mechanism (|K_j \ K_i| cardinality) is novel to UB and represents its specific

    contribution beyond the qualitative claim.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Four frameworks ground collective knowledge integration. UB provides the formal acceleration mechanism;
        Maynard Smith provides evolutionary evidence; Peirce provides philosophical grounding.
    derivation:
      from:
      - D12-collective-knowledge
      - NV04-intersection-acceleration
      - REF-MaynardSmith1995
      - REF-Peirce1877
      method: 'Equivalency: collective integration across levels of analysis'
- id: EC08-compression-factoring
  type: equivalency-class
  name: 'Compression as Factoring: Factorization = Compression Progress = Sufficient Statistic = Aperiodic Encoding'
  underlying_proposition: 'Retaining more knowledge in less space requires extracting shared structure — factoring

    the representation. Pure compression without structure extraction loses information;

    structural compression (factoring) retains information while reducing representation size.

    This is the mechanism by which intelligence scales.

    '
  members:
  - id: UB-factoring
    framework: Uncertainty Bounding
    formulation: 'Factoring at C_n: extracting shared structure from propositions reduces |K| without

      discarding content. This IS graph construction. Theorem 2b Part 3: factoring is

      the unique information-preserving compression method at bounded context.

      '
    epistemic_status: formal-necessity-proof
    derivation: 'Theorem 2b Part 3: two options at C_n; factoring preserves; discarding loses'
  - id: S-compression-progress
    framework: Schmidhuber (2010)
    formulation: 'Compression progress = finding patterns that allow shorter description. Finding

      a pattern IS factoring — extracting shared structure. Schmidhuber''s agent is

      rewarded for factoring its history into shorter descriptions.

      '
    epistemic_status: design-objective
    derivation: Compression progress implies factoring; Schmidhuber grounds it as objective
  - id: CT-chain-rule
    framework: Cover and Thomas (2006)
    formulation: 'Chain rule for entropy: H(X_1,...,X_n) = sum H(X_i | X_{1..i-1}).

      Conditional entropy H(X_i | X_{1..i-1}) <= H(X_i). Factoring the joint

      distribution preserves the total entropy while reducing the individual terms.

      Factoring IS the entropy-preserving compression.

      '
    epistemic_status: formal-mathematical
    derivation: 'Shannon entropy theory: chain rule is the formal statement of factoring'
  - id: TB-information-bottleneck
    framework: Tishby and Polani (2011)
    formulation: 'The information bottleneck: retain the minimal description of past observations

      sufficient for predicting future rewards. This is factoring: extract the

      action-relevant structure, compress the rest. The bottleneck IS a factoring

      operation on the information.

      '
    epistemic_status: formal-theoretical
    derivation: Rate-distortion theory applied to sequential decision-making
  - id: SCH-aperiodic
    framework: Schrödinger (1944)
    formulation: 'The genetic material is an aperiodic crystal: non-redundant encoding.

      Aperiodic = factored = each element adds information (no repetition).

      Maximum information per unit of physical substrate = maximum factoring.

      '
    epistemic_status: theoretical-physical
    derivation: 'Physical chemistry: aperiodic structure maximizes information density'
  - id: SO1-solomonoff-factoring
    framework: Solomonoff (1964) — Universal Prior as Factoring
    formulation: 'The Solomonoff universal prior assigns probability to strings proportional to

      the total measure of programs that generate them. The minimum-description-length

      (MDL) program IS the most factored representation: it extracts all compressible

      structure into the program, leaving only incompressible residuals. Solomonoff

      induction is therefore a third independent derivation of the same factoring

      claim: the optimal learner is the one that factors its observations to the maximum

      extent computably possible. SO1 maps to UB: the agent''s ideal K-graph IS the

      Solomonoff-factored representation of its observation history. The MDL principle

      (the practical implementation of Solomonoff) is the engineering version of

      Theorem 2b Part 3: both say the optimal representation is maximally factored.

      Note: SO1 also grounds EC13 (optimal prior selection); EC08 and EC13 are

      complementary aspects of the Solomonoff framework — EC08 covers the factoring

      mechanism, EC13 covers the prior assignment criterion.

      '
    epistemic_status: formal-mathematical
    derivation: 'SO1: Solomonoff MDL as maximum factoring; third independent derivation of compression-through-factoring;
      from REF-Solomonoff1964'
  equivalence_analysis: 'Six frameworks express the same compression-through-factoring claim:

    - UB: factoring IS graph construction (necessity proved)

    - Schmidhuber: compression progress IS finding patterns (factoring)

    - Cover/Thomas: chain rule IS entropy-preserving factoring

    - Tishby: information bottleneck IS factoring the relevant structure

    - Schrödinger: aperiodic encoding IS maximally factored biological substrate

    - Solomonoff: MDL principle IS maximum factoring in hypothesis space


    The formal translation is tight:

    factoring (UB) = d/dt compression (Schmidhuber) = chain rule decomposition (Cover)

    = information bottleneck (Tishby) = aperiodic encoding (Schrödinger)

    = MDL program (Solomonoff)


    All six say: structured compression (factoring) is the mechanism of intelligence

    scaling. UB derives it as necessary; the others ground it as the right approach.

    Solomonoff provides the third fully independent formal derivation alongside Cover''s

    chain rule and UB''s Theorem 2b Part 3.


    This is the second most important equivalency class for UB after EC05.

    Theorem 2b Part 3''s necessity proof adds "this is the ONLY way" to the shared claim.


    Strength of equivalence: VERY HIGH. Information-theoretic foundations (Cover, Solomonoff)

    provide the formal backbone; six independent traditions ground the claim.

    '
  confidence_C1p:
    estimate: 0.93
    basis: Formal proof (Cover chain rule) + necessity proof (UB Theorem 2b Part 3) + algorithmic proof (Solomonoff MDL) +
      physical evidence (Schrödinger) + computational (Schmidhuber) + decision theory (Tishby). Updated from 0.91 with Solomonoff
      addition.
    weakest_link: The specific claim that graph form (not just any factored structure) is necessary is only in UB; EC11 provides
      cross-framework grounding for the graph-form claim
  contradictions: []
  implications_for_ub: 'Theorem 2b Part 3 is UB''s strongest formal result AND has the best cross-framework

    support. The shared claim (factoring is needed) is supported by four traditions;

    the novel claim (graph form specifically is needed) is UB''s unique contribution.

    The combined confidence in the general claim is ~0.91; the specific graph-form

    claim depends on Theorem 2b Part 3 alone.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Five frameworks from information theory, biology, AI, and decision theory all ground compression-through-factoring
        independently.
    derivation:
      from:
      - NV01-graph-necessity
      - T02-graph-structure-necessity
      - REF-Schmidhuber2010
      - REF-Cover2006
      - REF-Tishby2011
      - REF-Schrodinger1944
      - REF-Solomonoff1964
      method: 'Equivalency: compression = factoring across formal and physical frameworks'
- id: EC09-hierarchy-cost-triage
  type: equivalency-class
  name: 'Hierarchical Cost Triage: L0-L3 = System 1/2 = GWT Levels = FEP Precision Hierarchy'
  underlying_proposition: 'Cognition is organized across levels where lower levels handle cheaper, more certain

    processing and higher levels handle more expensive, uncertain processing. There is a

    cost-based triage mechanism that routes processing to the appropriate level.

    This hierarchy is necessary given bounded context: without it, all processing would

    compete for the same bounded context window, causing the O(n*k) scaling failure.

    '
  members:
  - id: UB-L0-L3
    framework: Uncertainty Bounding
    formulation: 'L0 (certain actions, no inference cost), L1 (routine exceptions), L2 (novel

      problems), L3 (architectural changes). Each level has a cost threshold theta_i.

      Escalation occurs when L_i cannot handle within its epsilon_acceptable.

      Definition 8; Theorem 4 (Escalation Principle).

      '
    epistemic_status: formal-definition-with-theorem
    derivation: 'Definition 8 + Theorem 4: hierarchy derived from cost structure of C_n'
  - id: KH-system1-2
    framework: Kahneman (2011)
    formulation: 'System 1 (fast, automatic, low-cost) handles routine pattern-matching.

      System 2 (slow, deliberate, high-cost) handles novel, uncertain reasoning.

      The routing between systems is based on cognitive ease — when System 1

      has low uncertainty, no System 2 activation.

      '
    epistemic_status: empirical
    derivation: 'Extensive experimental evidence: dual-task interference, cognitive ease manipulation'
  - id: BA-GWT-levels
    framework: Baars (1988), Dehaene (2011)
    formulation: 'Below-threshold processing (local, unconscious = L0 equivalent) vs.

      above-threshold global broadcast (conscious, high-cost = L2-L3 equivalent).

      The threshold is cost-based: global broadcast uses more resources.

      '
    epistemic_status: empirical-theoretical
    derivation: 'Neuroimaging evidence: below-threshold stimuli activate local circuits; above-threshold activate global networks'
  - id: FEP-precision-hierarchy
    framework: Friston (2017)
    formulation: 'Precision weighting in the FEP: higher-precision (more certain) prediction

      errors at lower levels are resolved locally. Lower-precision (more uncertain)

      errors propagate upward in the hierarchy. Precision = inverse variance =

      certainty measure. High certainty = handled locally (L0 equivalent).

      '
    epistemic_status: formal-theoretical
    derivation: 'Active inference: precision-weighted prediction errors drive hierarchical processing'
  - id: DE3-teleodynamics-levels
    framework: 'Deacon (2012) — Incomplete Nature: Teleodynamics'
    formulation: 'Deacon identifies three hierarchical levels of emergent dynamics: thermodynamics

      (physical processes, no constraints), morphodynamics (self-organizing processes,

      partial constraints), and teleodynamics (purposive processes, full constraints

      toward an end-state). The hierarchy is cost-ordered: thermodynamic processes

      require no reference to higher levels; morphodynamic processes require reference

      to current pattern; teleodynamic processes require reference to absent end-states

      (absential causation). DE3 maps to UB''s L0-L3: L0 corresponds to thermodynamic

      processing (no inference, direct physical response), L1-L2 to morphodynamic

      processing (pattern matching against current K), L3 to teleodynamic processing

      (architectural change toward a distant goal). Deacon''s key contribution: the

      highest level (L3 equivalent) is characterized by absence — it is motivated by

      what is not yet present. This is the formal content of L3 (architectural change):

      the agent is acting toward a K-structure it does not yet have.

      '
    epistemic_status: philosophical
    derivation: 'DE3: teleodynamics hierarchy as cost-ordered processing levels; from REF-Deacon2012'
  - id: HO2-hofstadter-isomorphism
    framework: Hofstadter (1979) — Isomorphism as the Source of Meaning
    formulation: 'Hofstadter''s central thesis in Gödel, Escher, Bach: meaning arises from

      isomorphism between a formal system and a referent. The hierarchy of levels

      in a formal system (symbols, rules about symbols, rules about rules) maps to

      the hierarchy of levels in the referent. The cost of accessing a higher level

      increases: direct symbol-level access is cheap; meta-level access (rules about

      rules) requires explicit encoding of the meta-level. HO2 maps to EC09''s hierarchy:

      L0 is direct symbol access; L1-L2 is rule access; L3 is meta-rule access (the

      architectural level where the system modifies its own rule-structure). Hofstadter''s

      strange loop (EC12 connection) is the pathological case where level hierarchy

      collapses — the system confuses its own level. The L0-L3 hierarchy prevents

      strange loops by maintaining level distinctions explicitly. The cost structure

      is Hofstadter''s encoding cost: each level up adds a layer of indirection.

      '
    epistemic_status: philosophical
    derivation: 'HO2: level hierarchy as meaning-structure; from REF-Hofstadter1979'
  equivalence_analysis: 'Six frameworks independently ground the same hierarchical cost-triage structure:


    Formal translation:

    - L0 (UB) = System 1 (Kahneman) = below-threshold (Baars) = high-precision local (FEP) = thermodynamic (Deacon) = symbol-level
    (Hofstadter)

    - L2/L3 (UB) = System 2 (Kahneman) = above-threshold global (Baars) = low-precision global (FEP) = teleodynamic (Deacon)
    = meta-rule level (Hofstadter)

    - Cost threshold theta_i (UB) = cognitive ease (Kahneman) = ignition threshold (Dehaene) = precision (FEP) = constraint
    density (Deacon) = encoding indirection (Hofstadter)


    The routing mechanism: when local processing can handle the uncertainty (certainty >

    threshold), it does not escalate. When it cannot, it escalates. All six frameworks

    independently derive this routing rule from their respective formalisms.


    The formal equivalence is very clean: precision (FEP) = 1/uncertainty = certainty =

    the inverse of U(w,K). High precision = low U(w,K) = L0 territory.


    Deacon adds the characterization of L3: it is absence-driven (teleodynamic). The

    L3 architectural change is motivated by what is not yet present in the K-graph.

    Hofstadter adds the level-confusion pathology: EC12''s strange loop is the failure

    mode when L0-L3 separation breaks down; the hierarchy prevents level confusion

    by making each level''s cost explicit.


    Strength of equivalence: VERY HIGH. Six traditions including two formal frameworks

    (UB, FEP) and four empirical/philosophical traditions (Kahneman, Baars/Dehaene,

    Deacon, Hofstadter).

    '
  confidence_C1p:
    estimate: 0.91
    basis: Two formal frameworks (UB, FEP) + extensive empirical evidence (Kahneman, Dehaene) + theoretical grounding (Baars)
      + philosophical (Deacon teleodynamics, Hofstadter level hierarchy). Updated from 0.90 with two new independent groundings.
    weakest_link: The exact cost structure (theta_i thresholds) is specific to UB; the others ground the qualitative hierarchy
      but not the specific quantitative thresholds
  contradictions: []
  implications_for_ub: 'The L0-L3 hierarchy and Theorem 4 (Escalation Principle) are well-grounded. Six

    frameworks converge on the same structure. UB''s contribution: the formal derivation

    of the hierarchy from C_n (not just as a design choice) and the Escalation Principle

    theorem. The empirical evidence from Kahneman and Dehaene provides strong support

    for the practical validity of the hierarchy. Deacon''s teleodynamics characterizes

    L3 as absence-driven (goal-directed toward non-existent end-state); Hofstadter

    connects the hierarchy to the metalanguage requirement (EC12).

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph (extended 2026-03-10)
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Six frameworks from formal AI theory, cognitive psychology, neuroscience, philosophy of emergence, and
        cognitive science independently ground hierarchical cost-based triage.
    derivation:
      from:
      - D08-encoding-hierarchy
      - REF-Kahneman2011
      - REF-Baars1988
      - REF-Dehaene2011
      - REF-Friston2017
      - REF-Deacon2012
      - REF-Hofstadter1979
      method: 'Equivalency: hierarchy levels translated across formal and empirical frameworks'
- id: EC10-inquiry-driver
  type: equivalency-class
  name: 'Uncertainty as Inquiry Driver: U(w,K) > 0 = Free Energy > 0 = Doubt = Surprise'
  underlying_proposition: 'The gradient signal that drives intelligent behavior is the gap between the agent''s

    current representation and the world''s actual structure — uncertainty, free energy,

    doubt, surprise. When this gap is zero, the drive terminates. As long as M < N,

    this gap is always positive (EC05). Therefore the drive is always present for A > 0

    entities. The gap IS the fuel.

    '
  members:
  - id: UB-uncertainty-gradient
    framework: Uncertainty Bounding
    formulation: 'U(w, K) > 0 is the gradient signal. The entity''s drive (A) responds to this

      gradient. Gradient descent on U produces learning: each update delta_f = -eta * delta

      reduces U in expectation. U > 0 always (M < N) so the drive never terminates.

      '
    epistemic_status: formal-definition
    derivation: Definitions 3-5, Theorem 3 Part I (gradient descent from A > 0)
  - id: FEP-surprise
    framework: Friston (2010)
    formulation: 'Variational free energy F = E[log q(s)] - E[log p(o,s)] is always positive

      (Jensen''s inequality). F is an upper bound on surprise -log p(o). Minimizing

      F = reducing surprise. The drive is active as long as F > 0 (which is always

      true under EC05).

      '
    epistemic_status: formal-theoretical
    derivation: 'Jensen''s inequality: KL[q||p] >= 0 -> F >= -log p(o) >= 0'
  - id: PC-doubt
    framework: Peirce (1877)
    formulation: 'Doubt is the unsettled state that drives inquiry. Inquiry is activated by doubt

      and terminates at fixation of belief. As long as doubt remains (M < N in UB terms),

      inquiry continues. The drive is the doubt; fixation is the local minimum.

      '
    epistemic_status: philosophical
    derivation: 'Pragmatist epistemology: doubt-belief cycle as the engine of inquiry'
  - id: S-compression-gap
    framework: Schmidhuber (2010)
    formulation: 'Compression progress is possible as long as there is compressible structure not

      yet compressed. The compression gap (current description length - optimal description

      length) is the driver. The agent is motivated by this gap, not by absolute

      description length.

      '
    epistemic_status: formal
    derivation: Compression progress is positive iff the current description is suboptimal
  - id: KH-cognitive-dissonance
    framework: Kahneman (2011) / Festinger (1957) [implied]
    formulation: 'Cognitive dissonance: the tension between current belief and new evidence drives

      belief updating. System 2 is activated by the failure of System 1 to process

      smoothly — the disfluency IS the gradient signal.

      '
    epistemic_status: empirical
    derivation: Cognitive dissonance research; cognitive ease/disfluency as System 2 activator
  - id: DE1-absence-causation
    framework: 'Deacon (2012) — Incomplete Nature: Absential Causation'
    formulation: 'Deacon''s central thesis: absence is causally efficacious. Teleodynamic systems

      (those with ends/purposes) are not caused by what is present but by what is

      absent — the end-state that does not yet exist. A thermostat is caused to act

      by the difference between current temperature and the set point that is not yet

      achieved. DE1 maps to EC10''s uncertainty driver: U(w,K) is an absential cause.

      The agent is driven by the gap between current K and the K it does not yet have —

      the absent knowledge. This is Deacon''s absential causation applied to UB: the

      inquiry driver is absence, not presence. The agent is pulled toward a non-existent

      K-state, not pushed by the existing one. This framing resolves a philosophical

      difficulty: how can non-existent states cause behavior? Deacon''s answer: the

      end-state is represented as an absence in the current system structure, and the

      dynamics of the system are organized around that absence. U(w,K) is the

      operational measure of the absence; A > 0 is the mechanism that allows absence

      to drive action. EC10''s uncertainty gradient is Deacon''s absential cause at the

      K-graph level.

      '
    epistemic_status: philosophical
    derivation: 'DE1: absential causation as inquiry driver; from REF-Deacon2012'
  equivalence_analysis: "Six frameworks express the same driver: the gap between current representation and\nworld structure.\
    \ The formal translations:\n\n- U(w,K) (UB) = F (FEP) = doubt (Peirce) = compression gap (Schmidhuber) = cognitive dissonance\
    \ (Kahneman) = absential cause (Deacon)\n- All are the same quantity: the residual incompleteness of the agent's representation\n\
    \  relative to the world it must navigate — the gap, the absence, the doubt.\n\nThe formal translation: U(w,K) = F = -log\
    \ p(o) approximately = compression gap = doubt.\nThese are not just similar — they describe the same information-theoretic\
    \ quantity\nat different levels of formalism.\n\nDeacon's absential causation adds a philosophical resolution to the question\
    \ \"how\ncan a gap cause action?\" The absence is causally efficacious because it is represented\nin the system's current\
    \ structure as a constraint on the possible — the system's\ndynamics are organized around the end-state that is not yet\
    \ achieved. This is why\nU(w,K) > 0 is the driver: the absence (incomplete K) organizes the agent's action.\n\nCRITICAL\
    \ STRUCTURAL CONSEQUENCE: if EC05 (incompleteness) holds — and it does, with\nC_1(p) = 0.97 — then EC10 (driver always\
    \ positive) follows immediately. Because M < N\nalways, U(w,K) > 0 always. Because U > 0 always, the drive never terminates.\
    \ This is\nthe derivation chain: EC05 -> EC10 -> non-termination.\n\nStrength of equivalence: VERY HIGH. Six independent\
    \ traditions converge. The chain\nEC05 -> EC10 means the drive's non-termination is as secure as EC05 (C_1(p) = 0.97).\n"
  confidence_C1p:
    estimate: 0.93
    basis: 'Information-theoretic foundation (Shannon entropy, Jensen''s inequality) + formal (UB, FEP) + philosophical (Peirce,
      Deacon) + empirical (Kahneman). Chain from EC05 adds further support. Confidence unchanged: Deacon addition provides
      philosophical grounding but does not change the formal evidence base.'
    weakest_link: The exact identity U(w,K) = F requires showing that conditional entropy and variational free energy are
      the same measure under the same assumptions — approximately true but not formally proved here
  contradictions: []
  implications_for_ub: 'The uncertainty gradient (Definition 3, Theorem 3) is strongly grounded. The chain

    EC05 -> EC10 provides a tight derivation: incompleteness (EC05, C_1(p) = 0.97) entails

    the driver always positive (EC10). UB''s contribution: formal treatment of U(w,K) as

    a defined conditional entropy, and the gradient descent theorem (Theorem 3 Part I)

    that shows A > 0 + U > 0 => convergence in each sensed dimension.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
