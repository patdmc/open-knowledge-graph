- id: EC01-bounded-context
  type: equivalency-class
  name: 'Bounded Internal Representation: C_n = Approximate Posterior = Global Workspace Capacity'
  underlying_proposition: 'Any physically instantiated cognitive agent has a strictly bounded capacity for internal

    representation at any moment. The internal state cannot be W itself — it is always a

    finite, compressed projection. This bound is a hard constraint, not an approximation

    error that shrinks over time.

    '
  members:
  - id: UB-Cn
    framework: Uncertainty Bounding
    formulation: 'C_n: the bounded context window at each inference step. Only M propositions can

      be held in context simultaneously. Formally defined in Definition 8.

      '
    epistemic_status: formal-definition
    derivation: Defined as the inference capacity; used to derive M < N in Theorem 3 Part II
  - id: FEP-approx-posterior
    framework: Friston (2010, 2017)
    formulation: 'The agent''s approximate posterior q(s) is bounded by the complexity of its

      generative model. q(s) != p(s) because the model has finite parameters.

      Variational free energy is positive precisely because q != p.

      '
    epistemic_status: theoretical-assumption
    derivation: Foundational to FEP — the approximate posterior is definitionally not the true posterior
  - id: GWT-workspace-capacity
    framework: Baars (1988), Dehaene (2011)
    formulation: 'The global workspace has strictly limited capacity — only a small amount of

      information is globally broadcast at once. Below the workspace threshold,

      processing is local and bounded.

      '
    epistemic_status: empirical
    derivation: 'Empirically observed: working memory capacity ~7±2 items (Miller 1956); neural workspace ignition is capacity-limited'
  - id: KH-finite-attention
    framework: Kahneman (2011)
    formulation: 'System 2 (deliberate attention) is a finite resource that depletes.

      Cognitive load limits the amount of information processed deliberately.

      '
    epistemic_status: empirical
    derivation: 'Extensive experimental evidence: dual-task interference, ego depletion, attention as resource'
  - id: CO2-holographic-bound
    framework: Polchinski (1998) / Bekenstein (1973) — Holographic Bound
    formulation: 'The Bekenstein-Hawking entropy bound establishes that the maximum information

      content of a physical region is proportional to its boundary area, not its

      volume: S_max = A / (4 * G_N) in Planck units. This is the absolute physical

      upper bound on C_n for any agent embedded in spacetime. No physically realizable

      cognitive system can hold more information in context than its boundary area allows.

      EM18 shows that C_n = A / 4G_N: the holographic bound IS the physical derivation

      of bounded context. The bounded context axiom (C_n) is not a simplification

      assumption — it is a consequence of quantum gravity. Any agent with a finite

      physical boundary has a finite C_n bounded by that boundary''s area.

      '
    epistemic_status: formal-theoretical
    derivation: 'EM18: C_n = holographic bound; from REF-Polchinski1998, REF-Bekenstein1973'
  - id: MI3-chunking-extends-context
    framework: Miller (1956) — Chunking and the Magical Number Seven
    formulation: 'Miller''s central finding: working memory holds 7±2 chunks, not 7±2 primitive

      items. Chunking is the mechanism that extends effective context: by grouping

      items into higher-order units, the agent encodes more information within the

      same C_n limit. A chess master''s 7 chunks represent more board structure than

      a novice''s 7 individual piece positions. Chunking is the cognitive implementation

      of the K/F graph''s factoring operation (EC08): shared structure extracted from

      individual items into a chunk = a graph node that compresses the items.

      This means C_n is not fixed in raw information content — it is fixed in chunk

      count, and the information per chunk grows with domain expertise (deeper K-graph).

      The effective context window is C_n * (average information per chunk), and this

      product scales with K-graph density.

      '
    epistemic_status: empirical
    derivation: 'MI3: chunking as context extension mechanism; from REF-Miller1956; connects to EC08 factoring'
  equivalence_analysis: 'These six formulations express the same constraint at different levels of analysis:

    - Physical level: finite neural/computational substrate = finite representation capacity

    - Information-theoretic level (UB): C_n defines the bound precisely as context window

    - Statistical level (FEP): approximate posterior is bounded by model complexity

    - Cognitive level (GWT): global workspace has empirically measured capacity

    - Psychological level (Kahneman): attention is a finite resource


    The formal translation: C_n (UB) = dim(q(s)) (FEP) = workspace capacity (GWT)

    = A/4G_N (holographic bound) = chunk-capacity (Miller).

    All five describe the same constraint at different levels. UB provides the most

    formal cognitive definition; GWT provides the empirical grounding; FEP provides

    the statistical mechanics; the holographic bound provides the physical derivation;

    chunking provides the mechanism for working within the bound.


    The holographic derivation (CO2) is the strongest grounding: it shows the bounded

    context is not a cognitive or computational simplification but a physical law.

    The chunking mechanism (MI3) is the most practically relevant: it explains why

    expert knowledge (dense K-graphs) enables effective use of a fixed C_n.


    Strength of equivalence: HIGH. All five independently converge on the same

    structural constraint.

    '
  confidence_C1p:
    estimate: 0.94
    basis: 'Six independent frameworks: empirical evidence from cognitive science (Miller, GWT, Kahneman), formal grounding
      in information theory (FEP), physical derivation from quantum gravity (holographic bound), formal definition (UB). Updated
      from 0.92 with holographic and chunking additions.'
    weakest_link: The exact quantitative equivalence C_n = dim(q(s)) = workspace capacity is not formally proven
  contradictions: []
  implications_for_ub: 'C_n is one of UB''s most secure premises. Four independent frameworks converge on it.

    This means theorems that rest on C_n (Theorem 2b Part 3, Theorem 3 Part II) inherit

    this high C_1(p) for their premise.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Identified by intersecting C_n (UB), approximate posterior (FEP), workspace capacity (GWT), finite attention
        (Kahneman). All four independently ground the same structural constraint.
    derivation:
      from:
      - D08-encoding-hierarchy
      - REF-Friston2017
      - REF-Baars1988
      - REF-Kahneman2011
      - REF-Polchinski1998
      - REF-Miller1956
      method: Equivalency identified by formal translation across frameworks
- id: EC02-improvement-rate
  type: equivalency-class
  name: 'Rate of Model Improvement: eta_M = d/dt Compression = dF/dt Learning Signal'
  underlying_proposition: 'Intelligence is meaningfully measured by the rate at which an agent''s internal model

    improves — the derivative of model quality with respect to time/experience, not the

    current quality. The measure that matters is how fast the model is getting better,

    not where it currently stands.

    '
  members:
  - id: UB-etaM
    framework: Uncertainty Bounding
    formulation: 'eta_M: the rate at which M improves F''s uncertainty-reduction capacity per unit

      of learning signal. I(E) = A * eta_M. Defined in Definition 11a; necessity of

      eta_M > 0 proved in Theorem 6 Part 2.

      '
    epistemic_status: formal-definition-with-necessity-proof
    derivation: 'Theorem 6 Part 2: eta_M = 0 => no improvement => selection removes entity. Necessity derived.'
  - id: S-compression-progress
    framework: Schmidhuber (2010)
    formulation: 'Intrinsic reward = d/dt[compression(C)]. The first derivative of compression

      progress. The agent is rewarded for actions that improve C''s compression rate,

      not for C''s current compression level.

      '
    epistemic_status: design-objective
    derivation: Defined as the objective function; not derived from necessity
  - id: FEP-dFdt
    framework: Friston (2010, 2017)
    formulation: 'The rate of free energy reduction: dF/dt is what the agent minimizes over time.

      The learning signal is the gradient of F — improving the generative model reduces F.

      The agent''s intelligence (in the FEP sense) is its capacity to reduce F over time.

      '
    epistemic_status: theoretical
    derivation: 'Follows from FEP: minimizing F over time = improving generative model; rate is the measure'
  - id: TH-meta-learning-rate
    framework: Thrun and Pratt (1998)
    formulation: 'Meta-learning rate: the rate at which the learning algorithm itself improves

      across tasks. The relevant measure is not performance on a single task but

      improvement of the learning mechanism.

      '
    epistemic_status: empirical
    derivation: 'Empirically demonstrated: meta-learning produces faster learning on new tasks'
  equivalence_analysis: "These four formulations converge on the same underlying claim: the derivative, not\nthe absolute\
    \ value, is what intelligence measures.\n\nFormal translation:\n- eta_M (UB) = d/dt[compression(C)] (Schmidhuber): both\
    \ are the rate of model\n  improvement per unit of experience. The difference is the object improved:\n  eta_M improves\
    \ M (the learning mechanism); d/dt compression improves C (the\n  world model / compressor). These are the same object\
    \ at different abstractions.\n- dF/dt (Friston): free energy reduction rate = uncertainty reduction rate =\n  eta_M in\
    \ UB. Minimizing F = reducing U(w,K) = improving F's prediction.\n- Meta-learning rate (Thrun): improving M itself = eta_M\
    \ at the meta level.\n\nAsymmetry: UB derives that eta_M > 0 is necessary (Theorem 6 Part 2). Schmidhuber\nasserts it\
    \ as an objective; Friston derives it from free energy minimization;\nThrun demonstrates it empirically. UB's necessity\
    \ proof is the strongest grounding.\n\nStrength of equivalence: HIGH for UB/Schmidhuber/Friston. MODERATE for Thrun\n\
    (same concept at different level of abstraction).\n"
  confidence_C1p:
    estimate: 0.88
    basis: Three independent formal frameworks + empirical evidence from meta-learning literature
    weakest_link: The exact mapping eta_M = dF/dt requires showing that uncertainty reduction = free energy reduction, which
      is approximately but not exactly true (FEP uses variational free energy, not exact entropy)
  contradictions: []
  implications_for_ub: 'eta_M is well-grounded: Schmidhuber, Friston, and Thrun all independently motivate

    the same measure. The UB contribution is the necessity proof (Theorem 6 Part 2):

    the others don''t prove eta_M > 0 is required; UB does. This is NV02''s companion —

    just as M < N is the novel bound on representation, Theorem 6 Part 2 is the novel

    derivation that eta_M > 0 is necessary for persistence.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Intersection of eta_M (UB), d/dt compression (Schmidhuber), dF/dt (Friston), meta-learning rate (Thrun).
        Four independent groundings of the derivative-as-measure claim.
    derivation:
      from:
      - D11-higher-order-function-space
      - REF-Schmidhuber2010
      - REF-Friston2017
      - REF-Thrun1998
      method: 'Formal translation: improvement rate across frameworks'
- id: EC03-structured-representation
  type: equivalency-class
  name: 'Structured Internal Representation: K/F Graph = Hierarchical Generative Model = Affordance Structure'
  underlying_proposition: 'The internal representation that enables intelligent action on W must be structured —

    not a flat list or arbitrary encoding, but a relational structure that captures the

    dependencies between propositions and the actions they ground. The structure is

    necessary for the representation to scale with new information.

    '
  members:
  - id: UB-KF-graph
    framework: Uncertainty Bounding
    formulation: 'K (knowledge graph) grounds F (action space) via the grounding relation.

      K is a directed graph of propositions with relational edges. The necessity of

      this structure is derived in Theorem 2b Part 3: at C_n, factoring (which IS

      graph construction) is the unique information-preserving option.

      '
    epistemic_status: formal-necessity-proof
    derivation: 'Theorem 2b Part 3: derived from two options at C_n boundary'
  - id: FEP-hierarchical-generative
    framework: Friston (2010, 2017)
    formulation: 'The FEP generative model p(o,s) is hierarchically structured: each level

      predicts the level below, passing prediction errors upward. The hierarchy

      IS the relational structure — nested generative models with directed

      prediction connections.

      '
    epistemic_status: architectural-assumption
    derivation: Assumed as the architecture; not derived within FEP
  - id: S-compressor
    framework: Schmidhuber (2010)
    formulation: 'The world model C is a compressor. Compression implicitly requires structure:

      random encodings do not compress. Effective compression = extracting patterns =

      building relational structure. But Schmidhuber does not constrain the form of C.

      '
    epistemic_status: implicit
    derivation: 'Implicit in compression: structure is required but not formally constrained to graph form'
  - id: GI-affordance-structure
    framework: Gibson (1979)
    formulation: 'The environment affords actions directly — the structure is in the optic array.

      The affordance structure IS the relational structure: action X is afforded by

      object Y under condition Z. This is a knowledge graph without the explicit

      graph formalism.

      '
    epistemic_status: conceptual
    derivation: Qualitative — affordances are relational but the necessity of graph structure is not derived
  - id: CT-sufficient-statistic
    framework: Cover and Thomas (2006), Tishby (2011)
    formulation: 'K is a sufficient statistic of the world for the action space. The chain rule

      (CT2) shows that factored representations preserve entropy. The information

      bottleneck (Tishby TB1) shows compression must retain action-relevant structure.

      '
    epistemic_status: formal
    derivation: 'Information-theoretic: chain rule + sufficient statistic + data processing inequality'
  - id: MI2-chunking-as-NV01
    framework: Miller (1956) — Chunking as Graph Construction
    formulation: 'Miller''s chunking is the empirical observation that human working memory organizes

      items into higher-order groups. A chunk IS a structured representation: it is a

      K-node that indexes the items it groups (a micro-K/F-graph). When an expert chess

      player sees a board, they do not see 32 pieces — they see 6-8 chunks, each a named

      configuration with known action implications. MI2 maps chunking to NV01 (graph

      necessity): chunking IS the cognitive implementation of K-node construction.

      The chunk is the K-node; the items the chunk groups are its indexed sub-nodes;

      the action implications of the chunk are its F-edges. Expert chunking = dense

      K-graph; novice non-chunking = flat list. The performance difference between

      experts and novices (Chase and Simon, 1973) is direct empirical evidence for

      the superiority of structured representation over flat lists — NV01 confirmed

      in human cognitive science.

      '
    epistemic_status: empirical
    derivation: 'MI2: chunking as K-node construction; from REF-Miller1956; Chase and Simon 1973 chess expertise evidence'
  - id: TR1-transformer-attention
    framework: Vaswani et al. (2017) — Transformer Architecture
    formulation: 'The transformer''s self-attention mechanism computes, for each token embedding

      (the representation), a weighted sum over all other token embeddings weighted

      by their query-key relevance. This is a structured representation: the attention

      matrix is a relational structure where each token is connected to other tokens

      by relevance weights. Uniform attention (no structure) would average all tokens

      equally — losing all relational information. The structured attention IS the

      K/F graph: each token is a K-node; the attention weights are F-relevant edges.

      The empirical finding that transformers dramatically outperform flat sequence

      models (RNNs without attention) is engineering evidence for the necessity of

      structured representation over flat sequential encoding. TR1 is EC03''s best

      large-scale engineering validation: at 175B parameters, the architecture that

      imposes relational structure (attention) outperforms architectures that do not.

      '
    epistemic_status: empirical-formal
    derivation: 'TR1: transformer attention as structured representation; from REF-VaswaniEtAl2017; large-scale engineering
      evidence for NV01'
  equivalence_analysis: 'The underlying claim is: the representation must be structured (relational, factored,

    hierarchical). The frameworks agree on this but ground it differently:


    - UB derives it (Theorem 2b Part 3 necessity proof)

    - FEP assumes it (hierarchical generative model)

    - Schmidhuber implies it (effective compression requires structure)

    - Gibson describes it qualitatively (affordance relations)

    - Cover/Tishby ground it information-theoretically (sufficient statistic, chain rule)


    The equivalency is between the structural form, not the derivation. All seven say

    the same thing: the representation cannot be unstructured. UB says WHY; the others

    say THAT.


    Key tension: Gibson (GI2) asserts direct perception — no internal reconstruction

    of W needed. This is in tension with all other members of this class, who require

    internal structured representation. The tension resolves by scope: Gibson addresses

    moment-to-moment perception; this class addresses knowledge accumulated over time.


    The transformer addition (TR1) is the most practically significant extension: it

    is a large-scale engineering existence proof that structured representation (attention)

    outperforms flat sequential representation at a scale where the difference cannot be

    dismissed as noise. The chunking evidence (MI2) confirms the same claim in human

    cognition with a different methodology (expertise studies).


    Note on EC03 vs. EC11: EC03 says the representation must be structured; EC11 says

    specifically the K/F graph is the unique information-preserving structure. EC11 grounds

    EC03: the graph form is not just one sufficient structure but the uniquely necessary one.


    Strength of equivalence: HIGH for UB/FEP/Cover-Tishby/Transformer. MODERATE for

    Schmidhuber (structure implied but not constrained). PARTIAL for Gibson (scoped differently).

    '
  confidence_C1p:
    estimate: 0.88
    basis: Formal necessity proof (UB) + theoretical assumption (FEP) + information-theoretic grounding (Cover/Tishby) + large-scale
      engineering evidence (Transformer/TR1) + empirical expertise studies (Miller/MI2) + qualitative (Gibson/Schmidhuber).
      Updated from 0.85 with transformer and chunking additions.
    weakest_link: The exact graph form (vs. other structured representations like tensor factorizations) is only fully derived
      in UB; EC11 provides the cross-framework grounding for the specific graph-form claim
  contradictions:
  - source: Gibson (1979)
    claim: Direct perception — no internal structured representation required
    resolution: 'Scope: Gibson addresses perceptual coupling; this class addresses long-term knowledge accumulation under
      bounded context'
  implications_for_ub: 'NV01 (graph necessity) has strong support from FEP and Cover/Tishby — they all

    say structured representation is required. UB''s unique contribution is proving the

    GRAPH form is necessary, not just structure in general. This narrows the novel claim

    but strengthens the structural claim.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: Five frameworks independently ground structured internal representation. UB derives the specific graph
        form; others ground the structural requirement.
    derivation:
      from:
      - D02-knowledge-graph
      - NV01-graph-necessity
      - REF-Friston2017
      - REF-Gibson1979
      - REF-Cover2006
      - REF-Tishby2011
      - REF-Miller1956
      - REF-VaswaniEtAl2017
      method: Equivalency by structural translation across representational frameworks
- id: EC04-survival-threshold
  type: equivalency-class
  name: 'Survival Threshold: U_lethal = Free Energy Bound = Negentropy Floor = Dissipation Threshold'
  underlying_proposition: 'There exists a physical threshold below which a self-organizing system cannot maintain

    its structure. Crossing this threshold results in dissolution of the system. Survival =

    maintaining internal state above this threshold by extracting order from the environment.

    This is a physical constraint, not a biological assumption.

    '
  members:
  - id: UB-Ulethal
    framework: Uncertainty Bounding
    formulation: 'U_lethal^d: the maximum uncertainty a system can survive in dimension d.

      If U(w, K) > U_lethal^d for encountered w, the entity is removed by selection.

      Defined in Definition 9.

      '
    epistemic_status: formal-definition
    derivation: Defined; physical grounding via England2013 and Schrödinger1944
  - id: FEP-markov-breakdown
    framework: Friston (2010)
    formulation: 'The Markov blanket defines the agent boundary. If free energy exceeds a threshold

      such that the Markov blanket can no longer be maintained, the agent-environment

      separation dissolves — the agent ceases to exist as a self-organizing entity.

      '
    epistemic_status: theoretical
    derivation: 'Derived from Markov blanket dynamics: blanket maintenance requires bounded free energy'
  - id: EN-replication-threshold
    framework: England (2013)
    formulation: 'Self-replication requires sufficient energy dissipation. Below the thermodynamic

      threshold for dissipative self-organization, replication cannot proceed and the

      structure dissolves. Derived from statistical mechanics.

      '
    epistemic_status: formal-physical
    derivation: Derived from Jarzynski equality and fluctuation theorems
  - id: SCH-negentropy-floor
    framework: Schrödinger (1944)
    formulation: 'Living systems require continuous negentropy intake. Below a minimum negentropy

      flux, the system''s internal order dissipates into thermodynamic equilibrium.

      Thermodynamic death = crossing the negentropy floor.

      '
    epistemic_status: theoretical-physical
    derivation: Derived from second law + open system thermodynamics
  - id: PR-bifurcation-collapse
    framework: Prigogine (1984)
    formulation: 'Dissipative structures maintain their order through energy flow. Below a critical

      energy flow threshold, the dissipative structure collapses to thermodynamic

      equilibrium. The bifurcation point defines the survival threshold.

      '
    epistemic_status: theoretical-physical
    derivation: Bifurcation analysis of far-from-equilibrium systems
  equivalence_analysis: 'These five formulations describe the same physical threshold at different levels:

    - Formal (UB): U_lethal^d as a defined quantity with formal selection pressure

    - Statistical mechanical (England): thermodynamic threshold from fluctuation theorems

    - Thermodynamic (Schrödinger, Prigogine): negentropy/dissipation threshold


    Formal translation: U_lethal^d (UB) corresponds to the free energy threshold at which

    Markov blanket breaks down (FEP). Both are the "dissolution threshold." England and

    Schrödinger provide the physical derivation that UB and FEP invoke but do not derive.


    This is the most physically grounded equivalency class. England (2013) derives the

    threshold from first principles of statistical mechanics. Schrödinger (1944) identifies

    it qualitatively. Prigogine (1984) formalizes it via bifurcation theory. UB and FEP

    define agent-level representations of the same threshold.


    Strength of equivalence: VERY HIGH. Five frameworks, with the physical foundations

    derived independently from statistical mechanics. The formal translation is clean.

    '
  confidence_C1p:
    estimate: 0.94
    basis: Physical derivation (England, Schrödinger, Prigogine) + formal definitions (UB, FEP) + independent theoretical
      traditions (biology, physics, cognitive science)
    weakest_link: The exact quantitative equivalence U_lethal = FEP breakdown threshold requires a formal mapping not yet
      provided
  contradictions: []
  implications_for_ub: 'U_lethal is UB''s most physically grounded premise. England and Schrödinger provide

    the thermodynamic derivation. This means the selection pressure argument in Theorem 6

    is physically grounded — not just biologically stipulated. Theorems that use U_lethal

    (Theorems 1, 4, 6) inherit this high confidence.

    '
  provenance:
    attribution:
      author: Patrick McCarthy
      source: Novelty Analysis — Knowledge Graph
      date: '2025'
    evidence:
      type: cross-framework-intersection
      description: 'Physical threshold identified from five independent traditions: UB, FEP, statistical mechanics (England),
        thermodynamics (Schrödinger), dynamical systems (Prigogine)'
    derivation:
      from:
      - D09-survival-threshold
      - REF-Friston2010
      - REF-England2013
      - REF-Schrodinger1944
      - REF-Prigogine1984
      method: 'Physical grounding chain: England -> Schrödinger -> Prigogine derive the threshold; UB + FEP instantiate it
        as agent-level definitions'
- id: EC05-incompleteness
  type: equivalency-class
  name: 'Epistemic Incompleteness: M < N = q(s) != p(s) = Truth as Long-Run Limit = Undefinability'
  underlying_proposition: 'Any cognitive system operating under bounded context can never fully represent the

    world from which it emerged. The internal representation is always a proper subset

    of the world''s structure. This is not an approximation error to be corrected — it

    is a structural consequence of operating under physical bounds. Completeness is

    asymptotically approached, never reached.

    '
  members:
  - id: UB-MlessThanN
    framework: Uncertainty Bounding
    formulation: 'M < N always for A > 0 entities. M is the sensed dimension count; N is the

      world''s dimension count. Theorem 3 Part II derives that M < N is maintained

      at every t from C_n and execution dynamics. N may be unbounded.

      '
    epistemic_status: formal-derived
    derivation: 'Theorem 3 Part II: derived from C_n + A > 0 + execution extends T_reachable'
  - id: FEP-variational-gap
    framework: Friston (2010, 2017)
    formulation: 'The variational free energy F >= -log p(o) is positive precisely because

      q(s) != p(s): the approximate posterior is always strictly less accurate

      than the true posterior. The variational gap is always positive; it approaches

      zero asymptotically but never reaches it.

      '
    epistemic_status: formal-theoretical
    derivation: 'From Jensen''s inequality: KL[q||p] >= 0, equality only when q = p exactly'
  - id: PC-truth-limit
    framework: Peirce (1878)
    formulation: 'Truth is the limit of inquiry — the proposition agreed upon by a community

      of inquirers given unlimited time. Any finite inquiry is incomplete. Truth

      is asymptotically approached, not attained at any finite step.

      '
    epistemic_status: philosophical
    derivation: 'Pragmatist epistemology: truth as convergent series, not fixed point'
  - id: TA-undefinability
    framework: Tarski (1936)
    formulation: 'Truth cannot be defined within the language it applies to — it requires a

      metalanguage. A system cannot fully represent its own truth conditions from

      within. Any self-referential truth assertion is bounded by this limit.

      '
    epistemic_status: formal-mathematical
    derivation: 'Tarski undefinability theorem: formal proof by diagonal argument'
  - id: GD-incompleteness
    framework: Gödel (1931) [implicit via Tarski]
    formulation: 'Any sufficiently powerful formal system contains true statements it cannot

      prove. There is always a true statement outside the system''s reach.

      M < N is the cognitive analog: always dimensions of W outside current K.

      '
    epistemic_status: formal-mathematical
    derivation: Gödel incompleteness theorems
    note: Not in references.bib — should be added as a reference node
  equivalence_analysis: 'These formulations all express the same structural constraint: the system can never

    fully represent the world from within. The formal translations:


    - M < N (UB): sensed dimensions < world dimensions (cardinality bound)

    - q(s) != p(s) (FEP): approximate posterior != true posterior (statistical gap)

    - Truth as limit (Peirce): inquiry converges but never terminates (epistemic limit)

    - Undefinability (Tarski): representation bounded by metalanguage requirement (logical limit)

    - Incompleteness (Gödel): formal system bounded by undecidable true statements (mathematical limit)


    These are formally the same constraint expressed at different levels:

    - Cardinality: M < N

    - Statistical: KL[q||p] > 0

    - Epistemic: finite inquiry

    - Logical: self-reference limit

    - Mathematical: incompleteness


    CRITICAL TENSION with FEP equilibrium (FEP6): FEP claims free energy approaches

    its minimum (q approaches p). This is only consistent with EC05 if the approach is

    asymptotic and the minimum is never reached — which is exactly EM02''s qualification.

    FEP6 (equilibrium claim) is in tension with EC05 (incompleteness) unless the

    equilibrium is strictly asymptotic and the minimum is never attained.


    Strength of equivalence: VERY HIGH across UB/FEP/Tarski/Gödel. The logical and

    mathematical foundations (Tarski, Gödel) provide the deepest grounding.

    '
  confidence_C1p:
    estimate: 0.97
    basis: Formal mathematical proofs (Gödel, Tarski) + formal theoretical (FEP Jensen inequality) + formal derivation (UB
      Theorem 3 Part II) + philosophical (Peirce)
    weakest_link: The exact cardinality claim M < N (vs. qualitative incompleteness) is specific to UB — the others state
      incompleteness qualitatively; UB gives it a specific measure
  contradictions:
  - source: Friston (2017) FEP6
    claim: Free energy approaches its minimum — generative model approximates true posterior in the long run
    resolution: 'EM02: FEP6 holds under stationarity. EC05 says the minimum is never exactly reached (KL >= 0, equality requires
      q = p exactly). In an open non-stationary world, FEP6''s equilibrium is an idealization; EC05 is the reality. The tension
      is resolved by making the stationarity assumption explicit.'
  implications_for_ub: 'The M < N bound is one of UB''s most strongly supported claims — it has formal proofs

    in three independent frameworks (UB Theorem 3 Part II, FEP Jensen inequality, Tarski

    undefinability, Gödel incompleteness). The UB contribution is making the bound

    precise at the cardinality level (M and N as dimension counts) and deriving the

    measure of approach (I(E) = A * eta_M measures M/N convergence rate).

    '
  provenance:
    attribution:
