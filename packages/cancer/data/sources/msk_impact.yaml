id: cancer:source:msk_impact
name: MSK-IMPACT Clinical Sequencing Cohort
access: gated
description: >
  Targeted sequencing of ~50,000 tumors across 500+ genes.
  Three cohorts at increasing scale. Primary training data for survival models.
citation: "Zehir et al., Nature Medicine 2017"
pmid: "28481359"
license: institutional
apply_url: https://www.cbioportal.org/study/summary?id=msk_impact_2017
cohorts:
  - id: msk_impact_2017
    patients: ~10,000
    files:
      - name: mutations.csv
      - name: clinical.csv
  - id: msk_met_2021
    patients: ~25,000
    files:
      - name: mutations.csv
      - name: clinical.csv
      - name: sample_clinical.csv
  - id: msk_impact_50k_2026
    patients: ~50,000
    files:
      - name: mutations.csv
      - name: clinical.csv
      - name: sample_clinical.csv
cache_dir: cache/msk/
