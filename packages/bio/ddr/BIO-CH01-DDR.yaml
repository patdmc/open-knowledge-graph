id: BIO-CH01-DDR
type: biology_channel
domain: molecular_biology
name: DNA Damage Response
channel: DDR
tier: 1
tier_name: tissue_level
n_genes: 81
n_hubs: 3
provenance:
  attribution:
    source: cancer_graph_v6_seed
    method: Seeded from cancer graph — damage framing inverted to function framing
    date: 2026-03-28
  data_sources:
  - STRING-DB PPI (confidence >= 700)
  - CIViC GOF/LOF annotations
  - BioGRID/SynLethDB synthetic lethality
  - MSK-IMPACT gene panel (509 genes)
function:
  summary: Detects and repairs DNA damage (double-strand breaks, single-strand breaks,
    base mismatches, replication fork stalls). Maintains genomic integrity across
    cell divisions.
  healthy_state: Damage sensing (ATM/ATR), signal transduction (CHK1/CHK2), repair
    execution (HR via BRCA1/RAD51, NHEJ via 53BP1, BER via PARP1, MMR via MSH2/MLH1)
  failure_mode: Unrepaired DNA accumulates, genomic instability, structural variants,
    microsatellite instability
