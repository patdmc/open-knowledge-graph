id: REF-Kac1990
type: reference
name: "Kac (1990) — Infinite Dimensional Lie Algebras"
citation: "Kac, V.G. (1990). Infinite Dimensional Lie Algebras (3rd ed.). Cambridge University Press."
fidelity: low

propositions:
  KM1:
    statement: "Kac-Moody algebra: defined by a generalized Cartan matrix A. The Dynkin diagram encodes the relational structure between simple roots — each node is a generator, each edge encodes an interaction coefficient. The algebra is infinite-dimensional when the Cartan matrix is indefinite."
    maps_to: [EC05-incompleteness, NV01-graph-necessity]
    note: "The Dynkin diagram IS a graph. A Kac-Moody algebra is generated by a finite graph (Dynkin diagram) but produces an infinite-dimensional structure. This is the algebraic analog of NV01: a finite factored representation (the Dynkin diagram/graph) generates infinite informational content. The graph is the compression of the algebra."
    potential_em: "KM1 + NV01: the Dynkin diagram is the minimal graph that encodes the full infinite-dimensional structure of the algebra. This is NV01 in algebraic language: at the bounded-context boundary, the entity constructs the Kac-Moody graph (Dynkin diagram) — a finite structure that generates infinite content. Graph necessity has an algebraic proof."

  KM2:
    statement: "Root system: the algebra decomposes into root spaces indexed by a root system. For infinite-dimensional Kac-Moody algebras, the root system is infinite. Real roots have finite multiplicity; imaginary roots have infinite multiplicity."
    maps_to: [EC05-incompleteness, NV02-mn-bound]
    note: "The infinite root system = the dimension space W with N→∞. Real roots (finite multiplicity) = the M dimensions the entity can explicitly sense. Imaginary roots (infinite multiplicity) = the dimensions beyond current M. M < N always because the imaginary root sector is always larger."

  KM3:
    statement: "Weyl group: the symmetry group of the root system. For affine Kac-Moody algebras the Weyl group is infinite. The Weyl group acts on the root system by reflections, generating an infinite orbit from a finite fundamental domain."
    maps_to: [EC08-compression-factoring, NV01-graph-necessity]
    note: "The Weyl group compresses the infinite root system to a finite fundamental domain — the minimal factored representation. Factoring (EC08) = passing to the fundamental domain under the Weyl group action. Graph construction (NV01) = encoding the Weyl group's structure as a Dynkin diagram."

  KM4:
    statement: "Character formula: Kac's character formula computes the representation theory of Kac-Moody algebras via modular forms. The generating function of multiplicities satisfies transformation laws under the modular group."
    maps_to: [EC08-compression-factoring]
    note: "Modular forms are maximally compressed: they encode infinite amounts of arithmetic data in a finite formula satisfying symmetry constraints. The character formula is the extreme case of EC08 compression — the most compact provenance-carrying representation of an infinite structure."

