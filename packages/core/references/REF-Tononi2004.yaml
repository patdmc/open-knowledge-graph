id: REF-Tononi2004
type: reference
name: "Tononi (2004) — An Information Integration Theory of Consciousness"
citation: "Tononi, G. (2004). An information integration theory of consciousness. BMC Neuroscience, 5, 42."
fidelity: low

propositions:
  TO1:
    statement: "Phi (Φ): the amount of integrated information in a system — information generated by the system as a whole above and beyond the sum of its parts. Phi measures causal irreducibility: a system with high Phi cannot be decomposed without information loss."
    maps_to: [EM10-Kcollective-unit-of-selection, EC07-collective-knowledge]
    note: "Phi measures what UB calls K_collective coherence: the degree to which the collective has structure that is not reducible to individual K_i. High Phi = K_collective is a genuine unit with its own information (EM10). Low Phi = K_collective is just the sum of K_i."
    potential_em: "TO1 + EM10: Phi is the quantitative measure of K_collective coherence that EM10 requires but does not quantify. EM10 says K_collective becomes a unit of selection when it has its own coherence requirements (provenance verification). Phi operationalizes 'coherence': K_collective is a unit of selection when its Phi > 0."

  TO2:
    statement: "Consciousness = integrated information: the level of consciousness of a system is its Phi. A system is conscious to the degree that it integrates information irreducibly."
    maps_to: [D14-sentience, EC09-encoding-levels]
    note: "TO2 maps to UB's Definition 14 (sentience) but inverts the causal direction. UB: sentience derives from awareness of own normalization process. IIT: consciousness = integrated information (no derivation, it is the definition). These are structurally distinct positions on the same phenomenon."

  TO3:
    statement: "The main complex: every system has a core that maximizes Phi — the main complex. Consciousness resides in this maximally integrated structure, not in peripheral components with lower integration."
    maps_to: [EC07-collective-knowledge, EM10-Kcollective-unit-of-selection]
    note: "The main complex = K_collective's coherent core. Entities outside the main complex are K_i that have not achieved provenance-verified integration — they are peripheral to the unit of selection."

provenance:
  attribution: {author: "Patrick McCarthy", source: "Knowledge Graph Reference Node", date: "2025"}
  evidence:
    type: literature-node
    references: [EM10-Kcollective-unit-of-selection, D14-sentience, EC07-collective-knowledge]
  caveat: "IIT is contested empirically. Phi is computationally intractable for large systems. These propositions are included for structural mapping, not empirical endorsement."

gap_analysis:
  present_here_not_in_ub:
    - "Phi as quantitative coherence measure — UB has no scalar for K_collective integration degree"
    - "Main complex — formal identification of the coherent core"
  present_in_ub_not_here:
    - "Derivation of sentience — IIT defines, UB derives"
    - "A parameterization, survival threshold, selection pressure"
