gap_analysis:
  present_here_not_in_ub:
    - "Omega — the formal object at M=N — UB treats the limit analytically but not as a named computable object"
    - "Information-theoretic incompleteness derivation (CH2) — independent of self-reference"
  ec05_now_has_four_derivations: "Gödel (self-reference), Tarski (truth predicates), Shannon/Cover (data processing), Chaitin (compression bounds)"
