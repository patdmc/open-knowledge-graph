validation_notes: |
  Verification conducted 2025. ST2-ST5 are accurately stated as content covered in Polchinski (1998)
  String Theory Vol. 1: conformal invariance and Virasoro algebra (ST2), T-duality (ST3), D-branes
  (ST4 — Polchinski's own discovery), worldsheet CFT (ST5).

  ST1 ATTRIBUTION CORRECTION: the holographic principle and Bekenstein-Hawking entropy bound predate
  Polchinski (1998). The entropy formula S = A/4G_N is from Bekenstein (1973) and Hawking (1975).
  The holographic principle as a general framework is from 't Hooft (1993) and Susskind (1995).
  Maldacena (1997) provided the concrete AdS/CFT realization. Polchinski's textbook covers this
  material but did not originate it. ST1 has been flagged with an attribution_note.

  Status: ST2, ST3, ST4, ST5 ACCURATE for Polchinski (1998). ST1 MISATTRIBUTED — holographic
  principle predates the textbook. Correct attribution: Bekenstein (1973), Hawking (1975),
  't Hooft (1993), Susskind (1995).

